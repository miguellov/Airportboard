<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
  apiKey: "933c97406ad862095eade39aef8a1f5d",
  authDomain: "airport-board-ee661.firebaseapp.com",
  databaseURL: "https://airport-board-ee661-default-rtdb.firebaseio.com",
  projectId: "airport-board-ee661"
});

const db = getDatabase(app);

let anuncios = [];
let anunciosActivos = false;
let vuelosData = [];
let window_avisos = {};
let countdownActivo = {};
let timerDuracion = 25;
let timerInterval = null;
let indexAnuncio = 0;
let anuncioLoopInterval = null;
let anuncioHideTimeout = null;
let cumpleanosData = {};
let anuncioImageScale = 60;
let flightSectionSeconds = 15;
let titlesData = {};
let visibilityData = {};
let airlinesExtraData = {};
let positionsData = {};
let selectedDate = new Date().toISOString().slice(0, 10);
let unsubscribeFlightsByDate = null;

/** Evita repetir el mismo aviso de voz (clave: fecha|vuelo|minutos restantes) */
let speechArrivalFlags = Object.create(null);
const ARRIVAL_SPEECH_MINUTES = [30, 10, 1];

/** Tras un toque/tecla: desbloquea voz TTS + Web Audio (Samsung TV suele exigirlo) */
let mediaUnlocked = false;

function prepareSpeechSynth() {
    if (!window.speechSynthesis) return;
    try {
        if (speechSynthesis.paused) speechSynthesis.resume();
    } catch (e) { /* noop */ }
}

function pickLatinoSpanishVoice() {
    const voices = speechSynthesis.getVoices();
    if (!voices.length) return null;
    const pick = (re) => voices.find((v) => re.test(v.lang));
    return pick(/^es-MX/i)
        || pick(/^es-419/i)
        || pick(/^es-US/i)
        || pick(/^es-AR/i)
        || pick(/^es-CO/i)
        || pick(/^es-CL/i)
        || pick(/^es-PE/i)
        || voices.find((v) => v.lang.startsWith("es") && !/^es-ES/i.test(v.lang))
        || voices.find((v) => v.lang.startsWith("es"));
}

/** Números en grupos de 2 (impar: 1 dígito + pares). Ej: 627→6,27 | 1528→15,28 | 61528→6,15,28 */
function chunkDigitRun(run) {
    const d = String(run).replace(/\D/g, "");
    if (d.length <= 2) return d;
    const parts = [];
    let i = 0;
    if (d.length % 2 === 1) {
        parts.push(d.slice(0, 1));
        i = 1;
    }
    while (i < d.length) {
        parts.push(d.slice(i, i + 2));
        i += 2;
    }
    return parts.join(", ");
}

/** Para voz: no leer 1528 como entero; ej. B6 627/1528 → B6, 6, 27. 15, 28 */
function formatVueloForSpeech(vuelo) {
    const s = (vuelo || "").replace(/\s+/g, " ").trim();
    if (!s) return "desconocido";
    const legs = s.split("/").map((x) => x.trim()).filter(Boolean);

    function formatOneLeg(leg) {
        const t = leg.trim();
        const m = t.match(/^(.+?)\s+(\d{2,})$/);
        if (m) {
            return `${m[1].trim()}, ${chunkDigitRun(m[2])}`;
        }
        if (/^\d+$/.test(t)) {
            return chunkDigitRun(t);
        }
        return t.replace(/\d{3,}/g, (r) => chunkDigitRun(r));
    }

    return legs.map(formatOneLeg).join(". ");
}

function buildArrivalPhrase(vuelo, minutes) {
    const v = formatVueloForSpeech(vuelo);
    const tiempo = minutes === 1 ? "1 minuto" : `${minutes} minutos`;
    return `Vuelo ${v}. Aterrizando en ${tiempo}.`;
}

function speakTwiceLatino(text) {
    if (!window.speechSynthesis || typeof SpeechSynthesisUtterance === "undefined") return;
    prepareSpeechSynth();
    const voice = pickLatinoSpanishVoice();
    const lang = voice?.lang?.startsWith("es") ? voice.lang : "es-MX";

    const mk = () => {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = lang;
        u.rate = 0.88;
        u.pitch = 1;
        if (voice) u.voice = voice;
        return u;
    };

    const u1 = mk();
    u1.onend = () => {
        prepareSpeechSynth();
        try {
            speechSynthesis.speak(mk());
        } catch (e) { /* noop */ }
    };
    u1.onerror = () => {
        try {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = "es";
            u.rate = 0.88;
            speechSynthesis.speak(u);
        } catch (e2) { /* noop */ }
    };
    try {
        speechSynthesis.speak(u1);
    } catch (e) {
        try {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = "es";
            u.rate = 0.88;
            speechSynthesis.speak(u);
        } catch (e2) { /* noop */ }
    }
}

function showArrivalToast(vuelo, minutes) {
    const el = document.getElementById("flightArrivalToast");
    if (!el) return;
    el.innerHTML = "";
    const t1 = document.createElement("div");
    t1.className = "toast-title";
    t1.textContent = "Aviso llegada";
    const t2 = document.createElement("div");
    t2.className = "toast-body";
    const minTxt = minutes === 1 ? "1 minuto" : `${minutes} minutos`;
    t2.textContent = `Vuelo ${vuelo} · ${minTxt}`;
    el.appendChild(t1);
    el.appendChild(t2);
    el.classList.add("visible");
    clearTimeout(showArrivalToast._hide);
    showArrivalToast._hide = setTimeout(() => el.classList.remove("visible"), 12000);
}

function playArrivalBeep() {
    try {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        let ctx = window.__boardAudioCtx;
        if (!ctx) {
            ctx = new Ctx();
            window.__boardAudioCtx = ctx;
        }
        if (ctx.state === "suspended") {
            ctx.resume().catch(() => {});
        }
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = "sine";
        o.frequency.setValueAtTime(720, ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(520, ctx.currentTime + 0.08);
        g.gain.setValueAtTime(0.0001, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.11, ctx.currentTime + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.18);
        o.connect(g);
        g.connect(ctx.destination);
        const t0 = ctx.currentTime;
        o.start(t0);
        o.stop(t0 + 0.2);
    } catch (e) { /* noop */ }
}

function tryArrivalSpeech(r, diffMin, dateStr) {
    if (diffMin <= 0 || !r?.llegada) return;
    if (!ARRIVAL_SPEECH_MINUTES.includes(diffMin)) return;
    const vuelo = (r.vuelo || "").trim() || "N/A";
    const key = `${dateStr}|${vuelo}|${diffMin}`;
    if (speechArrivalFlags[key]) return;
    speechArrivalFlags[key] = true;

    showArrivalToast(vuelo, diffMin);
    playArrivalBeep();

    if (mediaUnlocked && window.speechSynthesis) {
        speakTwiceLatino(buildArrivalPhrase(vuelo, diffMin));
    }
}

function unlockMediaFromUser() {
    if (mediaUnlocked) return;
    mediaUnlocked = true;
    prepareSpeechSynth();
    if (window.speechSynthesis) speechSynthesis.getVoices();
    try {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (Ctx && !window.__boardAudioCtx) {
            window.__boardAudioCtx = new Ctx();
        }
        if (window.__boardAudioCtx?.state === "suspended") {
            window.__boardAudioCtx.resume().catch(() => {});
        }
    } catch (e) { /* noop */ }
}

window.addEventListener("pointerdown", unlockMediaFromUser, { once: true, passive: true });
window.addEventListener("keydown", unlockMediaFromUser, { once: true });

if (window.speechSynthesis) {
    speechSynthesis.getVoices();
    window.addEventListener("voiceschanged", () => speechSynthesis.getVoices());
    [100, 400, 1200].forEach((ms) => setTimeout(() => speechSynthesis.getVoices(), ms));
}

function mostrarAnuncios(){
    const contenedor = document.getElementById("anuncioFull");

    function escapeHtml(s){
        return String(s ?? "")
            .replace(/&/g,"&amp;")
            .replace(/</g,"&lt;")
            .replace(/"/g,"&quot;");
    }

    function formatearFechaBonita(fechaISO){
        if(!fechaISO) return "";
        const fecha = new Date(fechaISO + "T00:00:00");
        const texto = fecha.toLocaleDateString("es-DO", { day: "numeric", month: "long" });
        return texto.charAt(0).toUpperCase() + texto.slice(1);
    }

    function formatearFechaCartulina(fechaISO){
        if(!fechaISO) return "";
        const fecha = new Date(fechaISO + "T12:00:00");
        const d = fecha.getDate();
        const mes = fecha.toLocaleDateString("es-DO", { month: "long" });
        return `${String(d).padStart(2,"0")} DE ${mes.toUpperCase()}`;
    }

    function relojCumpleBloque(){
        const now = new Date();
        return `
            <div class="cumple-clock">
                <div class="d">${now.toLocaleDateString("es-DO",{ weekday:"long", day:"2-digit", month:"long", year:"numeric" })}</div>
                <div class="t">${now.toLocaleTimeString("es-DO")}</div>
            </div>`;
    }

    function extraerNombreDesdeTexto(texto){
        if(!texto) return "";
        return texto
            .replace(/feliz cumpleaños/ig, "")
            .replace(/feliz cumple/ig, "")
            .trim();
    }

    function buscarCumplePorNombre(nombre){
        const normalizar = (s) => (s || "").toString().toLowerCase().trim();
        const objetivo = normalizar(nombre);
        if(!objetivo) return null;
        return Object.values(cumpleanosData || {}).find((c) => {
            const n = normalizar(c?.nombre);
            return n === objetivo || n.includes(objetivo) || objetivo.includes(n);
        }) || null;
    }

    function renderCumpleCard(a){
        const logoSrc = "https://trainingreport.longportsecurity.com.co/pix/logolongport.png";
        const lista = Array.isArray(a.cumpleaneros) ? a.cumpleaneros : [];
        if(lista.length){
            const cards = lista.map((item, idx) => {
                const nombre = escapeHtml(item?.nombre || "Cumpleañero");
                const foto = item?.foto || "";
                const fechaShowRaw = item?.fecha
                    ? formatearFechaCartulina(item.fecha)
                    : (item?.fechaTexto || formatearFechaBonita(item?.fecha) || "");
                const fechaShow = escapeHtml(fechaShowRaw);
                const staggerClass = idx === 2 ? "cumple-person stagger" : "cumple-person";
                const imgHtml = foto
                    ? `<img src="${foto}" alt="" loading="lazy" referrerpolicy="no-referrer">`
                    : `<div style="width:100%;height:100%;border-radius:50%;background:#e2e8f0;"></div>`;
                return `
                    <div class="${staggerClass}">
                        <div class="cumple-photo-ring">${imgHtml}</div>
                        <div class="cumple-plaque">
                            <div class="cumple-plaque-name">${nombre}</div>
                            <div class="cumple-plaque-date">${fechaShow}</div>
                        </div>
                    </div>`;
            }).join("");

            contenedor.innerHTML = `
                <div class="cumple-celebracion">
                    <span class="cumple-deco-balloon b1" aria-hidden="true">🎈</span>
                    <span class="cumple-deco-balloon b2" aria-hidden="true">🎈</span>
                    <div class="cumple-topbar">
                        <div class="cumple-brand">
                            <img src="${logoSrc}" alt="">
                            <span>LONGPORT BOARD POP</span>
                        </div>
                        ${relojCumpleBloque()}
                    </div>
                    <div class="cumple-hero">
                        <h1>CUMPLEAÑEROS</h1>
                        <span class="script">Del mes</span>
                        <p class="cumple-sub">Celebramos tu vida, tu talento y todo lo que aportas cada día.</p>
                    </div>
                    <div class="cumple-grid">${cards}</div>
                </div>`;
            return;
        }

        const nombreInferido = a.nombre || extraerNombreDesdeTexto(a.texto);
        const cumpleMatch = buscarCumplePorNombre(nombreInferido);
        const nombre = escapeHtml(nombreInferido || cumpleMatch?.nombre || "Cumpleañero");
        const foto = a.media || a.foto || cumpleMatch?.foto || "";
        const fechaRaw = a.fecha || cumpleMatch?.fecha;
        const fechaShow = escapeHtml(
            fechaRaw ? formatearFechaCartulina(fechaRaw) : (a.fechaTexto || formatearFechaBonita(cumpleMatch?.fecha) || "")
        );
        const imgHtml = foto
            ? `<img src="${foto}" alt="" loading="lazy" referrerpolicy="no-referrer">`
            : `<div style="width:100%;height:100%;border-radius:50%;background:#e2e8f0;"></div>`;

        contenedor.innerHTML = `
            <div class="cumple-celebracion">
                <span class="cumple-deco-balloon b1" aria-hidden="true">🎈</span>
                <div class="cumple-topbar">
                    <div class="cumple-brand">
                        <img src="${logoSrc}" alt="">
                        <span>LONGPORT BOARD POP</span>
                    </div>
                    ${relojCumpleBloque()}
                </div>
                <div class="cumple-hero">
                    <h1>CUMPLEAÑEROS</h1>
                    <span class="script">Del mes</span>
                </div>
                <div class="cumple-grid">
                    <div class="cumple-person">
                        <div class="cumple-photo-ring">${imgHtml}</div>
                        <div class="cumple-plaque">
                            <div class="cumple-plaque-name">${nombre}</div>
                            <div class="cumple-plaque-date">${fechaShow}</div>
                        </div>
                    </div>
                </div>
            </div>`;
    }

    if(anuncioLoopInterval){
        clearInterval(anuncioLoopInterval);
        anuncioLoopInterval = null;
    }
    if(anuncioHideTimeout){
        clearTimeout(anuncioHideTimeout);
        anuncioHideTimeout = null;
    }

    if(!anuncios.length || !anunciosActivos){
        contenedor.style.display = "none";
        contenedor.classList.remove("anuncio-full--cumple");
        return;
    }

    function loop(){
        if(!anuncios.length || !anunciosActivos){
            contenedor.style.display = "none";
            contenedor.classList.remove("anuncio-full--cumple");
            return;
        }
        const a = anuncios[indexAnuncio];
        const esMensajeCumple = a.tipo === "mensaje" && /feliz cumpleaños/i.test(a.texto || "");

        contenedor.style.display = "flex";

        if(a.tipo === "mensaje" && !esMensajeCumple){
            contenedor.classList.remove("anuncio-full--cumple");
            contenedor.innerHTML = `
                <div style="text-align:center; color:#00ffff; font-size:40px;">
                    ${a.texto || ""}
                    ${a.media ? `<br><img src="${a.media}" style="max-width:${anuncioImageScale}%; margin-top:20px;">` : ""}
                </div>
            `;
        }

        if(a.tipo === "cumple" || esMensajeCumple){
            contenedor.classList.add("anuncio-full--cumple");
            renderCumpleCard(a);
        }

        anuncioHideTimeout = setTimeout(()=>{
            contenedor.style.display = "none";
        }, (a.duracion || 10) * 1000);

        indexAnuncio = (indexAnuncio + 1) % anuncios.length;
    }

    loop();
    anuncioLoopInterval = setInterval(loop, flightSectionSeconds * 1000);
}

function renderVuelos(){
    let html = "";
    vuelosData.forEach(r => {
        let [h,m] = (r.llegada || "00:00").split(":");
        let llegada = new Date();
        llegada.setHours(h,m,0);

        let diffMs = llegada.getTime() - Date.now();
        let diffMin = Math.floor(diffMs / 60000);
        let hours = Math.floor(diffMin / 60);
        let minutes = diffMin % 60;

        let estadoNorm = (r.estado || "").toString().toUpperCase().replace(/\s+/g,"-").replace(/_/g,"-");
        let estadoManual = ["BOARDING","DEPARTED","DELAYED","CANCELLED","DIVERTED"].includes(estadoNorm);

        let estadoFinal = r.estado || "ON-TIME";
        let estadoClase = estadoFinal.toLowerCase().replace(/\s+/g,"-");
        let extraClass = "";
        let totalMin = 120;
        let progreso = 100 - (diffMin / totalMin * 100);
        
        if(progreso < 0) progreso = 0;
        if(progreso > 100) progreso = 100;

        if(!estadoManual){
            if(diffMin <= 0){
                estadoFinal = "ARRIVED";
                estadoClase = "arrived";
            }
            if(diffMin <= 30 && diffMin > 0) extraClass = "blink";
            if(diffMin <= 10 && diffMin > 0) estadoFinal = "ARRIVING";
        } else if(diffMin <= 30 && diffMin > 0) {
            extraClass = "blink";
        }

        let countdown = "0 min";
        let countdownClass = "countdown-green";
        if(diffMin > 0){
            countdown = hours > 0 ? hours + "h " + minutes + "m" : minutes + " min";
            if(diffMin <= 60) countdownClass = "countdown-yellow";
            if(diffMin <= 15) countdownClass = "countdown-red";
        }

        tryArrivalSpeech(r, diffMin, selectedDate);

        html += `
        <tr class="${estadoClase} ${extraClass}">
        <td>${r.vuelo}</td>
        <td>${r.destino}</td>
        <td class="td-llegada">
            <span class="hora-llegada">${r.llegada}</span>
            ${r.salidaOrigen ? `<small class="ruta-origen">Salió origen ${r.salidaOrigen}</small>` : ""}
            <span class="countdown-line"><span class="countdown-pill ${countdownClass}">${countdown}</span></span>
            <div class="flight-progress">
                <div class="flight-bar" style="width:${progreso}%"></div>
                <div class="plane" style="left:${progreso}%" title="En ruta — vuelo comercial">✈️</div>
            </div>
        </td>
        <td>${r.salida}</td>
        <td>${r.gate}</td>
        <td>${estadoFinal}</td>
        </tr>`;
    });
    document.getElementById("board").innerHTML = html;
}

setInterval(renderVuelos, 1000);

function renderExtraAirlinePanels(){
    const cont = document.getElementById("extraAirlinePanels");
    if(!cont) return;
    const extras = Object.entries(airlinesExtraData || {});
    if(!extras.length){
        cont.innerHTML = "";
        return;
    }

    cont.innerHTML = extras.map(([slug, item]) => {
        const title = titlesData[slug] || `ASIGNACIONES ${(item?.name || slug).toUpperCase()}`;
        const visible = visibilityData[slug] !== false;
        return `
            <div class="positions-panel" id="panel_${slug}" style="border-top:2px solid #f59e0b; background:rgba(245,158,11,0.08); display:${visible ? "block" : "none"};">
                <div class="panel-title">${title}</div>
                <div class="positions-grid" id="positionsExtra_${slug}"></div>
            </div>
        `;
    }).join("");
}

function renderPositionsPanels(){
    let west = "";
    let jet = "";
    const extraBuckets = {};

    Object.entries(positionsData).forEach(([k,v]) => {
        let card = `<div class="pos-card"><div class="role">${k.toUpperCase()}</div><div class="name">${v}</div></div>`;
        if(k.includes("__")){
            const slug = k.split("__")[1];
            if(!extraBuckets[slug]) extraBuckets[slug] = "";
            extraBuckets[slug] += card;
        } else if(k.includes("west") || k.includes("wj")) west += card;
        else jet += card;
    });

    document.getElementById("positionsWestjet").innerHTML = west;
    document.getElementById("positionsJetblue").innerHTML = jet;
    Object.entries(extraBuckets).forEach(([slug, html]) => {
        const el = document.getElementById("positionsExtra_" + slug);
        if(el) el.innerHTML = html;
    });
}

    renderPositionsPanels();
