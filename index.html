<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="Logopn.png">
    <link rel="icon" href="Logopn.png" sizes="32x32">
<link rel="icon" href="Logopn.png" sizes="16x16">
<link rel="apple-touch-icon" href="Logopn.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Airport Board PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:linear-gradient(180deg,#000,#05080a);
    color:#7dd3fc;
    font-family:'Inter', sans-serif;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
}

.header{
    position:relative;
    z-index:1000000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    border-bottom:2px solid #0ea5e9;
}

.left{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo{ height:42px; }

.title{
    font-size:38px;
    font-family:'Orbitron', sans-serif;
    color:#38bdf8;
}

.time{
    font-size:70px;
    font-family:'Inter', sans-serif;
    font-weight:700;
    letter-spacing:3px;
    color:#00ffff;
}

.fullscreen-btn{
    background:transparent;
    color:#22d3ee;
    border:1px solid #22d3ee;
    padding:6px 10px;
    border-radius:6px;
    cursor: pointer;
}

.table-container{ flex:1; overflow:hidden; }

table{ width:100%; border-collapse:collapse; }

th{
    font-size:24px;
    padding:12px;
    border-bottom:1px solid #0ea5e9;
}

td{
    font-size:30px;
    padding:14px;
    text-align:center;
}

.on-time { color:#4ade80; }
.delayed { color:#f87171; }
.boarding { color:#38bdf8; }
.departed { color:#fbbf24; }
.arrived { color:#94a3b8; }

tr.on-time { background:rgba(0,40,20,0.6); }
tr.delayed { background:rgba(60,0,0,0.6); }
tr.boarding { background:rgba(0,30,60,0.6); }
tr.departed { background:rgba(60,40,0,0.6); }
tr.arrived { background:rgba(50,50,50,0.5); }

.blink{ animation:blink 1s infinite; }
@keyframes blink{ 50%{opacity:0.4;} }

.positions-wrapper{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.jetblue{
    border-top:2px solid #1d4ed8;
    background:rgba(29,78,216,0.1);
}

.westjet{
    border-top:2px solid #16a34a;
    background:rgba(22,163,74,0.1);
}

.positions-wrapper.hidden { display: none; }

.positions-panel{
    padding:6px 10px;
}

.panel-title{
    font-size:14px;
    margin-bottom:4px;
    font-weight:bold;
    letter-spacing:1px;
}

.positions-grid{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
}

.pos-card{
    min-width:110px;
    padding:6px;
    border-radius:6px;
    background:#e2e8f0;
    border:1px solid #94a3b8;
    text-align:center;
}

.role{
    font-size:10px;
    color:#334155;
}

.name{
    font-size:13px;
    font-weight:bold;
    color:#0f172a;
}

.ticker{
    height:40px;
    border-top:2px solid #0ea5e9;
    display:flex;
    align-items:center;
    overflow:hidden;
}

.ticker-text{
    white-space:nowrap;
    font-size:22px;
    padding-left:100%;
    animation:scroll 25s linear infinite;
}

@keyframes scroll{
    from{transform:translateX(0);}
    to{transform:translateX(-100%);}
}

.anuncio-full{
    position:fixed;
    top:100px;
    left:0;
    width:100%;
    height:calc(100% - 100px);
    background:black;
    z-index:999999;
    display:none;
    align-items:center;
    justify-content:center;
}

.flight-progress{
    position:relative;
    height:6px;
    background:#1e293b;
    border-radius:10px;
    margin-top:5px;
}

.flight-bar{
    height:100%;
    background:#22d3ee;
    border-radius:10px;
    width:0%;
}

.plane{
    position:absolute;
    top:-10px;
    font-size:14px;
    transform:translateX(-50%);
}

.countdown-green { color:#22c55e !important; }
.countdown-yellow { color:#facc15 !important; }
.countdown-red { color:#ef4444 !important; }

@media (max-width: 768px){
    .time{ font-size:30px; }
    .title{ font-size:20px; }
    th{ font-size:14px; }
    td{ font-size:16px; padding:8px; }
    .header{ padding:10px; }
    table{ font-size:12px; }
}
</style>
</head>

<body>
<div id="anuncioFull" class="anuncio-full"></div>
<div class="header">
    <div class="left">
        <img class="logo" src="https://trainingreport.longportsecurity.com.co/pix/logolongport.png">
        <div class="title">LONGPORT BOARD POP</div>
    </div>

    <div style="display:flex; align-items:center; gap:25px;">
        <div style="text-align:right;">
            <div id="date" style="font-size:20px; color:#7dd3fc;"></div>
            <div id="clock" class="time"></div>
        </div>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
    </div>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>VUELO</th>
<th>DESTINO</th>
<th>LLEGADA</th>
<th>SALIDA</th>
<th>GATE</th>
<th>ESTADO</th>
</tr>
</thead>
<tbody id="board"></tbody>
</table>
</div>

<div class="positions-wrapper">
    <div class="positions-panel westjet" id="westjetPanel">
        <div class="panel-title"></div>
        <div class="positions-grid" id="positionsWestjet"></div>
    </div>

    <div class="positions-panel jetblue" id="jetbluePanel">
        <div class="panel-title"></div>
        <div class="positions-grid" id="positionsJetblue"></div>
    </div>
    <div id="extraAirlinePanels"></div>
</div>

<div class="ticker">
    <div class="ticker-text" id="ticker"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp({
  apiKey: "933c97406ad862095eade39aef8a1f5d",
  authDomain: "airport-board-ee661.firebaseapp.com",
  databaseURL: "https://airport-board-ee661-default-rtdb.firebaseio.com",
  projectId: "airport-board-ee661"
});

const db = getDatabase(app);

let anuncios = [];
let anunciosActivos = false;
let vuelosData = [];
let window_avisos = {};
let countdownActivo = {};
let timerDuracion = 25;
let timerInterval = null;
let indexAnuncio = 0;
let anuncioLoopInterval = null;
let anuncioHideTimeout = null;
let cumpleanosData = {};
let anuncioImageScale = 60;
let flightSectionSeconds = 15;
let titlesData = {};
let visibilityData = {};
let airlinesExtraData = {};
let positionsData = {};
let selectedDate = new Date().toISOString().slice(0, 10);
let unsubscribeFlightsByDate = null;

// 📋 CARGAR DATOS
onValue(ref(db,"anuncios"), snap => {
    anuncios = Object.values(snap.val() || {}).filter(a => a && (a.tipo === "mensaje" || a.tipo === "cumple"));
    indexAnuncio = 0;
    mostrarAnuncios();
    if(!anunciosActivos) return;
});

onValue(ref(db,"cumpleanos"), snap => {
    cumpleanosData = snap.val() || {};
});
onValue(ref(db,"titles/westjet"), snap => {
    document.querySelector(".westjet .panel-title").innerText = snap.val() || "ASIGNACIONES WESTJET";
});

onValue(ref(db,"titles/jetblue"), snap => {
    document.querySelector(".jetblue .panel-title").innerText = snap.val() || "ASIGNACIONES JETBLUE";
});

onValue(ref(db,"visibility/jetblue"), snap => {
    const visible = snap.val() !== false;
    document.getElementById("jetbluePanel").style.display = visible ? "block" : "none";
});

onValue(ref(db,"visibility/westjet"), snap => {
    const visible = snap.val() !== false;
    document.getElementById("westjetPanel").style.display = visible ? "block" : "none";
});

onValue(ref(db,"titles"), snap => {
    titlesData = snap.val() || {};
    renderExtraAirlinePanels();
});

onValue(ref(db,"visibility"), snap => {
    visibilityData = snap.val() || {};
    renderExtraAirlinePanels();
});

onValue(ref(db,"airlinesExtra"), snap => {
    airlinesExtraData = snap.val() || {};
    renderExtraAirlinePanels();
    renderPositionsPanels();
});

onValue(ref(db, "visibility/anuncios"), snap => {
    anunciosActivos = snap.val() !== false;
    if(!anunciosActivos){
        const contenedor = document.getElementById("anuncioFull");
        contenedor.style.display = "none";
    }else{
        mostrarAnuncios();
    }
});

onValue(ref(db,"ticker/duration"), snap => {
    timerDuracion = parseInt(snap.val()) || 25;
    // Actualizar animación
    document.documentElement.style.setProperty('--scroll-duration', timerDuracion + 's');
});

onValue(ref(db,"config/anuncioImageScale"), snap => {
    const value = parseInt(snap.val());
    if(!Number.isNaN(value) && value >= 30 && value <= 100){
        anuncioImageScale = value;
    }else{
        anuncioImageScale = 60;
    }
});

onValue(ref(db,"config/flightSectionSeconds"), snap => {
    const value = parseInt(snap.val());
    if(!Number.isNaN(value) && value >= 5 && value <= 180){
        flightSectionSeconds = value;
    }else{
        flightSectionSeconds = 15;
    }
    if(anunciosActivos) mostrarAnuncios();
});

// ⏰ RELOJ
setInterval(() => {
    const now = new Date();
    document.getElementById("clock").innerText = now.toLocaleTimeString('es-DO');
    document.getElementById("date").innerText = now.toLocaleDateString('es-DO', {
        weekday: 'long',
        day: '2-digit',
        month: 'short',
        year: 'numeric'
    });
}, 1000);

// 🛫 VUELOS
function watchFlightsForDate(dateStr){
    if(unsubscribeFlightsByDate) unsubscribeFlightsByDate();
    unsubscribeFlightsByDate = onValue(ref(db, "flightsByDate/" + dateStr), snap => {
        vuelosData = Object.values(snap.val() || {});
    });
}

onValue(ref(db, "config/selectedDate"), snap => {
    const cfgDate = snap.val();
    if(cfgDate) selectedDate = cfgDate;
    watchFlightsForDate(selectedDate);
});

function mostrarAnuncios(){
    const contenedor = document.getElementById("anuncioFull");

    function formatearFechaBonita(fechaISO){
        if(!fechaISO) return "";
        const fecha = new Date(fechaISO + "T00:00:00");
        const texto = fecha.toLocaleDateString("es-DO", { day: "numeric", month: "long" });
        return texto.charAt(0).toUpperCase() + texto.slice(1);
    }

    function extraerNombreDesdeTexto(texto){
        if(!texto) return "";
        return texto
            .replace(/feliz cumpleaños/ig, "")
            .replace(/feliz cumple/ig, "")
            .trim();
    }

    function buscarCumplePorNombre(nombre){
        const normalizar = (s) => (s || "").toString().toLowerCase().trim();
        const objetivo = normalizar(nombre);
        if(!objetivo) return null;
        return Object.values(cumpleanosData || {}).find((c) => {
            const n = normalizar(c?.nombre);
            return n === objetivo || n.includes(objetivo) || objetivo.includes(n);
        }) || null;
    }

    function renderCumpleCard(a){
        const lista = Array.isArray(a.cumpleaneros) ? a.cumpleaneros : [];
        if(lista.length){
            const cards = lista.map((item) => {
                const nombre = item?.nombre || "Cumpleañero";
                const foto = item?.foto || "";
                const fechaBonita = item?.fechaTexto || formatearFechaBonita(item?.fecha) || "";
                return `
                    <div style="background:linear-gradient(180deg,#0f172a,#111827); border:2px solid #334155; border-radius:16px; padding:14px; text-align:center; min-height:300px; display:flex; flex-direction:column; justify-content:flex-start; align-items:center; box-shadow:0 10px 25px rgba(2,6,23,.45);">
                        ${foto ? `<img src="${foto}" style="width:175px; height:175px; object-fit:cover; border-radius:14px; border:2px solid #38bdf8; margin-bottom:12px;">` : `<div style="width:175px; height:175px; border-radius:14px; border:2px dashed #334155; margin-bottom:12px;"></div>`}
                        <div style="font-size:26px; font-weight:800; color:#f8fafc; line-height:1.1; margin-bottom:8px; word-break:break-word;">${nombre}</div>
                        <div style="margin-top:auto; font-size:17px; font-weight:600; color:#a5f3fc; background:rgba(14,165,233,.12); border:1px solid rgba(56,189,248,.35); border-radius:999px; padding:6px 12px;">${fechaBonita}</div>
                    </div>
                `;
            }).join("");

            contenedor.innerHTML = `
                <div style="display:flex; flex-direction:column; justify-content:flex-start; width:100%; height:100%; align-items:center; padding:72px 16px 24px 16px;">
                    <div style="display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:16px; flex-wrap:wrap; width:min(1220px, 96vw);">
                        <div style="font-size:clamp(30px, 4vw, 50px); line-height:1.05; letter-spacing:1px; color:#67e8f9; font-weight:900;">CUMPLEANOS DE ESTE MES</div>
                        <div style="font-size:clamp(14px, 1.7vw, 20px); color:#bae6fd; border:1px solid rgba(125,211,252,.45); border-radius:999px; padding:6px 12px; background:rgba(14,165,233,.14);">${lista.length} celebrando</div>
                    </div>
                    <div style="display:grid; grid-template-columns:repeat(auto-fit, minmax(230px, 1fr)); gap:16px; width:min(1220px, 96vw);">
                        ${cards}
                    </div>
                </div>
            `;
            return;
        }

        const nombreInferido = a.nombre || extraerNombreDesdeTexto(a.texto);
        const cumpleMatch = buscarCumplePorNombre(nombreInferido);
        const nombre = nombreInferido || cumpleMatch?.nombre || "Cumpleañero";
        const foto = a.media || a.foto || cumpleMatch?.foto || "";
        const fechaBonita = a.fechaTexto || formatearFechaBonita(a.fecha || cumpleMatch?.fecha) || "";

        contenedor.innerHTML = `
            <div style="display:flex; justify-content:center; width:100%;">
                <div style="background:#0b1220; border:2px solid #22d3ee; border-radius:16px; padding:20px; width:min(460px, 90vw); text-align:center; color:#e0f2fe; box-shadow:0 0 25px rgba(34,211,238,.25);">
                    <div style="font-size:24px; color:#67e8f9; margin-bottom:10px; font-weight:700;">Cumpleaños de este Mes</div>
                    ${foto ? `<div style="display:flex; justify-content:center; margin-bottom:12px;"><img src="${foto}" style="width:180px; height:180px; object-fit:cover; border-radius:12px; border:2px solid #38bdf8;"></div>` : ""}
                    <div style="font-size:32px; font-weight:700; color:#ffffff;">${nombre}</div>
                    <div style="margin-top:6px; font-size:20px; color:#a5f3fc;">${fechaBonita}</div>
                </div>
            </div>
        `;
    }

    if(anuncioLoopInterval){
        clearInterval(anuncioLoopInterval);
        anuncioLoopInterval = null;
    }
    if(anuncioHideTimeout){
        clearTimeout(anuncioHideTimeout);
        anuncioHideTimeout = null;
    }

    if(!anuncios.length || !anunciosActivos){
        contenedor.style.display = "none";
        return;
    }

    function loop(){
        if(!anuncios.length || !anunciosActivos){
            contenedor.style.display = "none";
            return;
        }
        const a = anuncios[indexAnuncio];
        const esMensajeCumple = a.tipo === "mensaje" && /feliz cumpleaños/i.test(a.texto || "");

        contenedor.style.display = "flex";

        if(a.tipo === "mensaje" && !esMensajeCumple){
            contenedor.innerHTML = `
                <div style="text-align:center; color:#00ffff; font-size:40px;">
                    ${a.texto || ""}
                    ${a.media ? `<br><img src="${a.media}" style="max-width:${anuncioImageScale}%; margin-top:20px;">` : ""}
                </div>
            `;
        }

        if(a.tipo === "cumple" || esMensajeCumple){
            renderCumpleCard(a);
        }

        anuncioHideTimeout = setTimeout(()=>{
            contenedor.style.display = "none";
        }, (a.duracion || 10) * 1000);

        indexAnuncio = (indexAnuncio + 1) % anuncios.length;
    }

    loop();
    anuncioLoopInterval = setInterval(loop, flightSectionSeconds * 1000);
}

function renderVuelos(){
    let html = "";
    vuelosData.forEach(r => {
        let estadoClase = (r.estado || "").toLowerCase().replace(/\s+/g,"-");
        let [h,m] = (r.llegada || "00:00").split(":");
        let llegada = new Date();
        llegada.setHours(h,m,0);

        let diffMs = llegada.getTime() - Date.now();
        let diffMin = Math.floor(diffMs / 60000);
        let hours = Math.floor(diffMin / 60);
        let minutes = diffMin % 60;

        let estadoFinal = r.estado;
        let extraClass = "";
        let totalMin = 120;
        let progreso = 100 - (diffMin / totalMin * 100);
        
        if(progreso < 0) progreso = 0;
        if(progreso > 100) progreso = 100;

        if(diffMin <= 0){
            estadoFinal = "ARRIVED";
            estadoClase = "arrived";
        }
        if(diffMin <= 30 && diffMin > 0) extraClass = "blink";
        if(diffMin <= 10 && diffMin > 0) estadoFinal = "ARRIVING";

        let countdown = "0 min";
        let countdownClass = "countdown-green";
        if(diffMin > 0){
            countdown = hours > 0 ? hours + "h " + minutes + "m" : minutes + " min";
            if(diffMin <= 60) countdownClass = "countdown-yellow";
            if(diffMin <= 15) countdownClass = "countdown-red";
        }

        html += `
        <tr class="${estadoClase} ${extraClass}">
        <td>${r.vuelo}</td>
        <td>${r.destino}</td>
        <td>
            ${r.llegada}
            <br><small class="${countdownClass}">${countdown}</small>
            <div class="flight-progress">
                <div class="flight-bar" style="width:${progreso}%"></div>
                <div class="plane" style="left:${progreso}%">✈️</div>
            </div>
        </td>
        <td>${r.salida}</td>
        <td>${r.gate}</td>
        <td>${estadoFinal}</td>
        </tr>`;
    });
    document.getElementById("board").innerHTML = html;
}

setInterval(renderVuelos, 1000);

// 👥 POSICIONES
function renderExtraAirlinePanels(){
    const cont = document.getElementById("extraAirlinePanels");
    if(!cont) return;
    const extras = Object.entries(airlinesExtraData || {});
    if(!extras.length){
        cont.innerHTML = "";
        return;
    }

    cont.innerHTML = extras.map(([slug, item]) => {
        const title = titlesData[slug] || `ASIGNACIONES ${(item?.name || slug).toUpperCase()}`;
        const visible = visibilityData[slug] !== false;
        return `
            <div class="positions-panel" id="panel_${slug}" style="border-top:2px solid #f59e0b; background:rgba(245,158,11,0.08); display:${visible ? "block" : "none"};">
                <div class="panel-title">${title}</div>
                <div class="positions-grid" id="positionsExtra_${slug}"></div>
            </div>
        `;
    }).join("");
}

function renderPositionsPanels(){
    let west = "";
    let jet = "";
    const extraBuckets = {};

    Object.entries(positionsData).forEach(([k,v]) => {
        let card = `<div class="pos-card"><div class="role">${k.toUpperCase()}</div><div class="name">${v}</div></div>`;
        if(k.includes("__")){
            const slug = k.split("__")[1];
            if(!extraBuckets[slug]) extraBuckets[slug] = "";
            extraBuckets[slug] += card;
        } else if(k.includes("west") || k.includes("wj")) west += card;
        else jet += card;
    });

    document.getElementById("positionsWestjet").innerHTML = west;
    document.getElementById("positionsJetblue").innerHTML = jet;
    Object.entries(extraBuckets).forEach(([slug, html]) => {
        const el = document.getElementById("positionsExtra_" + slug);
        if(el) el.innerHTML = html;
    });
}

onValue(ref(db,"positions"), snap => {
    positionsData = snap.val() || {};
    renderPositionsPanels();
});

// 📢 TICKER
onValue(ref(db,"ticker/message"), snap => {
    document.getElementById("ticker").innerText = snap.val() || "Bienvenidos";
});

// 🖥️ FULLSCREEN
window.toggleFullscreen = function(){
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    }else{
        document.exitFullscreen();
    }
};

window.addEventListener("load", () => {
    setTimeout(() => {
        document.documentElement.requestFullscreen().catch(() => {});
    }, 1500);
});

</script>
</body>
</html>
