<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Airport Board LONGPORT</title>

<style>
body {
    margin:0;
    background:#0a0a0a;
    color:#f5f5f5;
    font-family: 'Segoe UI', monospace;
}

.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background:#111;
    border-bottom:3px solid #00c3ff;
}

.left {
    display:flex;
    align-items:center;
    gap:15px;
}

.logo {
    height:40px;
}

.title {
    font-size:35px;
    color:#00c3ff;
}

.time {
    font-size:50px;
    font-weight:bold;
}

table {
    width:100%;
    border-collapse:collapse;
}

th {
    font-size:24px;
    padding:15px;
    color:#00c3ff;
    border-bottom:2px solid #00c3ff;
}

td {
    font-size:26px;
    padding:15px;
    text-align:center;
    border-bottom:1px solid #222;
}

.on-time { color:#00ff00; }
.delayed { color:#ff0000; }

tr.on-time { background:#002800; }
tr.delayed { background:#330000; }

.countdown {
    color:#ffd700;
    font-weight:bold;
}

.blink-row {
    animation: blink 1s infinite;
}

@keyframes blink {
    50% { opacity: 0.3; }
}

/* 🔥 TICKER */
.ticker {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: #000;
    border-top: 3px solid #00c3ff;
    overflow: hidden;
    height: 50px;
    display: flex;
    align-items: center;
}

.ticker-text {
    white-space: nowrap;
    font-size: 28px;
    color: #00ff9c;
    font-weight: bold;
    padding-left: 100%;
    animation: scrollText 20s linear infinite;
}

@keyframes scrollText {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

/* 🔥 MODOS AUTOMÁTICOS */
.compact td {
    font-size:18px;
    padding:8px;
}

.compact th {
    font-size:18px;
    padding:10px;
}

.super-compact td {
    font-size:14px;
    padding:5px;
}

.super-compact th {
    font-size:14px;
    padding:8px;
}

</style>
</head>

<body>

<div class="header">
    <div class="left">
        <img id="logo" class="logo">
        <div class="title">✈️ AIRPORT BOARD</div>
    </div>
    <div class="time" id="clock"></div>
</div>

<table>
<thead>
<tr>
<th>VUELO</th>
<th>DESTINO</th>
<th>LLEGADA</th>
<th>SALIDA</th>
<th>GATE</th>
<th>ESTADO</th>
</tr>
</thead>

<tbody id="board"></tbody>
</table>

<!-- 🔥 TICKER -->
<div class="ticker">
    <div class="ticker-text" id="tickerText">
        ✈️ Bienvenidos | Presentarse 2 horas antes | Puertas cierran 20 min antes | Seguridad en todo momento
    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDba69idtZm1wE3Xc64NEgfgmMYDbj5uFI",
  authDomain: "airport-board-ee661.firebaseapp.com",
  databaseURL: "https://airport-board-ee661-default-rtdb.firebaseio.com",
  projectId: "airport-board-ee661"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* LOGO */
document.getElementById("logo").src =
"https://trainingreport.longportsecurity.com.co/pix/logolongport.png?v=" + Date.now();

/* RELOJ */
setInterval(()=>{
    document.getElementById("clock").innerText =
    new Date().toLocaleTimeString('es-DO');
},1000);

/* TIEMPO */
function getTimeData(timeStr){
    const now = new Date();
    const [h,m] = timeStr.split(":").map(Number);

    const target = new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,m,0);
    return { diff: target-now };
}

/* CONTROL INTERVALO */
let intervalo = null;

const flightsRef = ref(db,"flights");

onValue(flightsRef,(snap)=>{
    const data = snap.val();
    const tbody = document.getElementById("board");
    const table = document.querySelector("table");

    tbody.innerHTML="";
    table.classList.remove("compact","super-compact");

    if(!data) return;

    const arr = Object.values(data);

    /* 🔥 AJUSTE AUTOMÁTICO */
    if(arr.length > 6){
        table.classList.add("compact");
    }

    if(arr.length > 10){
        table.classList.add("super-compact");
    }

    arr.forEach(row=>{
        let estadoClase = (row.estado||"").toLowerCase().replace(/\s+/g,"-");

        tbody.innerHTML += `
        <tr class="${estadoClase}">
            <td>${row.vuelo}</td>
            <td>${row.destino}</td>
            <td>${row.llegada}</td>
            <td>${row.salida}</td>
            <td>${row.gate}</td>
            <td>${row.estado}</td>
        </tr>`;
    });

    iniciarContador(arr);
});

/* COUNTDOWN */
function iniciarContador(data){

    if(intervalo) clearInterval(intervalo);

    intervalo = setInterval(()=>{

        const rows = document.querySelectorAll("#board tr");

        rows.forEach((rowEl,i)=>{

            const d = data[i];
            if(!d) return;

            const cell = rowEl.children[2];

            let diff = getTimeData(d.llegada).diff;

            let txt;

            if(diff<=0){
                txt="ATERRIZADO";
            }else{
                let m=Math.floor(diff/60000);
                let h=Math.floor(m/60);
                m=m%60;

                txt=`${h}h ${m}m`;

                if(diff<=1800000){
                    rowEl.classList.add("blink-row");
                }
            }

            cell.innerHTML = `${d.llegada} <span class="countdown">(${txt})</span>`;
        });

    },1000);
}

</script>

</body>
</html>
