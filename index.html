<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="icon" type="image/png" href="Logopn.png">
    <link rel="icon" href="Logopn.png" sizes="32x32">
<link rel="icon" href="Logopn.png" sizes="16x16">
<link rel="apple-touch-icon" href="Logopn.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Airport Board PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,500&family=Great+Vibes&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    background:linear-gradient(180deg,#000,#05080a);
    color:#7dd3fc;
    font-family:'Inter', sans-serif;
    display:flex;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
}

.header{
    position:relative;
    z-index:1000000;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    border-bottom:2px solid #0ea5e9;
}

.left{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo{ height:42px; }

.title{
    font-size:38px;
    font-family:'Orbitron', sans-serif;
    color:#38bdf8;
}

.time{
    font-size:70px;
    font-family:'Inter', sans-serif;
    font-weight:700;
    letter-spacing:3px;
    color:#00ffff;
}

.fullscreen-btn{
    background:transparent;
    color:#22d3ee;
    border:1px solid #22d3ee;
    padding:6px 10px;
    border-radius:6px;
    cursor: pointer;
}

.table-container{ flex:1; overflow:hidden; }

table{ width:100%; border-collapse:collapse; }

th{
    font-size:24px;
    padding:12px;
    border-bottom:1px solid #0ea5e9;
}

td{
    font-size:30px;
    padding:14px;
    text-align:center;
}

.on-time { color:#4ade80; }
.delayed { color:#f87171; }
.boarding { color:#38bdf8; }
.departed { color:#fbbf24; }
.arrived { color:#94a3b8; }

.ruta-origen{
    display:block;
    margin-top:3px;
    margin-bottom:0;
    font-size:0.34em;
    color:rgba(125,211,252,.72);
    font-weight:500;
    letter-spacing:0.03em;
    line-height:1.2;
}

.td-llegada{
    line-height:1.1;
    vertical-align:middle;
    padding-top:10px;
    padding-bottom:10px;
}

.td-llegada .hora-llegada{
    display:block;
    line-height:1.05;
}

.td-llegada .countdown-line{
    display:block;
    margin-top:8px;
    line-height:1.2;
}

/* Conteo regresivo: protagonista */
.countdown-pill{
    display:inline-block;
    font-family:'Inter', sans-serif;
    font-size:clamp(22px, 2.6vw, 34px);
    font-weight:800;
    letter-spacing:0.06em;
    padding:8px 18px;
    border-radius:14px;
    border:2px solid transparent;
    text-shadow:0 0 28px currentColor;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.12), 0 4px 18px rgba(0,0,0,.35);
}

.countdown-pill.countdown-green{
    color:#4ade80 !important;
    background:rgba(34,197,94,.18);
    border-color:rgba(74,222,128,.5);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.1), 0 0 32px rgba(34,197,94,.25), 0 4px 18px rgba(0,0,0,.35);
}

.countdown-pill.countdown-yellow{
    color:#facc15 !important;
    background:rgba(234,179,8,.16);
    border-color:rgba(250,204,21,.55);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.1), 0 0 28px rgba(250,204,21,.22), 0 4px 18px rgba(0,0,0,.35);
}

.countdown-pill.countdown-red{
    color:#f87171 !important;
    background:rgba(239,68,68,.18);
    border-color:rgba(248,113,113,.55);
    box-shadow:inset 0 1px 0 rgba(255,255,255,.1), 0 0 32px rgba(239,68,68,.28), 0 4px 18px rgba(0,0,0,.35);
}

tr.on-time { background:rgba(0,40,20,0.6); }
tr.delayed { background:rgba(60,0,0,0.6); }
tr.boarding { background:rgba(0,30,60,0.6); }
tr.departed { background:rgba(60,40,0,0.6); }
tr.arrived { background:rgba(50,50,50,0.5); }

.blink{ animation:blink 1s infinite; }
@keyframes blink{ 50%{opacity:0.4;} }

.positions-wrapper{
    display:flex;
    flex-direction:column;
    gap:6px;
}

.jetblue{
    border-top:2px solid #1d4ed8;
    background:rgba(29,78,216,0.1);
}

.westjet{
    border-top:2px solid #16a34a;
    background:rgba(22,163,74,0.1);
}

.positions-wrapper.hidden { display: none; }

.positions-panel{
    padding:6px 10px;
}

.panel-title{
    font-size:14px;
    margin-bottom:4px;
    font-weight:bold;
    letter-spacing:1px;
}

.positions-grid{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
}

.pos-card{
    min-width:110px;
    padding:6px;
    border-radius:6px;
    background:#e2e8f0;
    border:1px solid #94a3b8;
    text-align:center;
}

.role{
    font-size:10px;
    color:#334155;
}

.name{
    font-size:13px;
    font-weight:bold;
    color:#0f172a;
}

.ticker{
    height:40px;
    border-top:2px solid #0ea5e9;
    display:flex;
    align-items:center;
    overflow:hidden;
}

.ticker-text{
    white-space:nowrap;
    font-size:22px;
    padding-left:100%;
    animation:scroll 25s linear infinite;
}

@keyframes scroll{
    from{transform:translateX(0);}
    to{transform:translateX(-100%);}
}

.anuncio-full{
    position:fixed;
    top:100px;
    left:0;
    width:100%;
    height:calc(100% - 100px);
    background:black;
    z-index:999999;
    display:flex;
    align-items:center;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition:opacity .5s ease;
}

.anuncio-full.active{
    opacity:1;
    pointer-events:auto;
}

/* Canvas con vídeo embebido (YouTube/Vimeo): cubre reloj, cabecera y ticker */
.anuncio-full.anuncio-full--embed-fs{
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    max-height:100vh;
    z-index:1000001;
    align-items:stretch;
    padding:0;
}
@supports (height: 100dvh){
    .anuncio-full.anuncio-full--embed-fs{
        width:100dvw;
        height:100dvh;
        max-height:100dvh;
    }
}

/* Mensaje solo imagen/vídeo: mismo borde a borde que embed; ocultamos chrome vía body.board--msg-media-full */
.anuncio-full.anuncio-full--msg-media-full{
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    max-height:100vh;
    z-index:1000001;
    align-items:stretch;
    padding:0;
}
@supports (height: 100dvh){
    .anuncio-full.anuncio-full--msg-media-full{
        width:100dvw;
        height:100dvh;
        max-height:100dvh;
    }
}

.anuncio-msg-media-shell{
    flex:1;
    width:100%;
    height:100%;
    min-height:0;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
}

.anuncio-msg-media-fit{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

body.board--msg-media-full .header,
body.board--msg-media-full .table-container,
body.board--msg-media-full .positions-wrapper,
body.board--msg-media-full .ticker{
    display:none;
}

body.board--msg-media-full .flight-arrival-toast{
    z-index:1000002;
}

.anuncio-embed-shell{
    position:relative;
    flex:1;
    width:100%;
    height:100%;
    min-height:0;
    background:#000;
}

.anuncio-embed-iframe{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    border:0;
}

.anuncio-embed-video{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:contain;
    background:#000;
}

.anuncio-canvas{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
}

.anuncio-canvas-media{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:0;
}

.anuncio-canvas-overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(180deg, rgba(2,6,23,.15), rgba(2,6,23,.58));
    z-index:1;
}

.anuncio-canvas-content{
    position:relative;
    z-index:2;
    max-width:min(90vw, 1200px);
    padding:24px;
}

.anuncio-canvas-content.pos-left{ text-align:left; margin-right:auto; }
.anuncio-canvas-content.pos-center{ text-align:center; margin:0 auto; }
.anuncio-canvas-content.pos-right{ text-align:right; margin-left:auto; }

.anuncio-canvas-title{
    margin:0 0 16px;
    font-size:clamp(42px, 8vw, 110px);
    font-weight:800;
    line-height:1.04;
    letter-spacing:.02em;
}

.anuncio-canvas-subtitle{
    margin:0;
    font-size:clamp(20px, 3vw, 48px);
    line-height:1.2;
    font-weight:600;
}

.anuncio-canvas--free{
    display:flex;
    align-items:center;
    justify-content:center;
}

.anuncio-canvas-board-stage{
    position:relative;
    overflow:hidden;
    width:min(100vw, calc((100vh - 100px) * 16 / 9));
    height:min(calc(100vh - 100px), calc(100vw * 9 / 16));
}

.anuncio-canvas-board-bg{
    position:absolute;
    transform:translate(-50%, -50%);
    overflow:hidden;
    z-index:0;
    box-sizing:border-box;
}

.anuncio-canvas-board-bg img,
.anuncio-canvas-board-bg video{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.anuncio-canvas-board-overlay{
    position:absolute;
    inset:0;
    z-index:1;
    pointer-events:none;
}

.anuncio-canvas-board-texts{
    position:absolute;
    inset:0;
    z-index:2;
    pointer-events:none;
}

.anuncio-canvas-text-layer{
    position:absolute;
    transform:translate(-50%, -50%);
    padding:6px 10px;
    line-height:1.25;
    word-wrap:break-word;
    box-sizing:border-box;
    white-space:pre-wrap;
}

.canvas-anim-fade-up{
    animation:canvasFadeUp var(--canvas-anim-seconds,3s) cubic-bezier(.22,.61,.36,1) both;
}

.canvas-anim-zoom-in{
    animation:canvasZoomIn var(--canvas-anim-seconds,3s) cubic-bezier(.22,.61,.36,1) both;
}

.canvas-anim-slide-left{
    animation:canvasSlideLeft var(--canvas-anim-seconds,3s) cubic-bezier(.22,.61,.36,1) both;
}

.canvas-anim-glow{
    animation:canvasGlow var(--canvas-anim-seconds,3s) ease-in-out both;
}

@keyframes canvasFadeUp{
    from{ opacity:0; transform:translateY(30px); }
    to{ opacity:1; transform:translateY(0); }
}

@keyframes canvasZoomIn{
    from{ opacity:0; transform:scale(.86); }
    to{ opacity:1; transform:scale(1); }
}

@keyframes canvasSlideLeft{
    from{ opacity:0; transform:translateX(40px); }
    to{ opacity:1; transform:translateX(0); }
}

@keyframes canvasGlow{
    0%{ opacity:0; text-shadow:none; }
    100%{ opacity:1; text-shadow:0 0 20px rgba(255,255,255,.42), 0 0 40px rgba(56,189,248,.22); }
}

.anuncio-full.anuncio-full--cumple{
    background:transparent;
}

.empty-state{
    text-align:center;
    padding:80px 0;
    color:#1e3a5f;
    font-size:clamp(16px,2vw,22px);
    letter-spacing:.1em;
    font-family:'Orbitron',sans-serif;
    animation:pulse-dim 3s ease-in-out infinite;
}
@keyframes pulse-dim{
    0%,100%{opacity:.4;}
    50%{opacity:.75;}
}

/* —— Vista cumpleañeros (estilo cartelera crema / oro / marino) —— */
.cumple-celebracion{
    width:100%;
    height:100%;
    min-height:100%;
    box-sizing:border-box;
    padding:clamp(12px,2vw,28px) clamp(16px,3vw,48px) 24px;
    overflow:auto;
    background:
        linear-gradient(90deg, rgba(201,162,39,.12) 0%, transparent 18%),
        linear-gradient(270deg, rgba(201,162,39,.12) 0%, transparent 18%),
        radial-gradient(ellipse 120% 80% at 50% -20%, rgba(255,248,235,.9) 0%, #f5f0e8 45%, #ebe4d8 100%);
    color:#1e3a5f;
    position:relative;
}

.cumple-celebracion::before,
.cumple-celebracion::after{
    content:"✦";
    position:absolute;
    font-size:clamp(14px,2vw,22px);
    color:rgba(201,162,39,.45);
    pointer-events:none;
}
.cumple-celebracion::before{ top:8%; left:4%; }
.cumple-celebracion::after{ bottom:12%; right:5%; }

.cumple-deco-balloon{
    position:absolute;
    font-size:clamp(28px,4vw,44px);
    opacity:.35;
    pointer-events:none;
    filter:grayscale(.2);
}
.cumple-deco-balloon.b1{ top:6%; left:2%; }
.cumple-deco-balloon.b2{ top:10%; right:8%; }

.cumple-topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:12px;
    max-width:1200px;
    margin:0 auto 8px;
    padding-bottom:clamp(8px,1.5vw,16px);
    border-bottom:1px solid rgba(30,58,95,.12);
}

.cumple-brand{
    display:flex;
    align-items:center;
    gap:12px;
}

.cumple-brand img{
    height:clamp(36px,5vw,52px);
    object-fit:contain;
}

.cumple-brand span{
    font-family:'Montserrat',sans-serif;
    font-weight:800;
    font-size:clamp(14px,1.8vw,20px);
    color:#1e4a7a;
    letter-spacing:.04em;
}

.cumple-clock{
    text-align:right;
    font-family:'Inter',sans-serif;
    color:#0891b2;
    line-height:1.2;
}
.cumple-clock .d{ font-size:clamp(12px,1.4vw,16px); font-weight:600; text-transform:capitalize; }
.cumple-clock .t{ font-size:clamp(22px,3.5vw,42px); font-weight:700; letter-spacing:.06em; }

.cumple-hero{
    text-align:center;
    max-width:900px;
    margin:clamp(8px,2vw,20px) auto clamp(16px,3vw,32px);
}

.cumple-hero h1{
    margin:0;
    font-family:'Montserrat',sans-serif;
    font-weight:800;
    font-size:clamp(32px,6vw,56px);
    letter-spacing:.06em;
    color:#0f2942;
    line-height:1.05;
}

.cumple-hero .script{
    display:block;
    font-family:'Great Vibes',cursive;
    font-size:clamp(36px,7vw,64px);
    color:#b8860b;
    margin-top:4px;
    line-height:1.1;
}

.cumple-hero .script::after{
    content:" ♥";
    font-size:.55em;
    vertical-align:middle;
    opacity:.85;
}

.cumple-sub{
    margin:clamp(10px,2vw,18px) auto 0;
    max-width:720px;
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(14px,1.8vw,19px);
    font-style:italic;
    color:#334e68;
    letter-spacing:.02em;
}

.cumple-grid{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    align-items:flex-end;
    gap:clamp(16px,3vw,32px);
    max-width:1280px;
    margin:0 auto;
    padding-bottom:16px;
}

.cumple-person{
    flex:0 1 auto;
    width:clamp(140px,18vw,200px);
    text-align:center;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.cumple-person.stagger{ transform:translateY(14px); }

.cumple-photo-ring{
    width:clamp(120px,16vw,180px);
    height:clamp(120px,16vw,180px);
    border-radius:50%;
    padding:5px;
    background:#fff;
    box-shadow:
        0 0 0 1px rgba(255,255,255,.95),
        0 4px 14px rgba(30,58,95,.18),
        inset 0 1px 0 rgba(255,255,255,.9);
    margin-bottom:10px;
}

.cumple-photo-ring img{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
    display:block;
}

.cumple-plaque{
    width:100%;
    background:linear-gradient(180deg,#1a3a5c 0%, #0f2744 100%);
    border-radius:14px;
    padding:12px 10px 14px;
    box-shadow:0 8px 20px rgba(15,39,68,.35);
    border:1px solid rgba(201,162,39,.25);
}

.cumple-plaque-name{
    font-family:'Montserrat',sans-serif;
    font-weight:800;
    font-size:clamp(11px,1.35vw,15px);
    color:#fff;
    text-transform:uppercase;
    letter-spacing:.04em;
    line-height:1.25;
    margin-bottom:6px;
    word-break:break-word;
}

.cumple-plaque-date{
    font-family:'Montserrat',sans-serif;
    font-weight:600;
    font-size:clamp(10px,1.2vw,13px);
    color:#d4af37;
    letter-spacing:.12em;
}

/* Avioncito en la punta del progreso — simple y coqueto */
@keyframes plane-wiggle{
    0%,100%{ transform:translateX(-50%) translateY(0) rotate(-6deg); }
    50%{ transform:translateX(-50%) translateY(-2px) rotate(6deg); }
}

.flight-progress{
    position:relative;
    height:7px;
    background:#1e293b;
    border-radius:10px;
    margin-top:8px;
    margin-bottom:4px;
    overflow:visible;
}

.flight-bar{
    height:100%;
    background:#22d3ee;
    border-radius:10px;
    width:0%;
    box-shadow:0 0 10px rgba(34,211,238,.35);
}

.plane{
    position:absolute;
    bottom:100%;
    margin-bottom:3px;
    font-size:clamp(17px, 2.2vw, 22px);
    line-height:1;
    z-index:2;
    filter:
        drop-shadow(0 2px 3px rgba(0,0,0,.55))
        drop-shadow(0 0 10px rgba(34,211,238,.55));
    animation:plane-wiggle 2.4s ease-in-out infinite;
    transform-origin:center bottom;
    pointer-events:none;
}

@media (prefers-reduced-motion: reduce){
    .plane{ animation:none; transform:translateX(-50%); }
    .canvas-anim-fade-up,
    .canvas-anim-zoom-in,
    .canvas-anim-slide-left,
    .canvas-anim-glow{
        animation:none !important;
    }
}

/* Aviso alternativo si la voz del navegador no funciona (ej. Samsung TV) */
.flight-arrival-toast{
    position:fixed;
    bottom:52px;
    left:50%;
    transform:translateX(-50%) translateY(160%);
    z-index:999998;
    min-width:min(92vw, 520px);
    padding:16px 22px;
    border-radius:16px;
    background:linear-gradient(145deg, rgba(15,23,42,.97), rgba(30,41,59,.98));
    border:2px solid rgba(34,211,238,.55);
    box-shadow:0 12px 40px rgba(0,0,0,.55), 0 0 32px rgba(34,211,238,.2);
    color:#e0f2fe;
    text-align:center;
    font-family:'Inter',sans-serif;
    pointer-events:none;
    opacity:0;
    transition:transform .45s cubic-bezier(.2,.9,.2,1), opacity .35s ease;
}
.flight-arrival-toast.visible{
    transform:translateX(-50%) translateY(0);
    opacity:1;
}
.flight-arrival-toast .toast-title{
    font-size:clamp(12px,1.4vw,15px);
    font-weight:700;
    letter-spacing:.2em;
    text-transform:uppercase;
    color:#67e8f9;
    margin-bottom:8px;
}
.flight-arrival-toast .toast-body{
    font-size:clamp(20px,2.8vw,32px);
    font-weight:800;
    line-height:1.25;
    color:#fff;
}

@media (max-width: 768px){
    .time{ font-size:30px; }
    .title{ font-size:20px; }
    th{ font-size:14px; }
    td{ font-size:16px; padding:8px; }
    .countdown-pill{ font-size:clamp(18px,4.5vw,26px); padding:6px 12px; }
    .header{ padding:10px; }
    table{ font-size:12px; }
}
</style>
</head>

<body>
<div id="anuncioFull" class="anuncio-full"></div>
<div class="header">
    <div class="left">
        <img class="logo" src="https://trainingreport.longportsecurity.com.co/pix/logolongport.png">
        <div class="title">LONGPORT BOARD POP</div>
    </div>

    <div style="display:flex; align-items:center; gap:25px;">
        <div style="text-align:right;">
            <div id="date" style="font-size:20px; color:#7dd3fc;"></div>
            <div id="clock" class="time"></div>
        </div>
        <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶</button>
    </div>
</div>

<div class="table-container">
<table>
<thead>
<tr>
<th>VUELO</th>
<th>DESTINO</th>
<th>LLEGADA</th>
<th>SALIDA</th>
<th>GATE</th>
<th>ESTADO</th>
</tr>
</thead>
<tbody id="board"></tbody>
</table>
</div>

<div class="positions-wrapper">
    <div class="positions-panel westjet" id="westjetPanel">
        <div class="panel-title"></div>
        <div class="positions-grid" id="positionsWestjet"></div>

/** YouTube / Vimeo → URL de embed con autoplay silenciado (mejor que pegar solo watch). */
function tryYoutubeVimeoEmbedUrl(u) {
    const h = u.hostname.toLowerCase().replace(/^www\./, "");
    const ytQ = "autoplay=1&mute=1&rel=0&playsinline=1&modestbranding=1";

    if(h === "youtu.be") {
        const id = u.pathname.replace(/^\//, "").split("/")[0];
        if(!id || !/^[a-zA-Z0-9_-]{6,32}$/.test(id)) return null;
        return `https://www.youtube.com/embed/${encodeURIComponent(id)}?${ytQ}`;
    }
    if(h === "youtube.com" || h === "m.youtube.com" || h === "youtube-nocookie.com" || h === "music.youtube.com") {
        const base = h === "youtube-nocookie.com" ? "https://www.youtube-nocookie.com" : "https://www.youtube.com";
        if(u.pathname.startsWith("/embed/")) {
            const id = u.pathname.slice(7).split("/")[0];
            if(!id || !/^[a-zA-Z0-9_-]{6,32}$/.test(id)) return null;
            return `${base}/embed/${encodeURIComponent(id)}?${ytQ}`;
        }
        const v = u.searchParams.get("v");
        if(v && /^[a-zA-Z0-9_-]{6,32}$/.test(v)) {
            return `${base}/embed/${encodeURIComponent(v)}?${ytQ}`;
        }
        const shorts = u.pathname.match(/^\/shorts\/([a-zA-Z0-9_-]{6,32})/);
        if(shorts) return `${base}/embed/${encodeURIComponent(shorts[1])}?${ytQ}`;
        return null;
    }
    if(h === "vimeo.com") {
        const m = u.pathname.match(/^\/(\d{5,20})(?:\/|$)/);
        if(m) return `https://player.vimeo.com/video/${m[1]}?autoplay=1&muted=1&playsinline=1`;
        return null;
    }
    if(h === "player.vimeo.com") {
        const m = u.pathname.match(/\/video\/(\d{5,20})/);
        if(m) return `https://player.vimeo.com/video/${m[1]}?autoplay=1&muted=1&playsinline=1`;
        return null;
    }
    return null;
}

/** Cualquier http(s) válido; mejora enlaces YouTube/Vimeo. No acepta javascript:, data:, etc. */
function sanitizeBoardEmbedUrl(raw) {
    const s0 = String(raw || "").trim();
    if(!s0) return null;
    const low = s0.toLowerCase();
    if(low.startsWith("data:") || low.startsWith("javascript:") || low.startsWith("vbscript:") || low.startsWith("file:")) {
        return null;
    }
    const s = /^https?:\/\//i.test(s0) ? s0 : "https://" + s0;
    let u;
    try {
        u = new URL(s);
    } catch {
        return null;
    }
    if(u.protocol !== "http:" && u.protocol !== "https:") return null;
    const special = tryYoutubeVimeoEmbedUrl(u);
    if(special) return special;
    return u.href;
}

/** Cómo mostrar la URL ya guardada: archivo de vídeo vs página embebida. */
function classifyBoardEmbedForRender(urlStr) {
    if(!urlStr || typeof urlStr !== "string") return null;
    const low = urlStr.trim().toLowerCase();
    if(low.startsWith("data:") || low.startsWith("javascript:") || low.startsWith("vbscript:")) return null;
    let u;
    try {
        u = new URL(urlStr);
    } catch {
        return null;
    }
    if(u.protocol !== "http:" && u.protocol !== "https:") return null;
    const path = u.pathname.toLowerCase();
    if(/\.(mp4|webm|ogg|m4v|mov|ogv|m3u8)(\?[^#]*)?(#|$)/i.test(path)) {
        return { kind: "video", url: urlStr };
    }
    return { kind: "iframe", url: urlStr };
}

/** Hora efectiva: aterrizó → estimada → guardada → programada. */
function effectiveArrivalHhmm(r) {
    const x = r || {};
    return (
        String(x.llegadaReal || "").trim() ||
        String(x.llegadaEstimada || "").trim() ||
        String(x.llegada || "").trim() ||
        String(x.llegadaProgramada || "").trim() ||
        "00:00"
    );
}

/** Interpreta HH:MM del día `dateStr` en hora local de llegada al aeropuerto (POP). */
function parseLlegadaInstant(dateStr, hhmm) {
    if(!/^\d{4}-\d{2}-\d{2}$/.test(String(dateStr || ""))) return new Date(NaN);
    const raw = String(hhmm || "00:00").trim();
    const m = raw.match(/^(\d{1,2}):(\d{2})/);
    if(!m) return new Date(NaN);
    const h = Math.min(23, Math.max(0, parseInt(m[1], 10)));
    const min = Math.min(59, Math.max(0, parseInt(m[2], 10)));
    return new Date(
        `${dateStr}T${String(h).padStart(2, "0")}:${String(min).padStart(2, "0")}:00${BOARD_ARRIVAL_TZ}`
    );
}

/** Evita repetir el mismo aviso de voz (clave: fecha|vuelo|minutos restantes) */
let speechArrivalFlags = Object.create(null);
const ARRIVAL_SPEECH_MINUTES = [30, 10, 1];

/** Tras un toque/tecla: desbloquea voz TTS + Web Audio (Samsung TV suele exigirlo) */

function prepareSpeechSynth() {
    if (!window.speechSynthesis) return;
    try {
        if (speechSynthesis.paused) speechSynthesis.resume();
    } catch (e) { /* noop */ }
}

function pickLatinoSpanishVoice() {
    const voices = speechSynthesis.getVoices();
    if (!voices.length) return null;
    const pick = (re) => voices.find((v) => re.test(v.lang));
    return pick(/^es-MX/i)
        || pick(/^es-419/i)
        || pick(/^es-US/i)
        || pick(/^es-AR/i)
        || pick(/^es-CO/i)
        || pick(/^es-CL/i)
        || pick(/^es-PE/i)
        || voices.find((v) => v.lang.startsWith("es") && !/^es-ES/i.test(v.lang))
        || voices.find((v) => v.lang.startsWith("es"));
}

/** Números en grupos de 2 (impar: 1 dígito + pares). Ej: 627→6,27 | 1528→15,28 | 61528→6,15,28 */
function chunkDigitRun(run) {
    const d = String(run).replace(/\D/g, "");
    if (d.length <= 2) return d;
    const parts = [];
    let i = 0;
    if (d.length % 2 === 1) {
        parts.push(d.slice(0, 1));
        i = 1;
    }
    while (i < d.length) {
        parts.push(d.slice(i, i + 2));
        i += 2;
    }
    return parts.join(", ");
}

/** Para voz: no leer 1528 como entero; ej. B6 627/1528 → B6, 6, 27. 15, 28 */
function formatVueloForSpeech(vuelo) {
    const s = (vuelo || "").replace(/\s+/g, " ").trim();
    if (!s) return "desconocido";
    const legs = s.split("/").map((x) => x.trim()).filter(Boolean);

    function formatOneLeg(leg) {
        const t = leg.trim();
        const m = t.match(/^(.+?)\s+(\d{2,})$/);
        if (m) {
            return `${m[1].trim()}, ${chunkDigitRun(m[2])}`;
        }
        if (/^\d+$/.test(t)) {
            return chunkDigitRun(t);
        }
        return t.replace(/\d{3,}/g, (r) => chunkDigitRun(r));
    }

    return legs.map(formatOneLeg).join(". ");
}

function buildArrivalPhrase(vuelo, minutes) {
    const v = formatVueloForSpeech(vuelo);
    const tiempo = minutes === 1 ? "1 minuto" : `${minutes} minutos`;
    return `Vuelo ${v}. Aterrizando en ${tiempo}.`;
}

function speakTwiceLatino(text) {
    if (!window.speechSynthesis || typeof SpeechSynthesisUtterance === "undefined") return;
    prepareSpeechSynth();
    const voice = pickLatinoSpanishVoice();
    const lang = voice?.lang?.startsWith("es") ? voice.lang : "es-MX";

    const mk = () => {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = lang;
        u.rate = 0.88;
        u.pitch = 1;
        if (voice) u.voice = voice;
        return u;
    };

    const u1 = mk();
    u1.onend = () => {
        prepareSpeechSynth();
        try {
            speechSynthesis.speak(mk());
        } catch (e) { /* noop */ }
    };
    u1.onerror = () => {
        try {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = "es";
            u.rate = 0.88;
            speechSynthesis.speak(u);
        } catch (e2) { /* noop */ }
    };
    try {
        speechSynthesis.speak(u1);
    } catch (e) {
        try {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = "es";
            u.rate = 0.88;
            speechSynthesis.speak(u);
        } catch (e2) { /* noop */ }
    }
}

function showArrivalToast(vuelo, minutes) {
    const el = document.getElementById("flightArrivalToast");
    if (!el) return;
    el.innerHTML = "";
    const t1 = document.createElement("div");
    t1.className = "toast-title";
    t1.textContent = "Aviso llegada";
    const t2 = document.createElement("div");
    t2.className = "toast-body";
    const minTxt = minutes === 1 ? "1 minuto" : `${minutes} minutos`;
    t2.textContent = `Vuelo ${vuelo} · ${minTxt}`;
    el.appendChild(t1);
    el.appendChild(t2);
    el.classList.add("visible");
    clearTimeout(showArrivalToast._hide);
    showArrivalToast._hide = setTimeout(() => el.classList.remove("visible"), 12000);
}

function playArrivalBeep() {
    try {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        let ctx = window.__boardAudioCtx;
        if (!ctx) {
            ctx = new Ctx();
            window.__boardAudioCtx = ctx;
        }
        if (ctx.state === "suspended") {
            ctx.resume().catch(() => {});
        }
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = "sine";
        o.frequency.setValueAtTime(720, ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(520, ctx.currentTime + 0.08);
        g.gain.setValueAtTime(0.0001, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.11, ctx.currentTime + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.18);
        o.connect(g);
        g.connect(ctx.destination);
        const t0 = ctx.currentTime;
        o.start(t0);
        o.stop(t0 + 0.2);
    } catch (e) { /* noop */ }
}

function tryArrivalSpeech(r, diffMin, dateStr) {
    if(diffMin <= 0 || effectiveArrivalHhmm(r) === "00:00") return;
    if (!ARRIVAL_SPEECH_MINUTES.includes(diffMin)) return;
    const vuelo = (r.vuelo || "").trim() || "N/A";
    const key = `${dateStr}|${vuelo}|${diffMin}`;
    if (speechArrivalFlags[key]) return;
    speechArrivalFlags[key] = true;

    showArrivalToast(vuelo, diffMin);
    playArrivalBeep();

    if (mediaUnlocked && window.speechSynthesis) {
        speakTwiceLatino(buildArrivalPhrase(vuelo, diffMin));
    }
}

function unlockMediaFromUser() {
    if (mediaUnlocked) return;

    prepareSpeechSynth();

    try {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (Ctx && !window.__boardAudioCtx) {
            window.__boardAudioCtx = new Ctx();
        }
        if (window.__boardAudioCtx?.state === "suspended") {
            window.__boardAudioCtx.resume().catch(() => {});
        }
    } catch (e) { /* noop */ }
}

function mostrarAnuncios(){
    const contenedor = document.getElementById("anuncioFull");

    function escapeHtml(s){
        return String(s ?? "")
            .replace(/&/g,"&amp;")
            .replace(/</g,"&lt;")
            .replace(/"/g,"&quot;");
    }

    function formatearFechaBonita(fechaISO){
        if(!fechaISO) return "";
        const fecha = new Date(fechaISO + "T00:00:00");
        const texto = fecha.toLocaleDateString("es-DO", { day: "numeric", month: "long" });
        return texto.charAt(0).toUpperCase() + texto.slice(1);
    }

    function formatearFechaCartulina(fechaISO){
        if(!fechaISO) return "";
        const fecha = new Date(fechaISO + "T12:00:00");
        const d = fecha.getDate();
        const mes = fecha.toLocaleDateString("es-DO", { month: "long" });
        return `${String(d).padStart(2,"0")} DE ${mes.toUpperCase()}`;
    }

    function relojCumpleBloque(){
        const now = new Date();
        return `
            <div class="cumple-clock">
                <div class="d">${now.toLocaleDateString("es-DO",{ weekday:"long", day:"2-digit", month:"long", year:"numeric" })}</div>
                <div class="t">${now.toLocaleTimeString("es-DO")}</div>
            </div>`;
    }

    function extraerNombreDesdeTexto(texto){
        if(!texto) return "";
        return texto
            .replace(/feliz cumpleaños/ig, "")
            .replace(/feliz cumple/ig, "")
            .trim();
    }

    /** RTDB puede devolver `texts` como objeto con claves "0","1" en lugar de array. */
    function normalizeCanvasLayoutTexts(layout){
        if(!layout || layout.texts == null) return [];
        const t = layout.texts;
        if(Array.isArray(t)) return t;
        if(typeof t === "object") {
            return Object.keys(t)
                .filter((k) => /^\d+$/.test(k))
                .sort((a, b) => Number(a) - Number(b))
                .map((k) => t[k])
                .filter((x) => x && typeof x === "object");
        }
        return [];
    }

    /** `layout.bg` a veces llega incompleto; `canvas.mediaFrame` es la copia de respaldo del panel. */
    function normalizeCanvasMediaRect(layout, canvas){
        const d = { x: 50, y: 50, w: 100, h: 100 };
        const L = layout && layout.bg && typeof layout.bg === "object" ? layout.bg : null;
        const M = canvas && canvas.mediaFrame && typeof canvas.mediaFrame === "object" ? canvas.mediaFrame : null;
        ["x", "y", "w", "h"].forEach((k) => {
            const v = L && L[k] != null ? Number(L[k]) : NaN;
            if(Number.isFinite(v)) d[k] = v;
        });
        ["x", "y", "w", "h"].forEach((k) => {
            const v = M && M[k] != null ? Number(M[k]) : NaN;
            if(Number.isFinite(v)) d[k] = v;
        });
        return d;
    }

    function renderCanvasCard(a){
        const c = a?.canvas || {};
        contenedor.classList.remove("anuncio-full--embed-fs");
        const storedEmbed = (c.embedUrl || "").trim();
        const mode = storedEmbed ? classifyBoardEmbedForRender(storedEmbed) : null;
        if(mode) {
            const embedFs = c.embedFullscreen === true;
            contenedor.classList.toggle("anuncio-full--embed-fs", embedFs);
            if(mode.kind === "video") {
                contenedor.innerHTML = `<div class="anuncio-embed-shell"><video class="anuncio-embed-video" playsinline controls></video></div>`;
                const v = contenedor.querySelector("video");
                if(v) {
                    v.setAttribute("src", mode.url);
                    v.setAttribute("muted", "");
                    v.muted = true;
                    v.setAttribute("autoplay", "");
                    v.loop = true;
                }
            } else {
                contenedor.innerHTML = `<div class="anuncio-embed-shell"><iframe class="anuncio-embed-iframe" title="Contenido embebido" allowfullscreen referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"></iframe></div>`;
                const ifr = contenedor.querySelector("iframe");
                if(ifr) ifr.setAttribute("src", mode.url);
            }
            return;
        }

        const layout = c.layout;
        const textsNorm = normalizeCanvasLayoutTexts(layout);
        if(layout && layout.v === 1 && textsNorm.length) {
            const bgColor = c.bgColor || "#0f172a";
            const overlayOpacityValue = parseInt(c.overlayOpacity);
            const overlayOpacity = Math.max(0, Math.min(80, Number.isNaN(overlayOpacityValue) ? 35 : overlayOpacityValue)) / 100;
            const seconds = Math.max(1, Math.min(12, parseInt(c.duracionTexto) || 3));
            const anim = (c.animacion || "fade-up").toLowerCase();
            const animClass = `canvas-anim-${
                ["fade-up", "zoom-in", "slide-left", "glow"].includes(anim) ? anim : "fade-up"
            }`;
            const media = a.media || "";
            const mediaType = a.mediaType || "";
            const hasVideo = media && (mediaType.startsWith("video/") || media.startsWith("data:video"));
            const b = normalizeCanvasMediaRect(layout, c);
            const mediaBlock = media
                ? (hasVideo
                    ? `<video src="${media}" autoplay muted loop playsinline></video>`
                    : `<img src="${media}" alt="" loading="lazy" referrerpolicy="no-referrer">`)
                : "";
            const textsHtml = textsNorm.map((t) => {
                const raw = (t.text || "").trim();
                const inner = raw ? escapeHtml(t.text || "") : "\u00a0";
                const fs = parseFloat(t.fontSize) || 4;
                const fontSize = `clamp(10px, ${fs * 0.42}vw, ${fs * 0.65}vh)`;
                const align = ["left", "center", "right"].includes(t.align) ? t.align : "center";
                const col = escapeHtml(t.color || "#ffffff");
                const ff = t.fontFamily || "Inter, Arial, sans-serif";
                const fw = t.fontWeight || "600";
                const lid = String(t.id || "").replace(/"/g, "");
                return `<div class="anuncio-canvas-text-layer ${animClass}" data-layer-id="${lid}" style="left:${t.x}%;top:${t.y}%;width:${t.w}%;text-align:${align};color:${col};font-family:${ff};font-weight:${fw};font-size:${fontSize};">${inner}</div>`;
            }).join("");

            contenedor.innerHTML = `
            <div class="anuncio-canvas anuncio-canvas--free" style="background:${bgColor}; --canvas-anim-seconds:${seconds}s;">
                <div class="anuncio-canvas-board-stage">
                    ${mediaBlock ? `
                    <div class="anuncio-canvas-board-bg" style="left:${b.x}%;top:${b.y}%;width:${b.w}%;height:${b.h}%;">
                        ${mediaBlock}
                    </div>` : ""}
                    <div class="anuncio-canvas-board-overlay" style="background:linear-gradient(180deg, rgba(2,6,23,${Math.max(0, overlayOpacity - 0.15)}), rgba(2,6,23,${overlayOpacity}));"></div>
                    <div class="anuncio-canvas-board-texts">${textsHtml}</div>
                </div>
            </div>`;
            return;
        }

        const titulo = escapeHtml(c.titulo || a.texto || "");
        const subtitulo = escapeHtml(c.subtitulo || "");
        const textColor = c.textColor || "#ffffff";
        const bgColor = c.bgColor || "#0f172a";
        const fontFamily = c.fontFamily || "Inter, Arial, sans-serif";
        const textPosition = ["left", "center", "right"].includes(c.textPosition) ? c.textPosition : "center";
        const overlayOpacityValue = parseInt(c.overlayOpacity);
        const overlayOpacity = Math.max(0, Math.min(80, Number.isNaN(overlayOpacityValue) ? 35 : overlayOpacityValue)) / 100;
        const seconds = Math.max(1, Math.min(12, parseInt(c.duracionTexto) || 3));
        const anim = (c.animacion || "fade-up").toLowerCase();
        const animClass = `canvas-anim-${
            ["fade-up", "zoom-in", "slide-left", "glow"].includes(anim) ? anim : "fade-up"
        }`;
        const media = a.media || "";
        const mediaType = a.mediaType || "";
        const hasVideo = media && (mediaType.startsWith("video/") || media.startsWith("data:video"));
        const mediaHtml = media
            ? (hasVideo
                ? `<video class="anuncio-canvas-media" src="${media}" autoplay muted loop playsinline></video>`
                : `<img class="anuncio-canvas-media" src="${media}" alt="" loading="lazy" referrerpolicy="no-referrer">`)
            : "";

        contenedor.innerHTML = `
            <div class="anuncio-canvas" style="background:${bgColor}; --canvas-anim-seconds:${seconds}s;">
                ${mediaHtml}
                <div class="anuncio-canvas-overlay" style="background:linear-gradient(180deg, rgba(2,6,23,${Math.max(0, overlayOpacity - 0.15)}), rgba(2,6,23,${overlayOpacity}));"></div>
                <div class="anuncio-canvas-content ${animClass} pos-${textPosition}" style="color:${textColor}; font-family:${fontFamily};">
                    ${titulo ? `<h1 class="anuncio-canvas-title">${titulo}</h1>` : ""}
                    ${subtitulo ? `<p class="anuncio-canvas-subtitle">${subtitulo}</p>` : ""}
                </div>
            </div>
        `;
    }

    function buscarCumplePorNombre(nombre){
        const normalizar = (s) => (s || "").toString().toLowerCase().trim();
        const objetivo = normalizar(nombre);
        if(!objetivo) return null;
        return Object.values(cumpleanosData || {}).find((c) => {
            const n = normalizar(c?.nombre);
            return n === objetivo || n.includes(objetivo) || objetivo.includes(n);
        }) || null;
    }

    function renderCumpleCard(a){
        const logoSrc = "https://trainingreport.longportsecurity.com.co/pix/logolongport.png";
        const lista = Array.isArray(a.cumpleaneros) ? a.cumpleaneros : [];
        if(lista.length){
            const cards = lista.map((item, idx) => {
                const nombre = escapeHtml(item?.nombre || "Cumpleañero");
                const foto = item?.foto || "";
                const fechaShowRaw = item?.fecha
                    ? formatearFechaCartulina(item.fecha)
                    : (item?.fechaTexto || formatearFechaBonita(item?.fecha) || "");
                const fechaShow = escapeHtml(fechaShowRaw);
                const staggerClass = idx === 2 ? "cumple-person stagger" : "cumple-person";
                const imgHtml = foto
                    ? `<img src="${foto}" alt="" loading="lazy" referrerpolicy="no-referrer">`
                    : `<div style="width:100%;height:100%;border-radius:50%;background:#e2e8f0;"></div>`;
                return `
                    <div class="${staggerClass}">
                        <div class="cumple-photo-ring">${imgHtml}</div>
                        <div class="cumple-plaque">
                            <div class="cumple-plaque-name">${nombre}</div>
                            <div class="cumple-plaque-date">${fechaShow}</div>
                        </div>
                    </div>`;
            }).join("");

            contenedor.innerHTML = `
                <div class="cumple-celebracion">
                    <span class="cumple-deco-balloon b1" aria-hidden="true">🎈</span>
                    <span class="cumple-deco-balloon b2" aria-hidden="true">🎈</span>
                    <div class="cumple-topbar">
                        <div class="cumple-brand">
                            <img src="${logoSrc}" alt="">
                            <span>LONGPORT BOARD POP</span>
                        </div>
                        ${relojCumpleBloque()}
                    </div>
                    <div class="cumple-hero">
                        <h1>CUMPLEAÑEROS</h1>
                        <span class="script">Del mes</span>
                        <p class="cumple-sub">Celebramos tu vida, tu talento y todo lo que aportas cada día.</p>
                    </div>
                    <div class="cumple-grid">${cards}</div>
                </div>`;
            return;
        }

        const nombreInferido = a.nombre || extraerNombreDesdeTexto(a.texto);
        const cumpleMatch = buscarCumplePorNombre(nombreInferido);
        const nombre = escapeHtml(nombreInferido || cumpleMatch?.nombre || "Cumpleañero");
        const foto = a.media || a.foto || cumpleMatch?.foto || "";
        const fechaRaw = a.fecha || cumpleMatch?.fecha;
        const fechaShow = escapeHtml(
            fechaRaw ? formatearFechaCartulina(fechaRaw) : (a.fechaTexto || formatearFechaBonita(cumpleMatch?.fecha) || "")
        );
        const imgHtml = foto
            ? `<img src="${foto}" alt="" loading="lazy" referrerpolicy="no-referrer">`
            : `<div style="width:100%;height:100%;border-radius:50%;background:#e2e8f0;"></div>`;

        contenedor.innerHTML = `
            <div class="cumple-celebracion">
                <span class="cumple-deco-balloon b1" aria-hidden="true">🎈</span>
                <div class="cumple-topbar">
                    <div class="cumple-brand">
                        <img src="${logoSrc}" alt="">
                        <span>LONGPORT BOARD POP</span>
                    </div>
                    ${relojCumpleBloque()}
                </div>
                <div class="cumple-hero">
                    <h1>CUMPLEAÑEROS</h1>
                    <span class="script">Del mes</span>
                </div>
                <div class="cumple-grid">
                    <div class="cumple-person">
                        <div class="cumple-photo-ring">${imgHtml}</div>
                        <div class="cumple-plaque">
                            <div class="cumple-plaque-name">${nombre}</div>
                            <div class="cumple-plaque-date">${fechaShow}</div>
                        </div>
                    </div>
                </div>
            </div>`;
    }

    if(anuncioLoopInterval){
        clearInterval(anuncioLoopInterval);
        anuncioLoopInterval = null;
    }
    if(anuncioHideTimeout){
        clearTimeout(anuncioHideTimeout);
        anuncioHideTimeout = null;
    }

    if(!anuncios.length || !anunciosActivos){
        contenedor.style.display = "none";
        contenedor.classList.remove("anuncio-full--cumple", "active", "anuncio-full--embed-fs", "anuncio-full--msg-media-full");
        document.body.classList.remove("board--msg-media-full");
        return;
    }

    function loop(){
        if(!anuncios.length || !anunciosActivos){
            contenedor.style.display = "none";
            contenedor.classList.remove("anuncio-full--cumple", "active", "anuncio-full--embed-fs", "anuncio-full--msg-media-full");
            document.body.classList.remove("board--msg-media-full");
            return;
        }
        const a = anuncios[indexAnuncio];
        const esCanvas = a.tipo === "canvas" || (a.canvas && typeof a.canvas === "object");
        const esMensajeCumple = a.tipo === "mensaje" && /feliz cumpleaños/i.test(a.texto || "");

        contenedor.style.display = "flex";
        contenedor.classList.add("active");
        contenedor.classList.remove("anuncio-full--embed-fs", "anuncio-full--msg-media-full");
        document.body.classList.remove("board--msg-media-full");

        if(a.tipo === "mensaje" && !esMensajeCumple){
            contenedor.classList.remove("anuncio-full--cumple");
            const media = a.media || "";
            const mediaType = a.mediaType || "";
            const hasVideo = media && (mediaType.startsWith("video/") || media.startsWith("data:video"));
            if(media) {
                contenedor.classList.add("anuncio-full--msg-media-full");
                document.body.classList.add("board--msg-media-full");
                contenedor.innerHTML = hasVideo
                    ? `<div class="anuncio-msg-media-shell"><video class="anuncio-msg-media-fit" src="${media}" autoplay muted loop playsinline></video></div>`
                    : `<div class="anuncio-msg-media-shell"><img class="anuncio-msg-media-fit" src="${media}" alt="" loading="lazy" referrerpolicy="no-referrer"></div>`;
            } else {
                contenedor.innerHTML = `
                <div style="text-align:center; color:#00ffff; font-size:40px;">
                    ${escapeHtml(a.texto || "")}
                </div>
            `;
            }
        }

        if(a.tipo === "cumple" || esMensajeCumple){
            contenedor.classList.add("anuncio-full--cumple");
            renderCumpleCard(a);
        }

        if(esCanvas){
            contenedor.classList.remove("anuncio-full--cumple");
            renderCanvasCard(a);
        }

        anuncioHideTimeout = setTimeout(()=>{
            contenedor.style.display = "none";
            contenedor.classList.remove("active", "anuncio-full--embed-fs", "anuncio-full--msg-media-full");
            document.body.classList.remove("board--msg-media-full");
        }, (a.duracion || 10) * 1000);

        indexAnuncio = (indexAnuncio + 1) % anuncios.length;
    }

    loop();
    anuncioLoopInterval = setInterval(loop, flightSectionSeconds * 1000);
}

function renderVuelos(){
    let html = "";
    vuelosData.forEach(r => {
        const eff = effectiveArrivalHhmm(r);
        let llegadaDt = parseLlegadaInstant(selectedDate, eff);
        if(Number.isNaN(llegadaDt.getTime())) {
            llegadaDt = parseLlegadaInstant(selectedDate, "00:00");
        }

        let diffMs = llegadaDt.getTime() - Date.now();
        let diffMin = Math.floor(diffMs / 60000);
        let hours = Math.floor(diffMin / 60);
        let minutes = diffMin % 60;

        let estadoNorm = (r.estado || "").toString().toUpperCase().replace(/\s+/g,"-").replace(/_/g,"-");
        let estadoManual = ["BOARDING","DEPARTED","DELAYED","CANCELLED","DIVERTED"].includes(estadoNorm);

        let estadoFinal = r.estado || "ON-TIME";
        let estadoClase = estadoFinal.toLowerCase().replace(/\s+/g,"-");
        let extraClass = "";
        let totalMin = 120;
        let progreso = 100 - (diffMin / totalMin * 100);
        
        if(progreso < 0) progreso = 0;
        if(progreso > 100) progreso = 100;

        if(!estadoManual){
            if(diffMin <= 0){
                estadoFinal = "ARRIVED";
                estadoClase = "arrived";
            }
            if(diffMin <= 30 && diffMin > 0) extraClass = "blink";
            if(diffMin <= 10 && diffMin > 0) estadoFinal = "ARRIVING";
        } else if(diffMin <= 30 && diffMin > 0) {
            extraClass = "blink";
        }

        let countdown = "0 min";
        let countdownClass = "countdown-green";
        if(diffMin > 0){
            countdown = hours > 0 ? hours + "h " + minutes + "m" : minutes + " min";
            if(diffMin <= 60) countdownClass = "countdown-yellow";
            if(diffMin <= 15) countdownClass = "countdown-red";
        }

        tryArrivalSpeech(r, diffMin, selectedDate);

        const prog = String(r.llegadaProgramada || "").trim();
        const showProg =
            prog &&
            eff &&
            prog !== eff;

        html += `
        <tr class="${estadoClase} ${extraClass}">
        <td>${r.vuelo}</td>
        <td>${r.destino}</td>
        <td class="td-llegada">
            <span class="hora-llegada">${eff}</span>
            ${showProg ? `<small class="ruta-origen">Programado ${prog}</small>` : ""}
            ${r.salidaOrigen ? `<small class="ruta-origen">Salió origen ${r.salidaOrigen}</small>` : ""}
            <span class="countdown-line"><span class="countdown-pill ${countdownClass}">${countdown}</span></span>
            <div class="flight-progress">
                <div class="flight-bar" style="width:${progreso}%"></div>
                <div class="plane" style="left:${progreso}%" title="En ruta — vuelo comercial">✈️</div>
            </div>
        </td>
        <td>${r.salida}</td>
        <td>${r.gate}</td>
        <td>${estadoFinal}</td>
        </tr>`;
    });
    document.getElementById("board").innerHTML = html;
}

setInterval(renderVuelos, 1000);

// 👥 POSICIONES
function renderExtraAirlinePanels(){
    const cont = document.getElementById("extraAirlinePanels");
    if(!cont) return;
    const extras = Object.entries(airlinesExtraData || {});
    if(!extras.length){
        cont.innerHTML = "";
        return;
    }

    cont.innerHTML = extras.map(([slug, item]) => {
        const title = titlesData[slug] || `ASIGNACIONES ${(item?.name || slug).toUpperCase()}`;
        const visible = visibilityData[slug] !== false;
        return `
            <div class="positions-panel" id="panel_${slug}" style="border-top:2px solid #f59e0b; background:rgba(245,158,11,0.08); display:${visible ? "block" : "none"};">
                <div class="panel-title">${title}</div>
                <div class="positions-grid" id="positionsExtra_${slug}"></div>
            </div>
        `;
    }).join("");
}

function renderPositionsPanels(){
    let west = "";
    let jet = "";
    const extraBuckets = {};

    Object.entries(positionsData).forEach(([k,v]) => {
        let card = `<div class="pos-card"><div class="role">${k.toUpperCase()}</div><div class="name">${v}</div></div>`;
        if(k.includes("__")){
            const slug = k.split("__")[1];
            if(!extraBuckets[slug]) extraBuckets[slug] = "";
            extraBuckets[slug] += card;
        } else if(k.includes("west") || k.includes("wj")) west += card;
        else jet += card;
    });

    document.getElementById("positionsWestjet").innerHTML = west;
    document.getElementById("positionsJetblue").innerHTML = jet;
    Object.entries(extraBuckets).forEach(([slug, html]) => {
        const el = document.getElementById("positionsExtra_" + slug);
        if(el) el.innerHTML = html;
    });
}

onValue(ref(db,"positions"), snap => {
    positionsData = snap.val() || {};
    renderPositionsPanels();
});

// 📢 TICKER
onValue(ref(db,"ticker/message"), snap => {
    document.getElementById("ticker").innerText = snap.val() || "Bienvenidos";
});

// 🖥️ FULLSCREEN
window.toggleFullscreen = function(){
    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();
    }else{
        document.exitFullscreen();
    }
};

window.addEventListener("load", () => {
    setTimeout(() => {
        document.documentElement.requestFullscreen().catch(() => {});
    }, 1500);
    
});

let cursorTimer;

function ocultarCursor() {
    document.body.style.cursor = "none";
}

function mostrarCursor() {
    document.body.style.cursor = "default";
}

document.addEventListener("mousemove", () => {
    mostrarCursor();

    clearTimeout(cursorTimer);
    cursorTimer = setTimeout(() => {
        ocultarCursor();
    }, 2000); // se oculta después de 2 segundos sin mover
});
