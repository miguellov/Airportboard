<style>

.estado-aterrizado {
    color: #64748b; /* gris azulado apagado */
    opacity: 0.8;
}


    /* ⚠️ PARPADEO */
@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0.2; }
    100% { opacity: 1; }
}

/* ✨ PARPADEO SUAVE */
@keyframes rowBlink {
    0% { background-color: rgba(34, 211, 238, 0.05); }
    50% { background-color: rgba(34, 211, 238, 0.25); }
    100% { background-color: rgba(34, 211, 238, 0.05); }
}

/* 🟡 WARNING */
.row-warning {
    animation: rowBlink 1.2s infinite;
}

/* 🔴 CRÍTICO */
@keyframes rowDanger {
    0% { background-color: rgba(239, 68, 68, 0.05); }
    50% { background-color: rgba(239, 68, 68, 0.35); }
    100% { background-color: rgba(239, 68, 68, 0.05); }
}

.row-danger {
    animation: rowDanger 0.8s infinite;
}


.blink {
    animation: blink 1s infinite;
}

body {
    margin: 0;
    padding: 0;
    background: #000;
    color: #00e0ff;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
}

/* ========================= */
/* HEADER */
/* ========================= */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
    border-bottom: 2px solid #0ea5e9;
    background: linear-gradient(180deg, #000, #0a0f1c);
    z-index: 1000;
}

.logo {
    height: 50px;
}

.title {
    font-size: 40px;
    font-family: 'Orbitron', sans-serif;
    color: #38bdf8;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.time {
    font-size: 60px;
    font-weight: 700;
    color: #00ffff;
    letter-spacing: 3px;
    text-align: right;
}

.date {
    font-size: 22px;
    color: #7dd3fc;
    font-weight: 600;
    text-transform: capitalize;
}

/* ========================= */
/* CONTENEDOR PRINCIPAL */
/* ========================= */
.content-container {
    flex: 1;
    overflow: hidden;
    position: relative;
}

/* ========================= */
/* TABLA DE VUELOS */
/* ========================= */
.flights-view {

    flex-direction: column;

}

.flight-progress {

}

.flights-view.active {
    display: flex;
}

.plane {
    font-size: 12px;
    top: -8px;
}

table {
    width: 100%;
    table-layout: fixed; /* 🔥 CLAVE */
}

table {
    width: 100%;
    border-collapse: collapse;
    flex: 1;
}

th {
    font-size: 28px;
    padding: 15px;
    border-bottom: 2px solid #0ea5e9;
    background: rgba(14, 165, 233, 0.1);
    color: #00e0ff;
    text-transform: uppercase;
}

td {
    font-size: 34px; /* 🔥 más grande */
    padding: 24px;   /* 🔥 más espacio */
}

tr:hover {
    background: rgba(14, 165, 233, 0.05);
}


/* VUELO */
td:nth-child(1), th:nth-child(1) {
    width: 15%;
}

/* DESTINO */
td:nth-child(2), th:nth-child(2) {
    width: 25%;
}

/* LLEGADA */
td:nth-child(3), th:nth-child(3) {
    width: 15%;
}

/* SALIDA */
td:nth-child(4), th:nth-child(4) {
    width: 15%;
}

/* GATE */
td:nth-child(5), th:nth-child(5) {
    width: 10%;
}

/* ESTADO */
td:nth-child(6), th:nth-child(6) {
    width: 20%;
}

/* ========================= */
/* TABLA DE ASIGNACIONES */
/* ========================= */
.assignments-view {
    display: flex;
flex-direction: column;
align-items: stretch; /* 🔥 ocupa todo el ancho */
padding: 20px;
gap: 15px;
}

.assignments-view.active {
    display: flex;
}

.assignments-title {
    font-size: 32px;
    color: #00e0ff;
    margin-bottom: 20px;
    text-transform: uppercase;
    text-align: center;
    letter-spacing: 2px;
    border-bottom: 2px solid #0ea5e9;
    padding-bottom: 10px;
}

.assignments-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));

    flex: 1;
}

.assignment-card {

    height: 140px;

    flex-direction: column;

}

}

.assignment-card .name {

    align-items: center;
    justify-content: center;

    text-align: center;
    font-size: 24px;
    font-weight: bold;
}

.card {

    max-width: 900px; /* opcional para no exagerar */

}

.card {
    width: 100%;
    margin: 0;
}

.assignment-card .name {
    font-size: 24px;
    font-weight: bold;

    display: flex;
    align-items: center;
    justify-content: center;

.assignment-card .name {

.assignment-role {
    font-size: 18px;

    font-weight: bold;

}

.assignment-name {
    font-size: 24px;
    color: #00ffff;
    font-weight: bold;
}

/* ========================= */
/* ANUNCIOS (IMÁGENES/VIDEOS) */
/* ========================= */
/* 📢 CONTENEDOR ANUNCIO */
.announcement-view {
    display: none;
    justify-content: center;
    align-items: center;

.announcement-view.active {

/* 🖼 IMAGEN / VIDEO */
.announcement-media,
.announcement-view video {
    max-width: 100%;

}

/* 📝 TEXTO RESPONSIVE */
.announcement-text {
    font-size: clamp(30px, 4vw, 60px); /* 🔽 más compacto */

    max-width: 95%; /* 🔥 más ancho */
    line-height: 1.1; /* 🔽 menos altura */

}

/* ========================= */
/* BOTÓN FULLSCREEN */
/* ========================= */
.fullscreen-btn {
    position: fixed;
    bottom: 70px;
    right: 20px;
    background: rgba(14, 165, 233, 0.2);
    border: 2px solid #0ea5e9;
    color: #00ffff;
    font-size: 20px;

    height: 50px;
    border-radius: 50%;

    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1001;
    transition: 0.3s;
}

.fullscreen-btn:hover {
    background: rgba(14, 165, 233, 0.4);
    box-shadow: 0 0 20px rgba(0, 224, 255, 0.5);
}

/* ========================= */
/* INDICADOR DE VISTA */
/* ========================= */
.view-indicator {
    display: none;
    position: fixed;
    top: 10px;
    right: 10px;
    background: #0ea5e9;
    color: white;
    padding: 8px 15px;
    border-radius: 20px;
    font-size: 14px;
    z-index: 2000;
    text-transform: uppercase;
}

/* ========================= */
/* TICKER */

.ticker {

.ticker-text {

    font-size: 24px;

    color: #00ffff;
}

@keyframes scroll {
    from { transform: translateX(0); }
    to { transform: translateX(-100%); }
}

/* ========================= */

/* 🎬 TRANSICIONES MODO CINE */
.flights-view,
.assignments-view,
.announcement-view {

.flights-view.active,

/* ✈️ AVIÓN */
.plane {

/* ⏱ COUNTDOWN */

.countdown {

}

.countdown.warning {
    color: #facc15;
}

.countdown.danger {
    color: #ef4444;
}

</style>
</head>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "933c97406ad862095eade39aef8a1f5d",
    authDomain: "airport-board-ee661.firebaseapp.com",
    databaseURL: "https://airport-board-ee661-default-rtdb.firebaseio.com",
    projectId: "airport-board-ee661"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ========================= */
/* ESTADO DEL SISTEMA */
/* ========================= */
let currentView = 'flights'; // flights, assignments, announcements
let rotationTimer = null;
let announcements = [];
let currentAnnouncementIndex = 0;
let flights = [];
let assignments = [];
let rotationDelay = 20; // segundos - AUMENTADO de 10 a 20




/* ========================= */
/* RELOJ Y FECHA */
/* ========================= */
function updateClock() {
    const now = new Date();
    
    document.getElementById('clock').innerText = now.toLocaleTimeString('es-CO', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
    });
    
    document.getElementById('date').innerText = now.toLocaleDateString('es-CO', {
        weekday: 'long',
        day: '2-digit',
        month: 'long',
        year: 'numeric'
    });
}

function actualizarProgreso() {

    flights.forEach(f => {

        if(!f.llegada) return;

        let [h,m] = f.llegada.split(":");
        let llegada = new Date();
        llegada.setHours(h,m,0);

        let diffMs = llegada.getTime() - Date.now();
        let diffMin = Math.floor(diffMs / 60000);

        let totalMin = 120;
        let progreso = 100 - (diffMin / totalMin * 100);

        if(progreso < 0) progreso = 0;
        if(progreso > 100) progreso = 100;

        // 🔥 actualizar barra
        const bar = document.getElementById(`bar-${f.vuelo}`);
        const plane = document.getElementById(`plane-${f.vuelo}`);
        const cd = document.getElementById(`cd-${f.vuelo}`);
        const estado = document.getElementById(`estado-${f.vuelo}`);

        if(bar) bar.style.width = progreso + "%";
        if(plane) plane.style.left = progreso + "%";

        // ⏱ countdown
        if (cd) {

   if (cd) {

     if (diffMin <= 0) {
         cd.innerText = "0m";
         if (estado) {

     const texto = estado.innerText.toLowerCase();

     estado.classList.remove("estado-aterrizado");

     if (diffMin <= 0) {

         // 🚫 NO sobrescribir estados manuales importantes
         if (
             !texto.includes("delayed") &&
             !texto.includes("cancelled") &&
             !texto.includes("diverted")
         ) {
             estado.innerText = "Aterrizado";
estado.classList.add("estado-aterrizado");
         }
     }
}
     } else {

         const horas = Math.floor(diffMin / 60);
         const minutos = diffMin % 60;

         if (horas > 0) {
             // 🔥 tiene horas
             const mm = String(minutos).padStart(2, '0');
             cd.innerText = `${horas}h ${mm}m`;
         } else {
             // 🔥 solo minutos
             cd.innerText = `${minutos}m`;
         }
     
         // 🔥 COLORES + PARPADEO
         cd.classList.remove("warning", "danger", "blink");

         if (diffMin <= 30) {
             cd.classList.add("warning", "blink"); // ⚠️ amarillo + parpadeo
         }

         if (diffMin <= 10) {
             cd.classList.remove("warning");
             cd.classList.add("danger", "blink"); // 🔴 rojo + parpadeo fuerte
         }

         const row = document.getElementById(`row-${f.vuelo}`);

if(row){
    row.classList.remove("row-warning", "row-danger");

    if(diffMin <= 30 && diffMin > 10){
        row.classList.add("row-warning"); // 🟡 parpadeo suave
    }

    if(diffMin <= 10){
        row.classList.add("row-danger"); // 🔴 parpadeo fuerte
    }
}
     }
}
}
    });
}


setInterval(actualizarProgreso, 1000);

updateClock();
setInterval(updateClock, 1000);

/* ========================= */
/* FULLSCREEN */
/* ========================= */
document.getElementById('fullscreenBtn').addEventListener('click', () => {
    if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen();
    } else {
        document.exitFullscreen();
    }
});

/* ========================= */
/* CARGAR TICKER */
/* ========================= */
onValue(ref(db, 'ticker/message'), (snap) => {
    const message = snap.val() || 'Bienvenidos al Aeropuerto • Welcome to the Airport';
    document.getElementById('ticker').innerText = message;
});

onValue(ref(db, 'anuncios'), (snap) => {
    announcements = Object.values(snap.val() || {});
});

/* ========================= */
/* CARGAR VUELOS */
/* ========================= */
onValue(ref(db, 'flights'), (snap) => {
    flights = Object.values(snap.val() || {});
    renderFlights();
});

function renderFlights() {
    const tbody = document.getElementById('flightsTable');
    tbody.innerHTML = '';
    
    flights.forEach(flight => {
        const row = `
            <tr id="row-${flight.vuelo}">
                <td>${flight.vuelo || 'N/A'}</td>
                <td>${flight.destino || 'N/A'}</td>
                <td>
     ${flight.llegada || "N/A"}

    <div class="flight-progress">
        <div class="flight-bar" id="bar-${flight.vuelo}"></div>
        <div class="plane" id="plane-${flight.vuelo}">✈️</div>
    </div>

    <small class="countdown" id="cd-${flight.vuelo}">--</small>
</td>
    <small class="countdown" id="cd-${flight.vuelo}">--</small>
</div>
</div>
</td>
                <td>${flight.salida || 'N/A'}</td>
                <td>${flight.gate || 'N/A'}</td>
                <td id="estado-${flight.vuelo}">${flight.estado || 'N/A'}</td>
            </tr>
        `;
        tbody.innerHTML += row;
    });

    let countdownClass = "countdown-green";

if(diffMin <= 60){
    countdownClass = "countdown-yellow";
}

if(diffMin <= 15){
    countdownClass = "countdown-red";
}
}

function showAnnouncement() {

    if (announcements.length === 0) return;

    const anuncio = announcements[currentAnnouncementIndex];

    const media = document.getElementById('announcementMedia');
const text = document.getElementById('announcementText');

media.style.display = "none";
text.style.display = "none";

// VIDEO o IMAGEN
if (anuncio.media) {

    if (anuncio.media.includes(".mp4")) {

        media.outerHTML = `
            <video id="announcementMedia" autoplay muted 
            style="max-width:100%;max-height:100%;object-fit:contain;">
            <source src="${anuncio.media}" type="video/mp4">
            </video>
        `;

    } else {
        media.src = anuncio.media;
        media.style.display = "block";
    }
}

// TEXTO
else if (anuncio.texto) {
    text.innerText = anuncio.texto;
    text.style.display = "block";
}

    currentAnnouncementIndex++;
    if (currentAnnouncementIndex >= announcements.length) {
        currentAnnouncementIndex = 0;
    }
}

/* ========================= */
/* CARGAR ASIGNACIONES */
/* ========================= */
onValue(ref(db, 'positions'), (snap) => {
    const data = snap.val() || {};
    assignments = Object.entries(data).map(([role, name]) => ({
        role: role.toUpperCase(),
        name: name
    }));
    renderAssignments();
});

function renderAssignments() {

    let westHTML = "";
    let jetHTML = "";

    assignments.forEach(a => {

        const colores = ["blue","green","yellow","purple","red","cyan"];

// 🎯 función para asignar color
function getColor(role){
    role = role.toLowerCase();

    if(role.includes("puerta")) return "blue";
    if(role.includes("rampa")) return "green";
    if(role.includes("escorta") || role.includes("escolta")) return "purple";

    // fallback automático
    const index = role.length % colores.length;
    return colores[index];
}

const colorClass = "card-" + getColor(a.role);

const card = `
<div class="assignment-card ${colorClass}">
            <div class="role">${a.role}</div>
            <div class="name">${a.name}</div>
        </div>`;

        if (a.role.includes("WEST")) {
            westHTML += card;
        } else {
            jetHTML += card;
        }
    });

    document.getElementById('gridWestjet').innerHTML = westHTML;
    document.getElementById('gridJetblue').innerHTML = jetHTML;
}

/* ========================= */
/* CAMBIAR VISTA */
/* ========================= */
function switchView(view) {

    // ocultar todas
    document.getElementById('flightsView').classList.remove('active');
    document.getElementById('westjetView').classList.remove('active');
    document.getElementById('jetblueView').classList.remove('active');
    document.getElementById('announcementView').classList.remove('active');
    

    if (view === 'flights') {
        document.getElementById('flightsView').classList.add('active');
    }

    else if (view === 'westjet') {
        document.getElementById('westjetView').classList.add('active');
    }

    else if (view === 'jetblue') {
        document.getElementById('jetblueView').classList.add('active');
    }
    else if (view === 'announcement') {
    document.getElementById('announcementView').classList.add('active');
    showAnnouncement();
}


    currentView = view;
}


/* ========================= */
/* ROTACIÓN AUTOMÁTICA */
/* ========================= */
function startRotation() {

    switchView('flights');

    rotationTimer = setInterval(() => {

        if (currentView === 'flights') {
            switchView('westjet');
        } 
        else if (currentView === 'westjet') {
            switchView('jetblue');
        } 
        else if (currentView === 'jetblue') {

            if (announcements.length > 0) {
                switchView('announcement');
            } else {
                switchView('flights');
            }
        } 
        else if (currentView === 'announcement') {
            switchView('flights');
        }

    }, rotationDelay * 1000);
}

/* ========================= */
/* TECLAS DE CONTROL (OPCIONAL) */
/* ========================= */
document.addEventListener('keydown', (e) => {
    if (e.key === '1') switchView('flights');
    if (e.key === '2') switchView('assignments');
    if (e.key === '3') {
        if (announcements.length > 0) switchView('announcement');
    }
    if (e.key === 'f' || e.key === 'F') {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
        } else {
            document.exitFullscreen();
        }
    }
});

startRotation();

</script>
