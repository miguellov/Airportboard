/** YouTube / Vimeo → URL de embed con autoplay silenciado (mejor que pegar solo watch). */
function tryYoutubeVimeoEmbedUrl(u) {
    const h = u.hostname.toLowerCase().replace(/^www\./, "");
    const ytQ = "autoplay=1&mute=1&rel=0&playsinline=1&modestbranding=1";

    if(h === "youtu.be") {
        const id = u.pathname.replace(/^\//, "").split("/")[0];
        if(!id || !/^[a-zA-Z0-9_-]{6,32}$/.test(id)) return null;
        return `https://www.youtube.com/embed/${encodeURIComponent(id)}?${ytQ}`;
    }
    if(h === "youtube.com" || h === "m.youtube.com" || h === "youtube-nocookie.com" || h === "music.youtube.com") {
        const base = h === "youtube-nocookie.com" ? "https://www.youtube-nocookie.com" : "https://www.youtube.com";
        if(u.pathname.startsWith("/embed/")) {
            const id = u.pathname.slice(7).split("/")[0];
            if(!id || !/^[a-zA-Z0-9_-]{6,32}$/.test(id)) return null;
            return `${base}/embed/${encodeURIComponent(id)}?${ytQ}`;
        }
        const v = u.searchParams.get("v");
        if(v && /^[a-zA-Z0-9_-]{6,32}$/.test(v)) {
            return `${base}/embed/${encodeURIComponent(v)}?${ytQ}`;
        }
        const shorts = u.pathname.match(/^\/shorts\/([a-zA-Z0-9_-]{6,32})/);
        if(shorts) return `${base}/embed/${encodeURIComponent(shorts[1])}?${ytQ}`;
        return null;
    }
    if(h === "vimeo.com") {
        const m = u.pathname.match(/^\/(\d{5,20})(?:\/|$)/);
        if(m) return `https://player.vimeo.com/video/${m[1]}?autoplay=1&muted=1&playsinline=1`;
        return null;
    }
    if(h === "player.vimeo.com") {
        const m = u.pathname.match(/\/video\/(\d{5,20})/);
        if(m) return `https://player.vimeo.com/video/${m[1]}?autoplay=1&muted=1&playsinline=1`;
        return null;
    }
    return null;
}

/** Cualquier http(s) válido; mejora enlaces YouTube/Vimeo. No acepta javascript:, data:, etc. */
function sanitizeBoardEmbedUrl(raw) {
    const s0 = String(raw || "").trim();
    if(!s0) return null;
    const low = s0.toLowerCase();
    if(low.startsWith("data:") || low.startsWith("javascript:") || low.startsWith("vbscript:") || low.startsWith("file:")) {
        return null;
    }
    const s = /^https?:\/\//i.test(s0) ? s0 : "https://" + s0;
    let u;
    try {
        u = new URL(s);
    } catch {
        return null;
    }
    if(u.protocol !== "http:" && u.protocol !== "https:") return null;
    const special = tryYoutubeVimeoEmbedUrl(u);
    if(special) return special;
    return u.href;
}

/** Cómo mostrar la URL ya guardada: archivo de vídeo vs página embebida. */
function classifyBoardEmbedForRender(urlStr) {
    if(!urlStr || typeof urlStr !== "string") return null;
    const low = urlStr.trim().toLowerCase();
    if(low.startsWith("data:") || low.startsWith("javascript:") || low.startsWith("vbscript:")) return null;
    let u;
    try {
        u = new URL(urlStr);
    } catch {
        return null;
    }
    if(u.protocol !== "http:" && u.protocol !== "https:") return null;
    const path = u.pathname.toLowerCase();
    if(/\.(mp4|webm|ogg|m4v|mov|ogv|m3u8)(\?[^#]*)?(#|$)/i.test(path)) {
        return { kind: "video", url: urlStr };
    }
    return { kind: "iframe", url: urlStr };
}

/** Zona horaria del aeropuerto (POP / Puerto Plata). */
const BOARD_TZ_IANA = "America/Santo_Domingo";

function dateTodayInPop() {
    return new Intl.DateTimeFormat("en-CA", { timeZone: BOARD_TZ_IANA }).format(new Date());
}

function isBoardDateFuture() {
    return selectedDate > dateTodayInPop();
}

let selectedDate = dateTodayInPop();
let unsubscribeFlightsByDate = null;

/** Hora de llegada a POP (RD, UTC-4 fijo, sin DST). */
const BOARD_ARRIVAL_TZ = "-04:00";

/** Hora efectiva en puerta: en ruta usa estimada; si ya aterrizó usa real. */
function isLandingBoardEstado(estado) {
    const n = String(estado || "")
        .toUpperCase()
        .replace(/\s+/g, "-")
        .replace(/Ó/g, "O")
        .replace(/_/g, "-");
    return n === "ARRIVED" || n === "LANDED" || n === "ATERRIZADO" || n === "ATERIZADO";
}

function effectiveArrivalHhmm(r) {
    const x = r || {};
    const ignoreLiveFields = isBoardDateFuture() && !x.manual;
    const hasReal = !ignoreLiveFields && Boolean(String(x.llegadaReal || "").trim());
    const isArrived = !ignoreLiveFields && (isLandingBoardEstado(x.estado) || hasReal);
    if (isArrived) {
        return (
            String(x.llegadaReal || "").trim() ||
            String(x.llegada || "").trim() ||
            String(x.llegadaEstimada || "").trim() ||
            String(x.llegadaProgramada || "").trim() ||
            "00:00"
        );
    }
    return (
        String(x.llegadaEstimada || "").trim() ||
        String(x.llegada || "").trim() ||
        String(x.llegadaProgramada || "").trim() ||
        String(x.llegadaReal || "").trim() ||
        "00:00"
    );
}

/** Interpreta HH:MM del día `dateStr` en hora local de llegada al aeropuerto (POP). */
function parseLlegadaInstant(dateStr, hhmm) {
    if(!/^\d{4}-\d{2}-\d{2}$/.test(String(dateStr || ""))) return new Date(NaN);
    const raw = String(hhmm || "00:00").trim();
    const m = raw.match(/^(\d{1,2}):(\d{2})/);
    if(!m) return new Date(NaN);
    const h = Math.min(23, Math.max(0, parseInt(m[1], 10)));
    const min = Math.min(59, Math.max(0, parseInt(m[2], 10)));
    return new Date(
        `${dateStr}T${String(h).padStart(2, "0")}:${String(min).padStart(2, "0")}:00${BOARD_ARRIVAL_TZ}`
    );
}

/**
 * Avisos de voz por vuelo: si la API cambia la hora (retraso/adelanto),
 * se reinician los hitos de ese vuelo para anunciar con la nueva ETA.
 * Clave: fecha|vuelo → { eff, announced: { '@30': true, ... } }
 */
let speechArrivalMeta = Object.create(null);
let arrivalSpeechMinutes = [30, 15, 1];
let arrivalSpeechTolerance = 7;

function parseArrivalSpeechMinutesValue(val){
    if(Array.isArray(val)){
        const mins = val.map((n) => parseInt(n, 10)).filter((n) => !Number.isNaN(n) && n >= 1 && n <= 180);
        if(mins.length) return [...new Set(mins)].sort((a, b) => b - a);
    }
    if(typeof val === "string" && val.trim()){
        const mins = val.split(/[,;\s]+/).map((s) => parseInt(s.trim(), 10)).filter((n) => !Number.isNaN(n) && n >= 1 && n <= 180);
        if(mins.length) return [...new Set(mins)].sort((a, b) => b - a);
    }
    return null;
}

function applyArrivalSpeechSettings(minutesVal, toleranceVal){
    let changed = false;
    const parsed = parseArrivalSpeechMinutesValue(minutesVal);
    if(parsed){
        const next = JSON.stringify(parsed);
        if(next !== JSON.stringify(arrivalSpeechMinutes)){
            arrivalSpeechMinutes = parsed;
            changed = true;
        }
    }
    if(toleranceVal !== undefined && toleranceVal !== null){
        const t = parseInt(toleranceVal, 10);
        if(!Number.isNaN(t)){
            const clamped = Math.max(3, Math.min(15, t));
            if(clamped !== arrivalSpeechTolerance){
                arrivalSpeechTolerance = clamped;
                changed = true;
            }
        }
    }
    if(changed) speechArrivalMeta = Object.create(null);
}

/** Tras un toque/tecla: desbloquea voz TTS + Web Audio (Samsung TV suele exigirlo) */
let mediaUnlocked = false;

function prepareSpeechSynth() {
    if (!window.speechSynthesis) return;
    try {
        if (speechSynthesis.paused) speechSynthesis.resume();
    } catch (e) { /* noop */ }
}

function pickLatinoSpanishVoice() {
    const voices = speechSynthesis.getVoices();
    if (!voices.length) return null;
    const pick = (re) => voices.find((v) => re.test(v.lang));
    return pick(/^es-MX/i)
        || pick(/^es-419/i)
        || pick(/^es-US/i)
        || pick(/^es-AR/i)
        || pick(/^es-CO/i)
        || pick(/^es-CL/i)
        || pick(/^es-PE/i)
        || voices.find((v) => v.lang.startsWith("es") && !/^es-ES/i.test(v.lang))
        || voices.find((v) => v.lang.startsWith("es"));
}

/** Números en grupos de 2 (impar: 1 dígito + pares). Ej: 627→6,27 | 1528→15,28 | 61528→6,15,28 */
function chunkDigitRun(run) {
    const d = String(run).replace(/\D/g, "");
    if (d.length <= 2) return d;
    const parts = [];
    let i = 0;
    if (d.length % 2 === 1) {
        parts.push(d.slice(0, 1));
        i = 1;
    }
    while (i < d.length) {
        parts.push(d.slice(i, i + 2));
        i += 2;
    }
    return parts.join(", ");
}

/** Para voz: no leer 1528 como entero; ej. B6 627/1528 → B6, 6, 27. 15, 28 */
function formatVueloForSpeech(vuelo) {
    const s = (vuelo || "").replace(/\s+/g, " ").trim();
    if (!s) return "desconocido";
    const legs = s.split("/").map((x) => x.trim()).filter(Boolean);

    function formatOneLeg(leg) {
        const t = leg.trim();
        const m = t.match(/^(.+?)\s+(\d{2,})$/);
        if (m) {
            return `${m[1].trim()}, ${chunkDigitRun(m[2])}`;
        }
        if (/^\d+$/.test(t)) {
            return chunkDigitRun(t);
        }
        return t.replace(/\d{3,}/g, (r) => chunkDigitRun(r));
    }

    return legs.map(formatOneLeg).join(". ");
}

function buildArrivalPhrase(vuelo, minutes) {
    const v = formatVueloForSpeech(vuelo);
    if(minutes === 1) return `Vuelo ${v}. Aterrizando en 1 minuto.`;
    if(minutes <= 5) return `Vuelo ${v}. Aterrizando en ${minutes} minutos.`;
    return `Vuelo ${v}. Llegada en ${minutes} minutos.`;
}

function speakTwiceLatino(text) {
    if (!window.speechSynthesis || typeof SpeechSynthesisUtterance === "undefined") return;
    try { speechSynthesis.cancel(); } catch (e) { /* noop */ }
    prepareSpeechSynth();
    const voice = pickLatinoSpanishVoice();
    const lang = voice?.lang?.startsWith("es") ? voice.lang : "es-MX";

    const mk = () => {
        const u = new SpeechSynthesisUtterance(text);
        u.lang = lang;
        u.rate = 0.88;
        u.pitch = 1;
        if (voice) u.voice = voice;
        return u;
    };

    const u1 = mk();
    u1.onend = () => {
        prepareSpeechSynth();
        try {
            speechSynthesis.speak(mk());
        } catch (e) { /* noop */ }
    };
    u1.onerror = () => {
        try {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = "es";
            u.rate = 0.88;
            speechSynthesis.speak(u);
        } catch (e2) { /* noop */ }
    };
    try {
        speechSynthesis.speak(u1);
    } catch (e) {
        try {
            const u = new SpeechSynthesisUtterance(text);
            u.lang = "es";
            u.rate = 0.88;
            speechSynthesis.speak(u);
        } catch (e2) { /* noop */ }
    }
}

function showArrivalToast(vuelo, minutes) {
    const el = document.getElementById("flightArrivalToast");
    if (!el) return;
    el.innerHTML = "";
    const t1 = document.createElement("div");
    t1.className = "toast-title";
    t1.textContent = "Aviso llegada";
    const t2 = document.createElement("div");
    t2.className = "toast-body";
    const minTxt = minutes === 1 ? "1 minuto" : `${minutes} minutos`;
    t2.textContent = `Vuelo ${vuelo} · ${minTxt}`;
    el.appendChild(t1);
    el.appendChild(t2);
    el.classList.add("visible");
    clearTimeout(showArrivalToast._hide);
    showArrivalToast._hide = setTimeout(() => el.classList.remove("visible"), 12000);
}

function playArrivalBeep() {
    try {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return;
        let ctx = window.__boardAudioCtx;
        if (!ctx) {
            ctx = new Ctx();
            window.__boardAudioCtx = ctx;
        }
        if (ctx.state === "suspended") {
            ctx.resume().catch(() => {});
        }
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = "sine";
        o.frequency.setValueAtTime(720, ctx.currentTime);
        o.frequency.exponentialRampToValueAtTime(520, ctx.currentTime + 0.08);
        g.gain.setValueAtTime(0.0001, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.11, ctx.currentTime + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.18);
        o.connect(g);
        g.connect(ctx.destination);
        const t0 = ctx.currentTime;
        o.start(t0);
        o.stop(t0 + 0.2);
    } catch (e) { /* noop */ }
}

function getArrivalSpeechMilestone(diffMin){
    const sorted = [...arrivalSpeechMinutes].sort((a, b) => b - a);
    for(const m of sorted){
        const floor = Math.max(0, m - arrivalSpeechTolerance);
        if(diffMin <= m && diffMin >= floor) return m;
    }
    return null;
}

function tryArrivalSpeech(r, diffMin, dateStr) {
    const eff = effectiveArrivalHhmm(r);
    if(diffMin <= 0 || eff === "00:00") return;

    const milestone = getArrivalSpeechMilestone(diffMin);
    if(!milestone) return;

    const vuelo = (r.vuelo || "").trim() || "N/A";
    const flightKey = `${dateStr}|${vuelo}`;
    let meta = speechArrivalMeta[flightKey];

    if(!meta || meta.eff !== eff){
        speechArrivalMeta[flightKey] = { eff, announced: Object.create(null) };
        meta = speechArrivalMeta[flightKey];
    }

    const flagKey = `@${milestone}`;
    if(meta.announced[flagKey]) return;
    meta.announced[flagKey] = true;

    showArrivalToast(vuelo, milestone);
    playArrivalBeep();

    if(mediaUnlocked && window.speechSynthesis){
        speakTwiceLatino(buildArrivalPhrase(vuelo, milestone));
    }
}

function unlockMediaFromUser() {
    if (mediaUnlocked) return;
    mediaUnlocked = true;
    prepareSpeechSynth();
    if (window.speechSynthesis) speechSynthesis.getVoices();
    try {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (Ctx && !window.__boardAudioCtx) {
            window.__boardAudioCtx = new Ctx();
        }
        if (window.__boardAudioCtx?.state === "suspended") {
            window.__boardAudioCtx.resume().catch(() => {});
        }
    } catch (e) { /* noop */ }
}

window.addEventListener("pointerdown", unlockMediaFromUser, { once: true, passive: true });
window.addEventListener("keydown", unlockMediaFromUser, { once: true });

if (window.speechSynthesis) {
    speechSynthesis.getVoices();
    window.addEventListener("voiceschanged", () => speechSynthesis.getVoices());
    [100, 400, 1200].forEach((ms) => setTimeout(() => speechSynthesis.getVoices(), ms));
}

    const root = el || document.documentElement;
    root.style.setProperty("--anuncio-media-scale", anuncioImageScale);
    root.style.setProperty("--anuncio-media-fit", anuncioImageFit);

onValue(ref(db,"config/anuncioImageScale"), snap => {

    if(!Number.isNaN(value) && value >= 30 && value <= 150){
        anuncioImageScale = value;
    }else{
        anuncioImageScale = 100;
    }
    applyAnuncioMediaVars();
});

onValue(ref(db,"config/anuncioImageFit"), snap => {

    anuncioImageFit = value === "cover" ? "cover" : "contain";
    applyAnuncioMediaVars();
});

onValue(ref(db,"config/anuncioImageBg"), snap => {
    const value = snap.val();
    anuncioImageBg = typeof value === "string" && value ? value : "#000000";
    applyAnuncioMediaVars();

onValue(ref(db,"config/flightSectionSeconds"), snap => {
    const value = parseInt(snap.val());
    if(!Number.isNaN(value) && value >= 5 && value <= 180){
        flightSectionSeconds = value;
    }else{
        flightSectionSeconds = 15;
    }

onValue(ref(db, "config/arrivalSpeechMinutes"), snap => {

onValue(ref(db, "config/arrivalSpeechTolerance"), snap => {

function watchFlightsForDate(dateStr){
    if(unsubscribeFlightsByDate) unsubscribeFlightsByDate();
    unsubscribeFlightsByDate = onValue(ref(db, "flightsByDate/" + dateStr), snap => {
        vuelosData = Object.values(snap.val() || {});
        lastFlightsDataSig = "";
        renderVuelos(true);
    });
}

onValue(ref(db, "config/selectedDate"), snap => {
    const prev = selectedDate;
    const cfgDate = snap.val();
    if (cfgDate) selectedDate = cfgDate;
    if (prev !== selectedDate) speechArrivalMeta = Object.create(null);
    watchFlightsForDate(selectedDate);
});

function mostrarAnuncios(){
    const contenedor = document.getElementById("anuncioFull");

    function escapeHtml(s){
        return String(s ?? "")
            .replace(/&/g,"&amp;")
            .replace(/</g,"&lt;")
            .replace(/"/g,"&quot;");
    }

    function formatearFechaBonita(fechaISO){
        if(!fechaISO) return "";
        const fecha = new Date(fechaISO + "T00:00:00");
        const texto = fecha.toLocaleDateString("es-DO", { day: "numeric", month: "long" });
        return texto.charAt(0).toUpperCase() + texto.slice(1);
    }

    function formatearFechaCartulina(fechaISO){
        if(!fechaISO) return "";
        const fecha = new Date(fechaISO + "T12:00:00");
        const d = fecha.getDate();
        const mes = fecha.toLocaleDateString("es-DO", { month: "long" });
        return `${String(d).padStart(2,"0")} DE ${mes.toUpperCase()}`;
    }

    function relojCumpleBloque(){
        const now = new Date();
        return `
            <div class="cumple-clock">
                <div class="d">${now.toLocaleDateString("es-DO",{ weekday:"long", day:"2-digit", month:"long", year:"numeric" })}</div>
                <div class="t">${now.toLocaleTimeString("es-DO")}</div>
            </div>`;
    }

    function extraerNombreDesdeTexto(texto){
        if(!texto) return "";
        return texto
            .replace(/feliz cumpleaños/ig, "")
            .replace(/feliz cumple/ig, "")
            .trim();
    }

    /** RTDB puede devolver `texts` como objeto con claves "0","1" en lugar de array. */
    function normalizeCanvasLayoutTexts(layout){
        if(!layout || layout.texts == null) return [];
        const t = layout.texts;
        if(Array.isArray(t)) return t;
        if(typeof t === "object") {
            return Object.keys(t)
                .filter((k) => /^\d+$/.test(k))
                .sort((a, b) => Number(a) - Number(b))
                .map((k) => t[k])
                .filter((x) => x && typeof x === "object");
        }
        return [];
    }

    /** `layout.bg` a veces llega incompleto; `canvas.mediaFrame` es la copia de respaldo del panel. */
    function normalizeCanvasMediaRect(layout, canvas){
        const d = { x: 50, y: 50, w: 100, h: 100 };
        const L = layout && layout.bg && typeof layout.bg === "object" ? layout.bg : null;
        const M = canvas && canvas.mediaFrame && typeof canvas.mediaFrame === "object" ? canvas.mediaFrame : null;
        ["x", "y", "w", "h"].forEach((k) => {
            const v = L && L[k] != null ? Number(L[k]) : NaN;
            if(Number.isFinite(v)) d[k] = v;
        });
        ["x", "y", "w", "h"].forEach((k) => {
            const v = M && M[k] != null ? Number(M[k]) : NaN;
            if(Number.isFinite(v)) d[k] = v;
        });
        return d;
    }

    function renderCanvasCard(a){
        const c = a?.canvas || {};
        contenedor.classList.remove("anuncio-full--embed-fs");
        const storedEmbed = (c.embedUrl || "").trim();

                const v = contenedor.querySelector("video");
                if(v) {
                    v.setAttribute("src", mode.url);
                    v.setAttribute("muted", "");
                    v.muted = true;
                    v.setAttribute("autoplay", "");
                    v.loop = true;
                }
            } else {
                contenedor.innerHTML = `<div class="anuncio-embed-shell"><iframe class="anuncio-embed-iframe" title="Contenido embebido" allowfullscreen referrerpolicy="strict-origin-when-cross-origin" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"></iframe></div>`;
                const ifr = contenedor.querySelector("iframe");
                if(ifr) ifr.setAttribute("src", mode.url);

        }

        const layout = c.layout;
        const textsNorm = normalizeCanvasLayoutTexts(layout);
        if(layout && layout.v === 1 && textsNorm.length) {
            const bgColor = c.bgColor || "#0f172a";
            const overlayOpacityValue = parseInt(c.overlayOpacity);
            const overlayOpacity = Math.max(0, Math.min(80, Number.isNaN(overlayOpacityValue) ? 35 : overlayOpacityValue)) / 100;
            const seconds = Math.max(1, Math.min(12, parseInt(c.duracionTexto) || 3));
            const anim = (c.animacion || "fade-up").toLowerCase();
            const animClass = `canvas-anim-${

            const media = a.media || "";

                : "";
            const textsHtml = textsNorm.map((t) => {

                const fs = parseFloat(t.fontSize) || 4;

                const align = ["left", "center", "right"].includes(t.align) ? t.align : "center";

            }).join("");

            contenedor.innerHTML = `
            <div class="anuncio-canvas anuncio-canvas--free" style="background:${bgColor}; --canvas-anim-seconds:${seconds}s;">
                <div class="anuncio-canvas-board-stage">
                    ${mediaBlock ? `
                    <div class="anuncio-canvas-board-bg" style="left:${b.x}%;top:${b.y}%;width:${b.w}%;height:${b.h}%;">

                    <div class="anuncio-canvas-board-overlay" style="background:linear-gradient(180deg, rgba(2,6,23,${Math.max(0, overlayOpacity - 0.15)}), rgba(2,6,23,${overlayOpacity}));"></div>
                    <div class="anuncio-canvas-board-texts">${textsHtml}</div>
                </div>

        }

        const titulo = escapeHtml(c.titulo || a.texto || "");
        const subtitulo = escapeHtml(c.subtitulo || "");
        const textColor = c.textColor || "#ffffff";
        const bgColor = c.bgColor || "#0f172a";
        const fontFamily = c.fontFamily || "Inter, Arial, sans-serif";
        const textPosition = ["left", "center", "right"].includes(c.textPosition) ? c.textPosition : "center";
        const overlayOpacityValue = parseInt(c.overlayOpacity);
        const overlayOpacity = Math.max(0, Math.min(80, Number.isNaN(overlayOpacityValue) ? 35 : overlayOpacityValue)) / 100;
        const seconds = Math.max(1, Math.min(12, parseInt(c.duracionTexto) || 3));
        const anim = (c.animacion || "fade-up").toLowerCase();
        const animClass = `canvas-anim-${
            ["fade-up", "zoom-in", "slide-left", "glow"].includes(anim) ? anim : "fade-up"
        }`;
        const media = a.media || "";
        const mediaType = a.mediaType || "";
        const hasVideo = media && (mediaType.startsWith("video/") || media.startsWith("data:video"));
        const mediaHtml = media
            ? (hasVideo
                ? `<video class="anuncio-canvas-media" src="${media}" autoplay muted loop playsinline></video>`
                : `<img class="anuncio-canvas-media" src="${media}" alt="" loading="lazy" referrerpolicy="no-referrer">`)
            : "";

        contenedor.innerHTML = `
            <div class="anuncio-canvas" style="background:${bgColor}; --canvas-anim-seconds:${seconds}s;">
                ${mediaHtml}
                <div class="anuncio-canvas-overlay" style="background:linear-gradient(180deg, rgba(2,6,23,${Math.max(0, overlayOpacity - 0.15)}), rgba(2,6,23,${overlayOpacity}));"></div>
                <div class="anuncio-canvas-content ${animClass} pos-${textPosition}" style="color:${textColor}; font-family:${fontFamily};">
                    ${titulo ? `<h1 class="anuncio-canvas-title">${titulo}</h1>` : ""}
                    ${subtitulo ? `<p class="anuncio-canvas-subtitle">${subtitulo}</p>` : ""}
                </div>

    }

    function buscarCumplePorNombre(nombre){

        return Object.values(cumpleanosData || {}).find((c) => {

        const fechaShowRaw = item?.fecha

    function renderCumpleCard(a){
        const templateUrl = (a?.cumpleTemplate || CUMPLE_TEMPLATE_URL).replace(/"/g, "");
        const lista = Array.isArray(a.cumpleaneros) ? a.cumpleaneros : [];
        if(lista.length){

            contenedor.innerHTML = `
                <div class="cumple-celebracion cumple-celebracion--template" style="background-image:url('${templateUrl}')">

        const single = {
            nombre: nombreInferido || cumpleMatch?.nombre || "Cumpleañero",

        };

                </div>

    if(anuncioLoopInterval){
        clearInterval(anuncioLoopInterval);
        anuncioLoopInterval = null;

    if(anuncioHideTimeout){
        clearTimeout(anuncioHideTimeout);
        anuncioHideTimeout = null;

    if(!anuncios.length || !anunciosActivos){

        contenedor.classList.remove("anuncio-full--cumple", "active", "anuncio-full--embed-fs", "anuncio-full--msg-media-full");
        document.body.classList.remove("board--msg-media-full", "board--cumple-full");
        return;
    }

    function loop(){
        if(anuncioHideTimeout){
            clearTimeout(anuncioHideTimeout);
            anuncioHideTimeout = null;
        }
        if(!anuncios.length || !anunciosActivos){
            contenedor.style.display = "none";
            contenedor.classList.remove("anuncio-full--cumple", "active", "anuncio-full--embed-fs", "anuncio-full--msg-media-full");
            document.body.classList.remove("board--msg-media-full", "board--cumple-full");
            return;
        }
        const a = anuncios[indexAnuncio];
        const esCanvas = a.tipo === "canvas" || (a.canvas && typeof a.canvas === "object");
        const esMensajeCumple = a.tipo === "mensaje" && /feliz cumpleaños/i.test(a.texto || "");

        contenedor.style.display = "flex";
        contenedor.classList.add("active");
        contenedor.classList.remove("anuncio-full--embed-fs", "anuncio-full--msg-media-full", "anuncio-full--cumple");
        document.body.classList.remove("board--msg-media-full", "board--cumple-full");

        if(a.tipo === "mensaje" && !esMensajeCumple){
            const media = a.media || "";
            const mediaType = a.mediaType || "";
            const hasVideo = media && (mediaType.startsWith("video/") || media.startsWith("data:video"));
            if(media) {
                contenedor.classList.add("anuncio-full--msg-media-full");

                    : `<div class="anuncio-msg-media-shell"><img class="anuncio-msg-media-fit" src="${media}" alt="" loading="lazy" referrerpolicy="no-referrer"></div>`;
            } else {
                contenedor.innerHTML = `
                <div style="text-align:center; color:#00ffff; font-size:40px;">
                    ${escapeHtml(a.texto || "")}
                </div>
            `;
            }
        }

        if(a.tipo === "cumple" || esMensajeCumple){
            contenedor.classList.add("anuncio-full--cumple");
            document.body.classList.add("board--cumple-full");
            renderCumpleCard(a);
        }

        if(esCanvas){
            contenedor.classList.remove("anuncio-full--cumple");
            document.body.classList.remove("board--cumple-full");
            renderCanvasCard(a);
        }

        anuncioHideTimeout = setTimeout(()=>{
            contenedor.style.display = "none";
            contenedor.classList.remove("active", "anuncio-full--embed-fs", "anuncio-full--msg-media-full", "anuncio-full--cumple");
            document.body.classList.remove("board--msg-media-full", "board--cumple-full");
        }, (a.duracion || 10) * 1000);

        indexAnuncio = (indexAnuncio + 1) % anuncios.length;
    }

    anuncioSlideLooper = loop;
    loop();
    if(!suppressAnuncioAutoLoop){
        anuncioLoopInterval = setInterval(loop, flightSectionSeconds * 1000);
    }
}

function getFlightAirlineTheme(row){
    const v = String(row?.vuelo || "").toUpperCase().replace(/\s+/g, "");
    const a = String(row?.aerolinea || "").toLowerCase();

    if(a.includes("jetblue") || a.includes("jet blue") || /^B6|^JBU/.test(v)){
        return "jetblue";
    }
    if(a.includes("westjet") || a.includes("west jet") || /^WS|^WJA|^WEN/.test(v)){
        return "westjet";
    }
    return "";
}

function statusDisplayLabel(estado) {
    const raw = String(estado || "").trim();
    const n = raw.toUpperCase().replace(/\s+/g, "-").replace(/Ó/g, "O").replace(/_/g, "-");
    if (n === "ON-TIME" || n === "ON") return "ON-TIME";
    if (n === "DELAYED") return "DELAYED";
    const labels = {
        ATERRIZADO: "ATERRIZADO",
        ATERIZADO: "ATERRIZADO",
        ARRIVED: "ATERRIZADO",
        LANDED: "ATERRIZADO",
        ARRIVING: "LLEGANDO",
        SALIO: "SALIÓ",
        BOARDING: "ABORDAJE",
        DEPARTED: "DESPEGÓ",
        CANCELLED: "CANCELADO",
        DIVERTED: "DESVIADO"
    };
    if (labels[n]) return labels[n];
    if (raw.toUpperCase() === "SALIÓ") return "SALIÓ";
    return raw || "ON-TIME";
}

function statusPillHtml(estado, estadoClase){
    const cls = "status-pill status-pill--" + (estadoClase || "on-time");
    return `<span class="${cls}">${escapeHtmlBoard(statusDisplayLabel(estado))}</span>`;
}

function estadoCssClass(estado) {
    return String(estado || "on-time")
        .toLowerCase()
        .replace(/\s+/g, "-")
        .replace(/ó/g, "o")
        .replace(/[^a-z0-9-]/g, "") || "on-time";
}

function isVagueBoardEstado(estado) {
    const n = String(estado || "")
        .toUpperCase()
        .replace(/\s+/g, "-")
        .replace(/Ó/g, "O")
        .replace(/_/g, "-");
    return !n || n === "ON-TIME" || n === "ON" || n === "EN-ROUTE" || n === "SCHEDULED";
}

/** Minutos hasta HH:MM en selectedDate (negativo = ya pasó). */
function minutesUntilBoardTime(dateStr, hhmm) {
    const dt = parseLlegadaInstant(dateStr, hhmm);
    if (Number.isNaN(dt.getTime())) return null;
    return Math.floor((dt.getTime() - Date.now()) / 60000);
}

/** En ruta: salió del origen de verdad (hora real pasada), no solo programada. */
function flightEnRouteFromOrigin(r, diffMinArrival) {
    if (diffMinArrival <= 10) return false;
    const so = String(r.salidaOrigen || "").trim();
    if (!so) {
        return r.enRuta === true;
    }
    const depMin = minutesUntilBoardTime(selectedDate, so);
    if (depMin === null) return false;
    return depMin <= 0;
}

function flightHasLanded(r, diffMin) {
    if (r.manual && isLandingBoardEstado(r.estado)) return true;
    if (diffMin > 0) return false;
    if (isLandingBoardEstado(r.estado)) return true;
    if (String(r.llegadaReal || "").trim()) return true;
    if (String(r.llegada || "").trim()) return true;
    return false;
}

let lastFlightRenderCount = -1;
let lastFlightsDataSig = "";

function flightsDataSignature() {
    return (
        selectedDate +
        "|" +
        vuelosData
            .map((r) =>
                [
                    r.vuelo,
                    r.llegada,
                    r.llegadaProgramada,
                    r.llegadaEstimada,
                    r.llegadaReal,
                    r.salida,
                    r.destino,
                    r.estado,
                    r.gate,
                    r.salidaOrigen,
                    r.enRuta
                ].join(":")
            )
            .join(";")
    );
}

function computeFlightRowState(r) {
    const eff = effectiveArrivalHhmm(r);
    let llegadaDt = parseLlegadaInstant(selectedDate, eff);
    if (Number.isNaN(llegadaDt.getTime())) {
        llegadaDt = parseLlegadaInstant(selectedDate, "00:00");
    }

    const diffMs = llegadaDt.getTime() - Date.now();
    const diffMin = Math.floor(diffMs / 60000);
    const hours = Math.floor(diffMin / 60);
    const minutes = diffMin % 60;

    const estadoNorm = (r.estado || "")
        .toString()
        .toUpperCase()
        .replace(/\s+/g, "-")
        .replace(/Ó/g, "O")
        .replace(/_/g, "-");
    const estadoManual = ["BOARDING", "DELAYED", "CANCELLED", "DIVERTED"].includes(
        estadoNorm
    );

    let estadoFinal = r.estado || "ON-TIME";
    let estadoClase = estadoCssClass(estadoFinal);
    let extraClass = "";
    const totalMin = 120;
    let progreso = 100 - (diffMin / totalMin) * 100;

    if (progreso < 0) progreso = 0;
    if (progreso > 100) progreso = 100;

    if (flightHasLanded(r, diffMin)) {
        estadoFinal = "ATERRIZADO";
        estadoClase = "arrived";
    } else if (!estadoManual) {
        if (isVagueBoardEstado(r.estado)) {
            if (diffMin <= 10 && diffMin > 0) {
                estadoFinal = "ARRIVING";
                estadoClase = "arriving";
            } else if (
                !isBoardDateFuture() &&
                flightEnRouteFromOrigin(r, diffMin)
            ) {
                estadoFinal = "SALIÓ";
                estadoClase = "salio";
            } else if (isBoardDateFuture()) {
                estadoFinal = "ON-TIME";
                estadoClase = "on-time";
            } else if (
                !isBoardDateFuture() &&
                (estadoNorm === "SALIO" || estadoNorm === "EN-ROUTE")
            ) {
                estadoFinal = "ON-TIME";
                estadoClase = "on-time";
            }
        } else {
            if (isBoardDateFuture() && !r.manual) {
                estadoFinal = "ON-TIME";
                estadoClase = "on-time";
            } else if (
                !r.manual &&
                (estadoNorm === "SALIO" || estadoNorm === "EN-ROUTE") &&
                !flightEnRouteFromOrigin(r, diffMin)
            ) {
                estadoFinal = "ON-TIME";
                estadoClase = "on-time";
            } else {
                estadoFinal = r.estado || "ON-TIME";
                estadoClase = estadoCssClass(estadoFinal);
            }
        }
        if (diffMin <= 30 && diffMin > 0 && estadoFinal !== "ATERRIZADO") extraClass = "blink";
        if (estadoFinal === "ARRIVING" || estadoClase === "arriving") extraClass = "blink";
    } else if (diffMin <= 30 && diffMin > 0) {
        extraClass = "blink";
    }

    let countdown = "0 min";
    let countdownClass = "countdown-green";
    if (diffMin > 0) {
        countdown = hours > 0 ? hours + "h " + minutes + "m" : minutes + " min";
        if (diffMin <= 60) countdownClass = "countdown-yellow";
        if (diffMin <= 15) countdownClass = "countdown-red";
    }

    const prog = String(r.llegadaProgramada || "").trim();
    const showProg = prog && eff && prog !== eff;
    const airlineTheme = getFlightAirlineTheme(r);
    const airlineClass = airlineTheme ? ` flight-row--${airlineTheme}` : "";

    return {
        eff,
        prog,
        showProg,
        diffMin,
        estadoFinal,
        estadoClase,
        extraClass,
        progreso,
        countdown,
        countdownClass,
        airlineClass
    };
}

function pruneSpeechArrivalMeta() {
    const active = new Set(
        vuelosData.map((r) => `${selectedDate}|${(r.vuelo || "").trim() || "N/A"}`)

function tickFlightCountdowns() {
    const rows = document.querySelectorAll("#board tr.flight-row");
    vuelosData.forEach((r, i) => {
        const tr = rows[i];
        if (!tr) return;
        const st = computeFlightRowState(r);
        tr.className = `flight-row ${st.estadoClase}${st.airlineClass} ${st.extraClass}`.trim();
        tr.style.setProperty("--row-progress", st.progreso + "%");
        const pill = tr.querySelector(".countdown-pill");
        if (pill) {
            pill.textContent = st.countdown;
            pill.className = "countdown-pill " + st.countdownClass;
        }

        const planeWrap = tr.querySelector(".flight-progress__plane-wrap");

        if (planeWrap) planeWrap.style.left = st.progreso + "%";
        const statusCell = tr.querySelector(".flight-row-grid > .flight-row-cell:last-child");
        if (statusCell) statusCell.innerHTML = statusPillHtml(st.estadoFinal, st.estadoClase);
        tryArrivalSpeech(r, st.diffMin, selectedDate);
    });
    pruneSpeechArrivalMeta();

let flightScrollRaf = null;
let flightScrollDir = 1;

function stopFlightAutoScroll(){
    if(flightScrollRaf){
        cancelAnimationFrame(flightScrollRaf);
        flightScrollRaf = null;
    }
}

function startFlightAutoScroll(wrap){
    stopFlightAutoScroll();
    let last = 0;
    const step = (ts) => {
        if(!wrap.isConnected){
            stopFlightAutoScroll();
            return;
        }
        const max = wrap.scrollHeight - wrap.clientHeight;
        if(max <= 2){
            wrap.scrollTop = 0;
            stopFlightAutoScroll();
            return;
        }
        if(ts - last > 35){
            wrap.scrollTop += flightScrollDir * 2;
            if(wrap.scrollTop >= max - 1) flightScrollDir = -1;
            if(wrap.scrollTop <= 0) flightScrollDir = 1;
            last = ts;
        }
        flightScrollRaf = requestAnimationFrame(step);
    };
    flightScrollRaf = requestAnimationFrame(step);
}

function fitFlightsToViewport(resetLayout){
    const wrap = document.querySelector(".fids-table-wrap");
    const table = document.querySelector(".fids-table");
    if(!wrap || !table) return;

    const n = vuelosData.length;
    table.dataset.flightCount = String(n);
    table.classList.remove("fids-compact", "fids-ultra-compact");

    if(n >= 4) table.classList.add("fids-compact");
    if(n >= 5) table.classList.add("fids-ultra-compact");

    if(resetLayout){
        wrap.scrollTop = 0;
        stopFlightAutoScroll();
    }

    requestAnimationFrame(() => {
        if(wrap.scrollHeight > wrap.clientHeight + 6 && n >= 5){
            table.classList.add("fids-ultra-compact");
        }

        const overflow = wrap.scrollHeight > wrap.clientHeight + 6;
        if(overflow){
            if(resetLayout || !flightScrollRaf) startFlightAutoScroll(wrap);
        }else{
            stopFlightAutoScroll();
            wrap.scrollTop = 0;
        }
    });
}

window.addEventListener("resize", () => {
    fitFlightsToViewport(true);
});

function getBoardRoleCatalog(airlineKind){
    if(airlineKind === "westjet") return WESTJET_ROLES;
    if(airlineKind === "jetblue") return JETBLUE_ROLES;
    return [];
}

function normalizeRoleKey(rawKey, airlineKind){
    let k = String(rawKey || "").toLowerCase().trim();
    if(k.includes(FLIGHT_NS_JB)) k = k.split(FLIGHT_NS_JB)[0];
    else if(k.includes(FLIGHT_NS_WJ)) k = k.split(FLIGHT_NS_WJ)[0];
    else if(k.includes("__")) k = k.split("__")[0];
    k = k.replace(/_west$/, "").replace(/_jet$/, "").replace(/_wj$/, "");
    return k;
}

function isValidJetblueBoardKey(k){
    if(k.includes(FLIGHT_NS_JB)){
        const rolePart = k.split(FLIGHT_NS_JB)[0];
        return JETBLUE_ROLES.some((r) => r.key === normalizeRoleKey(rolePart, "jetblue"));
    }
    if(k.includes("__") || k.includes("west") || k.includes("wj")) return false;
    return JETBLUE_ROLES.some((r) => r.key === k);
}

function isValidWestjetBoardKey(k){
    if(k.includes(FLIGHT_NS_WJ)){
        const rolePart = k.split(FLIGHT_NS_WJ)[0];
        return WESTJET_ROLES.some((r) => r.key === normalizeRoleKey(rolePart, "westjet"));
    }
    if(!k.includes("west") && !k.includes("wj")) return false;
    return WESTJET_ROLES.some((r) => r.key === normalizeRoleKey(k, "westjet"));
}

function roleLabelFromKey(rawKey, airlineKind){
    const k = normalizeRoleKey(rawKey, airlineKind);
    const found = getBoardRoleCatalog(airlineKind).find((r) => r.key === k);
    if(found) return found.label;
    return k.replace(/[_-]+/g, " ").replace(/\b\w/g, (c) => c.toUpperCase()).trim() || "Posición";
}

function roleSortOrder(rawKey, airlineKind){
    const k = normalizeRoleKey(rawKey, airlineKind);
    const found = getBoardRoleCatalog(airlineKind).find((r) => r.key === k);
    return found ? found.order : 50;
}

function parsePositionName(val){
    if(val && typeof val === "object") return String(val.name || val.nombre || "").trim();
    return String(val ?? "").trim();
}

function collectAirlinePositions(filterFn, airlineKind){
    return Object.entries(positionsData)
        .filter(([k, v]) => filterFn(k) && parsePositionName(v))
        .map(([k, v]) => ({
            key: k,
            role: roleLabelFromKey(k, airlineKind),
            name: parsePositionName(v),
            order: roleSortOrder(k, airlineKind)
        }))
        .sort((a, b) => a.order - b.order || a.role.localeCompare(b.role, "es"));
}

const POS_ROWS_PER_SLIDE = 10;

function pushPositionSlideChunks(slides, base){
    const items = base.items || [];
    if(!items.length) return;
    const dur = base.duration || 12;
    const chunks = [];
    for(let i = 0; i < items.length; i += POS_ROWS_PER_SLIDE){
        chunks.push(items.slice(i, i + POS_ROWS_PER_SLIDE));
    }
    const total = chunks.length;
    chunks.forEach((chunk, idx) => {
        slides.push({
            ...base,
            id: total > 1 ? `${base.id}-p${idx + 1}` : base.id,
            title: total > 1 ? `${base.title} (${idx + 1}/${total})` : base.title,
            duration: dur,
            items: chunk
        });
    });
}

const BOARD_PROGRAM_DEFAULTS = [
    { id: "vuelos", enabled: true, seconds: 90 },
    { id: "anuncios", enabled: true, seconds: 35 },
    { id: "posiciones", enabled: true, seconds: 50 }
];

let boardProgram = { items: BOARD_PROGRAM_DEFAULTS.map((x) => ({ ...x })) };
let currentBoardSectionId = "vuelos";
let boardSectionTimer = null;
let boardAnuncioCadenceTimer = null;
let boardPositionsSlideTimer = null;
let boardPositionsActive = false;
let boardRotationRestartTimer = null;
let boardRotationPendingHard = false;

function clampBoardSectionSeconds(id, val){
    const limits = { vuelos: [15, 600], anuncios: [10, 300], posiciones: [15, 300] };
    const dflt = { vuelos: 90, anuncios: 35, posiciones: 50 };
    const lim = limits[id] || [10, 300];
    const n = parseInt(val, 10);
    if(Number.isNaN(n)) return dflt[id] || 30;
    return Math.max(lim[0], Math.min(lim[1], n));
}

function normalizeBoardProgram(raw){
    if(!raw || !Array.isArray(raw.items)){
        return { items: BOARD_PROGRAM_DEFAULTS.map((x) => ({ ...x })) };
    }
    const known = new Set(["vuelos", "anuncios", "posiciones"]);
    const items = raw.items
        .filter((i) => i && known.has(i.id))
        .map((i) => ({
            id: i.id,
            enabled: i.enabled !== false,
            seconds: clampBoardSectionSeconds(i.id, i.seconds)
        }));
    BOARD_PROGRAM_DEFAULTS.forEach((d) => {
        if(!items.some((x) => x.id === d.id)) items.push({ ...d });
    });
    return { items };
}

function boardSectionRunnable(id){
    if(id === "vuelos") return true;
    if(id === "anuncios") return anunciosActivos && anuncios.length > 0;
    if(id === "posiciones") return positionsEnabled && buildPositionsSlides().length > 0;
    return false;
}

function getActiveBoardSections(){
    const active = boardProgram.items
        .filter((i) => i.enabled && boardSectionRunnable(i.id))
        .map((i) => ({ ...i, seconds: clampBoardSectionSeconds(i.id, i.seconds) }));
    if(active.length) return active;
    return [{ id: "vuelos", enabled: true, seconds: 90 }];
}

function resolveBoardSectionId(preferredId){
    const sections = getActiveBoardSections();
    if(!sections.length) return "vuelos";
    if(preferredId && sections.some((s) => s.id === preferredId)) return preferredId;
    return sections[0].id;
}

function advanceBoardSectionId(){
    const sections = getActiveBoardSections();
    if(!sections.length) return "vuelos";
    const idx = sections.findIndex((s) => s.id === currentBoardSectionId);
    const nextIdx = idx >= 0 ? (idx + 1) % sections.length : 0;
    return sections[nextIdx].id;
}

function hideAnuncioOverlayForRotation(){
    if(anuncioLoopInterval){
        clearInterval(anuncioLoopInterval);
        anuncioLoopInterval = null;
    }
    if(anuncioHideTimeout){
        clearTimeout(anuncioHideTimeout);
        anuncioHideTimeout = null;
    }
    if(boardAnuncioCadenceTimer){
        clearInterval(boardAnuncioCadenceTimer);
        boardAnuncioCadenceTimer = null;
    }
    const contenedor = document.getElementById("anuncioFull");
    if(contenedor){
        contenedor.style.display = "none";
        contenedor.classList.remove("anuncio-full--cumple", "active", "anuncio-full--embed-fs", "anuncio-full--msg-media-full");
    }
    document.body.classList.remove("board--msg-media-full", "board--cumple-full");
}

function clearBoardRotationTimers(){
    if(boardSectionTimer){
        clearTimeout(boardSectionTimer);
        boardSectionTimer = null;
    }
    if(boardPositionsSlideTimer){
        clearTimeout(boardPositionsSlideTimer);
        boardPositionsSlideTimer = null;
    }
    boardPositionsActive = false;
    hideAnuncioOverlayForRotation();
    hidePositionsFull();
}

function runPosicionesSection(totalSec){
    if(!positionsEnabled){
        hidePositionsFull();
        return;
    }
    positionsSlides = buildPositionsSlides();
    if(!positionsSlides.length){
        hidePositionsFull();
        return;
    }
    boardPositionsActive = true;
    let idx = 0;
    const slideCount = positionsSlides.length;
    const perSlide = Math.max(3, Math.floor(totalSec / slideCount));

    function showNext(){
        if(!boardPositionsActive) return;
        showPositionSlide(positionsSlides[idx % slideCount]);
        idx++;
        boardPositionsSlideTimer = setTimeout(showNext, perSlide * 1000);
    }
    showNext();
}

function runBoardRotationStep(){
    clearBoardRotationTimers();
    const sections = getActiveBoardSections();
    if(!sections.length) return;
    currentBoardSectionId = resolveBoardSectionId(currentBoardSectionId);
    const sec = sections.find((s) => s.id === currentBoardSectionId) || sections[0];
    currentBoardSectionId = sec.id;

    if(sec.id === "vuelos"){
        /* Tablero FIDS visible por defecto; overlays ocultos */
    }else if(sec.id === "anuncios"){
        suppressAnuncioAutoLoop = true;
        mostrarAnuncios();
        const cadence = Math.max(5000, Math.floor(sec.seconds * 1000 / Math.max(1, anuncios.length)));
        boardAnuncioCadenceTimer = setInterval(() => {
            if(anuncioSlideLooper) anuncioSlideLooper();
        }, cadence);
    }else if(sec.id === "posiciones"){
        runPosicionesSection(sec.seconds);
    }

    const sectionSeconds = sec.seconds;
    boardSectionTimer = setTimeout(() => {
        currentBoardSectionId = advanceBoardSectionId();
        runBoardRotationStep();
    }, sectionSeconds * 1000);
}

function restartBoardRotation(){
    currentBoardSectionId = getActiveBoardSections()[0]?.id || "vuelos";
    runBoardRotationStep();
}

function softRefreshBoardRotation(){
    const sections = getActiveBoardSections();
    if(!sections.length){
        clearBoardRotationTimers();
        return;
    }
    currentBoardSectionId = resolveBoardSectionId(currentBoardSectionId);
    runBoardRotationStep();
}

function requestBoardRotationRestart(opts = {}){
    if(opts.hard) boardRotationPendingHard = true;
    if(boardRotationRestartTimer) clearTimeout(boardRotationRestartTimer);
    boardRotationRestartTimer = setTimeout(() => {
        boardRotationRestartTimer = null;
        const hard = boardRotationPendingHard;
        boardRotationPendingHard = false;
        if(hard) restartBoardRotation();
        else softRefreshBoardRotation();
    }, 280);
}

let positionsSlides = [];
let positionsSlideIndex = 0;
let positionsCycleTimer = null;
let positionsSlideTimer = null;
let positionsEnabled = true;
let positionsGapSeconds = 45;
let positionsDurationsData = {};

function hidePositionsFull(){
    const el = document.getElementById("positionsFull");
    if(!el) return;
    el.classList.remove("active");
    el.innerHTML = "";
    el.setAttribute("aria-hidden", "true");
    document.body.classList.remove("board--positions-full");
}

function showPositionSlide(slide){
    const el = document.getElementById("positionsFull");
    if(!el || !slide) return;
    el.innerHTML = renderPositionSlideHtml(slide);
    el.classList.add("active");
    el.setAttribute("aria-hidden", "false");
    document.body.classList.add("board--positions-full");
}

function endPositionsCycle(){
    if(positionsSlideTimer){
        clearTimeout(positionsSlideTimer);
        positionsSlideTimer = null;
    }
    hidePositionsFull();
}

function advancePositionSlide(){
    if(positionsSlideIndex >= positionsSlides.length){
        endPositionsCycle();
        return;
    }
    showPositionSlide(positionsSlides[positionsSlideIndex]);
    const dur = positionsSlides[positionsSlideIndex].duration;
    positionsSlideIndex++;
    positionsSlideTimer = setTimeout(advancePositionSlide, dur * 1000);
}

function startPositionsCycle(){
    /* Rotación unificada en restartBoardRotation */
}

function schedulePositionsCycle(){
    /* Rotación unificada en restartBoardRotation */
}

function restartPositionsRotation(){
    if(currentBoardSectionId === "posiciones") requestBoardRotationRestart();
}

onValue(ref(db,"config/boardProgram"), snap => {
    boardProgram = normalizeBoardProgram(snap.val());
    requestBoardRotationRestart({ hard: true });
});

onValue(ref(db,"config/positionsEnabled"), snap => {
    positionsEnabled = snap.val() !== false;
    if(currentBoardSectionId === "posiciones" || !positionsEnabled) requestBoardRotationRestart();
});

onValue(ref(db,"config/positionsGapSeconds"), snap => {
    const v = parseInt(snap.val());
    positionsGapSeconds = !Number.isNaN(v) && v >= 20 && v <= 300 ? v : 45;
});

onValue(ref(db,"config/positionsDuration"), snap => {
    positionsDurationsData = snap.val() || {};
    if(currentBoardSectionId === "posiciones") requestBoardRotationRestart();
});

onValue(ref(db,"positions"), snap => {
    positionsData = snap.val() || {};
    if(currentBoardSectionId === "posiciones") requestBoardRotationRestart();
});

onValue(ref(db,"titles"), snap => {
    titlesData = snap.val() || {};
    document.querySelector(".westjet .panel-title").innerText = titlesData.westjet || "ASIGNACIONES WESTJET";
    document.querySelector(".jetblue .panel-title").innerText = titlesData.jetblue || "ASIGNACIONES JETBLUE";
    if(currentBoardSectionId === "posiciones") requestBoardRotationRestart();
});

onValue(ref(db,"visibility"), snap => {
    visibilityData = snap.val() || {};
    const jetVis = visibilityData.jetblue !== false;
    const westVis = visibilityData.westjet !== false;
    const jetPanel = document.getElementById("jetbluePanel");
    const westPanel = document.getElementById("westjetPanel");
    if(jetPanel) jetPanel.style.display = jetVis ? "block" : "none";
    if(westPanel) westPanel.style.display = westVis ? "block" : "none";
    if(currentBoardSectionId === "posiciones") requestBoardRotationRestart();
});

onValue(ref(db,"airlinesExtra"), snap => {
    airlinesExtraData = snap.val() || {};
    if(currentBoardSectionId === "posiciones") requestBoardRotationRestart();
});

onValue(ref(db,"jetblueFlights"), snap => {
    jetblueFlightsData = snap.val() || {};
    if(currentBoardSectionId === "posiciones") requestBoardRotationRestart();
});

onValue(ref(db,"westjetFlights"), snap => {
    westjetFlightsData = snap.val() || {};
    if(currentBoardSectionId === "posiciones") requestBoardRotationRestart();
});

restartBoardRotation();

// 📢 TICKER
onValue(ref(db,"ticker/message"), snap => {
    document.getElementById("ticker").innerText = snap.val() || "Bienvenidos";
});

    if(!document.fullscreenElement){
        document.documentElement.requestFullscreen();

        document.exitFullscreen();
    }
};

window.addEventListener("load", () => {
    setTimeout(() => {
        document.documentElement.requestFullscreen().catch(() => {});

});

let cursorTimer;

function ocultarCursor() {
    document.body.style.cursor = "none";
}

function mostrarCursor() {
    document.body.style.cursor = "default";
}

document.addEventListener("mousemove", () => {
    mostrarCursor();

    clearTimeout(cursorTimer);
    cursorTimer = setTimeout(() => {
        ocultarCursor();
    }, 2000); // se oculta después de 2 segundos sin mover
});
