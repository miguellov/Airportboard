<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Airport Board PRO MAX</title>

<style>
body {
    margin:0;
    background:#0a0a0a;
    color:#f5f5f5;
    font-family: 'Segoe UI', monospace;
}

.header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background:#111;
    border-bottom:3px solid #00c3ff;
}

.title { font-size:35px; color:#00c3ff; }
.time { font-size:50px; font-weight:bold; }

table { width:100%; border-collapse:collapse; }

th {
    font-size:24px;
    padding:15px;
    color:#00c3ff;
    border-bottom:2px solid #00c3ff;
}

td {
    font-size:26px;
    padding:15px;
    text-align:center;
    border-bottom:1px solid #222;
}

.blink-row { animation: blink 1s infinite; }
@keyframes blink { 50% { opacity:0.3; } }

button {
    margin:5px;
    padding:10px 15px;
    font-size:16px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
    <div class="title">✈️ AIRPORT BOARD PRO</div>
    <div class="time" id="clock"></div>
</div>

<div style="padding:10px;">
    <button onclick="undo()">⏪ Undo</button>
    <button onclick="redo()">⏩ Redo</button>
</div>

<table>
<thead>
<tr>
<th>VUELO</th>
<th>DESTINO</th>
<th>LLEGADA</th>
<th>SALIDA</th>
<th>GATE</th>
<th>ESTADO</th>
</tr>
</thead>
<tbody id="board"></tbody>
</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set, push } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "airport-board-ee661.firebaseapp.com",
  databaseURL: "https://airport-board-ee661-default-rtdb.firebaseio.com",
  projectId: "airport-board-ee661"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const flightsRef = ref(db, "flights");
const historyRef = ref(db, "history");

const USER = "Miguel";

/* RELOJ */
setInterval(()=>{
    document.getElementById("clock").innerText =
    new Date().toLocaleTimeString('es-DO');
},1000);

/* VARIABLES */
let intervalo = null;
let currentData = [];

/* RENDER */
function render(data){
    const tbody = document.getElementById("board");
    tbody.innerHTML = "";

    data.forEach(row=>{
        tbody.innerHTML += `
        <tr>
            <td>${row.vuelo||""}</td>
            <td>${row.destino||""}</td>
            <td>${row.llegada||""}</td>
            <td>${row.salida||""}</td>
            <td>${row.gate||""}</td>
            <td>${row.estado||""}</td>
        </tr>`;
    });

    startCountdown(data);
}

/* COUNTDOWN */
function startCountdown(data){
    if(intervalo) clearInterval(intervalo);

    intervalo = setInterval(()=>{
        const rows = document.querySelectorAll("#board tr");

        rows.forEach((rowEl,i)=>{
            const d = data[i];
            if(!d) return;

            let diff = getDiff(d.llegada);
            let txt;

            if(diff<=0){
                txt="ATERRIZADO";
            }else{
                let m=Math.floor(diff/60000);
                let h=Math.floor(m/60);
                m=m%60;
                txt=`${h}h ${m}m`;

                if(diff<=1800000){
                    rowEl.classList.add("blink-row");
                }
            }

            rowEl.children[2].innerHTML =
            `${d.llegada} (${txt})`;
        });
    },1000);
}

function getDiff(time){
    const now=new Date();
    const [h,m]=time.split(":").map(Number);

    const target=new Date(
        now.getFullYear(),
        now.getMonth(),
        now.getDate(),
        h,m,0
    );

    return target-now;
}

/* HISTORIAL EN FIREBASE */
async function saveHistory(data){
    await push(historyRef,{
        data,
        user:USER,
        time:new Date().toISOString()
    });
}

/* UNDO */
async function undo(){
    onValue(historyRef,(snap)=>{
        const hist=Object.values(snap.val()||{});
        if(hist.length<2) return;

        const prev=hist[hist.length-2].data;
        set(flightsRef, convertArrayToObj(prev));
    },{onlyOnce:true});
}

/* REDO */
async function redo(){
    onValue(historyRef,(snap)=>{
        const hist=Object.values(snap.val()||{});
        const last=hist[hist.length-1];
        if(!last) return;

        set(flightsRef, convertArrayToObj(last.data));
    },{onlyOnce:true});
}

/* CONVERTIR */
function convertArrayToObj(arr){
    let obj={};
    arr.forEach((v,i)=> obj[i]=v);
    return obj;
}

/* ESCUCHAR FIREBASE */
onValue(flightsRef,(snap)=>{
    const data=snap.val();
    if(!data) return;

    const arr=Object.values(data);
    currentData=arr;

    render(arr);
    saveHistory(arr); // 🔥 GUARDA CAMBIO GLOBAL
});

/* ATAJOS */
document.addEventListener("keydown",(e)=>{
    if(e.ctrlKey && e.key==="z"){ e.preventDefault(); undo(); }
    if(e.ctrlKey && e.key==="y"){ e.preventDefault(); redo(); }
});

</script>

</body>
</html>
