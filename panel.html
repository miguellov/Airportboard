<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Control Vuelos PRO</title>

<style>

    .ticker-box {
    background: #0a0f1c;
    border: 1px solid #00e0ff;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 15px;
}

    .asignaciones-container {
    width: 100%;
    overflow-x: auto;
}

.tabla-asignaciones {
    display: grid;
    grid-auto-rows: 40px;
    gap: 5px;
    align-items: center;
    text-align: center;
}

.tabla-header {
    font-weight: bold;
    color: #00e0ff;
}

.tabla-posicion {
    text-align: left;
    font-weight: bold;
    padding-left: 10px;
}

.celda {
    color: #ccc;
}

.tabs {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin: 20px 0;
    flex-wrap: wrap;
}

.tabs button {
    background: #1e3a5f;
    border: none;
    padding: 10px 20px;
    color: white;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.tabs button:hover {
    background: #00eaff;
    color: black;
}

.card-anuncio{
    background:#020617;
    border:1px solid #0ea5e9;
    border-radius:10px;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
    max-width:600px;
    margin:auto;
}

.card-anuncio input,
.card-anuncio select{
    padding:10px;
    background:#020617;
    border:1px solid #334155;
    color:#7dd3fc;
    border-radius:6px;
}

.search-box{
    position: relative;
    z-index: 10;
}

.search-box input{
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    border: none;
    background: #0f172a;
    color: white;
}

.results{
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    background: #0f172a;
    border: 1px solid #1e293b;
    border-radius: 6px;
    z-index: 99999;
    max-height: 150px;
    overflow-y: auto;
}

.results div{
    padding: 8px;
    cursor: pointer;
    border-bottom: 1px solid #1e293b;
}

.results div:hover{
    background: #1e293b;
}

:root{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#e5e7eb;
    --input:#0f172a;
}

.light{
    --bg:#f8fafc;
    --card:#ffffff;
    --text:#0f172a;
    --input:#e2e8f0;
}

.airport{
    --bg:#000;
    --card:#0a0a0a;
    --text:#00ff9c;
    --input:#000;
    font-family:monospace;
}

body{
    margin:0;
    padding:10px;
    background:var(--bg);
    color:var(--text);
    font-family:Arial;
}

h2{ text-align:center; }

.top-buttons{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
}

button{
    padding:8px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#334155;
    color:white;
}

.add{ background:#3b82f6; }
.toggle-btn { background: #7c3aed; }
.toggle-btn.visible { background: #10b981; }

#panel{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:10px;
}

.card{
    background:var(--card);
    padding:10px;
    border-radius:10px;
    display:flex;
    flex-direction:column;
    gap:5px;
}

input, select{
    background:var(--input);
    color:var(--text);
    border:none;
    padding:8px;
    border-radius:6px;
}

.btn-row{
    display:flex;
    gap:5px;
    flex-wrap: wrap;
}

.btn-row button{ flex:1; min-width: 40px; }

.boarding{background:#2563eb;}
.delayed{background:#dc2626;}
.ontime{background:#16a34a;}
.departed{background:#f59e0b;}
.cancelled{background:#475569;}
.diverted{background:#7c3aed;}

.ticker-box{
    background:#000;
    padding:10px;
    border-radius:10px;
    margin-bottom:15px;
}

.ticker-box input{
    width:100%;
    margin-bottom:5px;
    box-sizing: border-box;
}

#positionsList,
#positionsJet,
#positionsWest{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:10px;
}

.pos-item{
    background:#111;
    padding:10px;
    border-radius:8px;
    display:flex;
    flex-direction:column;
    gap:5px;
}

.pos-actions{
    display:flex;
    gap:5px;
    flex-wrap: wrap;
}

.pos-actions button{
    flex:1;
    min-width: 50px;
}

.cumple-list {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 10px;
    margin-top: 15px;
}

.cumple-card {
    background: #1e293b;
    padding: 15px;
    border-radius: 8px;
    border: 2px solid #7c3aed;
}

.cumple-foto {
    width: 100%;
    height: 150px;
    border-radius: 6px;
    object-fit: cover;
    margin-bottom: 10px;
}

.cumple-info {
    color: #e5e7eb;
    font-size: 14px;
}

@media (max-width: 768px) {
    .tabs {
        flex-direction: column;
        gap: 10px;
    }
    
    .tabs button {
        width: 100%;
    }
    
    .top-buttons button {
        font-size: 12px;
        padding: 6px;
    }
}
</style>
</head>

<body>

<h2>✈️ Panel de Control</h2>

<div class="tabs">
    <button onclick="showTab('flightsTab')">🛫 Vuelos</button>
    <button onclick="showTab('positionsTab')">👨‍✈️ Posiciones</button>
    <button onclick="showTab('anunciosTab')">📢 Anuncios</button>
    <button onclick="showTab('configTab')">⚙️ Config</button>
</div>

<!-- ========================= -->
<!-- ✈️ TAB VUELOS -->
<!-- ========================= -->
<div id="flightsTab">

    <!-- MENSAJE -->
    <div class="ticker-box">
        <label>📢 Mensaje del Aeropuerto:</label>
        <input id="tickerInput" placeholder="Escribe mensaje...">
        <label>Duración (segundos):</label>
        <input id="tickerDuration" type="number" value="25" min="1" max="120">
        <button onclick="saveTicker()">💾 Guardar Mensaje</button>
    </div>

    <div class="top-buttons">
        <button class="add" onclick="addFlight()">➕ Agregar</button>
        <button onclick="undo()">⏪ Undo</button>
        <button onclick="redo()">⏩ Redo</button>
        <button onclick="changeDateFlights()">📅 Cambiar Fecha</button>
        <button onclick="setTheme('dark')">🌙</button>
        <button onclick="setTheme('light')">🌞</button>
        <button onclick="setTheme('airport')">✈️</button>
    </div>

    <br>

    <div id="panel"></div>

</div>

<!-- ========================= -->
<!-- 👨‍✈️ TAB POSICIONES -->
<!-- ========================= -->
<div id="positionsTab" style="display:none;">

    <h2>👨‍✈️ Asignación de Posiciones</h2>

    <!-- TABLA AUTOMÁTICA -->
    <div class="asignaciones-container">
        <div id="tablaPanel"></div>
    </div>

    <!-- POSICIONES MANUALES -->
    <div class="ticker-box">

        <h3>👨‍✈️ POSICIONES</h3>

        <!-- 🔵 JETBLUE -->
        <h4 style="color:#3b82f6;">🔵 JETBLUE
            <button class="toggle-btn visible" id="toggleJet" onclick="toggleVisibility('jetblue')" style="float: right; font-size: 11px; padding: 4px 8px;">👁️</button>
        </h4>

        <input id="jetblueTitle" placeholder="Ej: Asignaciones JetBlue B6 627">
        <button onclick="saveJetblueTitle()">💾 Guardar Título</button>
        <label>Duración (segundos):</label>
        <input id="jetblueDuration" type="number" value="10" min="1" max="60">

        <input id="posRoleJet" placeholder="Posición JetBlue">
        <input id="posNameJet" placeholder="Nombre empleado">
        <button onclick="savePositionJet()">➕ Agregar JetBlue</button>

        <div id="positionsJet"></div>

        <hr style="margin:15px 0; border:1px solid #333;">

        <!-- 🟢 WESTJET -->
        <h4 style="color:#22c55e;">🟢 WESTJET
            <button class="toggle-btn visible" id="toggleWest" onclick="toggleVisibility('westjet')" style="float: right; font-size: 11px; padding: 4px 8px;">👁️</button>
        </h4>

        <input id="westjetTitle" placeholder="Ej: Asignaciones WestJet WS2507">
        <button onclick="saveWestjetTitle()">💾 Guardar Título</button>
        <label>Duración (segundos):</label>
        <input id="westjetDuration" type="number" value="10" min="1" max="60">

        <input id="posRoleWest" placeholder="Posición WestJet">
        <input id="posNameWest" placeholder="Nombre empleado">
        <button onclick="savePositionWest()">➕ Agregar WestJet</button>

        <div id="positionsWest"></div>

    </div>

</div>

<!-- ========================= -->
<!-- 📢 TAB ANUNCIOS -->
<!-- ========================= -->
<div id="anunciosTab" style="display:none;">

    <h2>📢 Gestión de Anuncios</h2>

    <div class="card-anuncio">

        <label>Tipo</label>
        <select id="tipoAnuncio" onchange="cambiarTipoAnuncio()">
            <option value="mensaje">Mensaje</option>
            <option value="cumple">Cumpleaños</option>
            <option value="asignacion">Asignación</option>
        </select>

        <!-- Mensaje -->
        <div id="msgFields">
            <input id="textoAnuncio" placeholder="Texto">
            <input type="file" id="fileAnuncio" accept="image/*,video/*">
            <label>Vista Previa:</label>
            <div id="previewMsg" style="min-height: 100px; border: 1px solid #334155; border-radius: 6px; padding: 10px; color: #7dd3fc;">Aquí aparecerá la vista previa</div>
        </div>

        <!-- Cumpleaños -->
        <div id="cumpleFields" style="display: none;">
            <h4>Agregar Cumpleañero:</h4>
            <input id="cumpleNombre" placeholder="Nombre de la persona" maxlength="50">
            <input id="cumpleFecha" type="date">
            <input type="file" id="cumpleFoto" accept="image/*">
            <label>Foto Vista Previa:</label>
            <img id="previewFoto" src="" style="max-width: 150px; border-radius: 6px; display: none;">
            <button onclick="agregarCumpleañero()">➕ Agregar a Cumpleañeros</button>
            <div id="cumpleLista" class="cumple-list"></div>
        </div>

        <!-- Duración general -->
        <label>Duración (segundos):</label>
        <input id="duracionAnuncio" type="number" placeholder="Duración (segundos)" value="10" min="1" max="120">

        <button onclick="guardarAnuncio()">💾 Guardar</button>
        <button onclick="toggleAnuncios()">🛑 Encender / Apagar</button>

    </div>

</div>

<!-- ========================= -->
<!-- ⚙️ TAB CONFIGURACIÓN -->
<!-- ========================= -->
<div id="configTab" style="display:none;">

    <h2>⚙️ Configuración</h2>

    <div class="card-anuncio">

        <h3>Configuración General</h3>

        <label>Duración por defecto (segundos):</label>
        <input id="defaultDuration" type="number" value="10" min="1" max="120">
        <button onclick="saveConfig()">💾 Guardar</button>

        <hr style="margin: 15px 0; border: 1px solid #334155;">

        <h3>Auto-cambio de Vuelos</h3>
        <label>
            <input type="checkbox" id="autoChangeFlights">
            Auto-cambiar vuelos a las 12:00 AM
        </label>
        <button onclick="saveConfig()">💾 Guardar</button>

    </div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "933c97406ad862095eade39aef8a1f5d",
  authDomain: "airport-board-ee661.firebaseapp.com",
  databaseURL: "https://airport-board-ee661-default-rtdb.firebaseio.com",
  projectId: "airport-board-ee661"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const flightsRef = ref(db,"flights");
const tickerRef = ref(db,"ticker/message");
const positionsRef = ref(db,"positions");
const configRef = ref(db,"config");
const cumpleanosRef = ref(db,"cumpleanos");
const visibilityRef = ref(db,"visibility");

/* 🔥 TABS */
window.showTab = (tab)=>{
    document.getElementById("flightsTab").style.display = "none";
    document.getElementById("positionsTab").style.display = "none";
    document.getElementById("anunciosTab").style.display = "none";
    document.getElementById("configTab").style.display = "none";
    document.getElementById(tab).style.display = "block";
};

/* CAMBIAR TIPO DE ANUNCIO */
window.cambiarTipoAnuncio = () => {
    const tipo = document.getElementById("tipoAnuncio").value;
    document.getElementById("msgFields").style.display = tipo === "mensaje" ? "block" : "none";
    document.getElementById("cumpleFields").style.display = tipo === "cumple" ? "block" : "none";
};

/* VISTA PREVIA FOTO CUMPLE */
document.getElementById("cumpleFoto")?.addEventListener("change", (e) => {
    const file = e.target.files[0];
    if(file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
            document.getElementById("previewFoto").src = ev.target.result;
            document.getElementById("previewFoto").style.display = "block";
        };
        reader.readAsDataURL(file);
    }
});

/* AGREGAR CUMPLEAÑERO */
window.agregarCumpleañero = async () => {
    const nombre = document.getElementById("cumpleNombre").value;
    const fecha = document.getElementById("cumpleFecha").value;
    const fotoFile = document.getElementById("cumpleFoto").files[0];

    if(!nombre || !fecha || !fotoFile) {
        alert("Completa todos los campos");
        return;
    }

    // Convertir foto a Base64
    const reader = new FileReader();
    reader.onload = async (e) => {
        const cumpleano = {
            id: Date.now(),
            nombre,
            fecha,
            foto: e.target.result
        };

        set(ref(db, "cumpleanos/" + cumpleano.id), cumpleano);

        document.getElementById("cumpleNombre").value = "";
        document.getElementById("cumpleFecha").value = "";
        document.getElementById("cumpleFoto").value = "";
        document.getElementById("previewFoto").style.display = "none";

        alert("✅ Cumpleañero agregado");
        cargarCumpleañeros();
    };
    reader.readAsDataURL(fotoFile);
};

/* CARGAR CUMPLEAÑEROS */
function cargarCumpleañeros() {
    onValue(cumpleanosRef, (snap) => {
        const data = snap.val() || {};
        let html = "";

        Object.entries(data).forEach(([id, cumple]) => {
            html += `
            <div class="cumple-card">
                <img src="${cumple.foto}" class="cumple-foto">
                <div class="cumple-info">
                    <strong>${cumple.nombre}</strong><br>
                    📅 ${new Date(cumple.fecha).toLocaleDateString('es-DO')}
                </div>
                <button onclick="eliminarCumple('${id}')" style="width: 100%; margin-top: 10px; background: #dc2626;">🗑 Eliminar</button>
            </div>
            `;
        });

        document.getElementById("cumpleLista").innerHTML = html;
    });
}

window.eliminarCumple = (id) => {
    if(confirm("¿Eliminar cumpleañero?")) {
        set(ref(db, "cumpleanos/" + id), null);
    }
};

/* GUARDAR ANUNCIO */
window.guardarAnuncio = async () => {
    const tipo = document.getElementById("tipoAnuncio").value;
    const duracion = parseInt(document.getElementById("duracionAnuncio").value) || 10;

    if(tipo === "mensaje") {
        const texto = document.getElementById("textoAnuncio").value;
        const fileAnuncio = document.getElementById("fileAnuncio").files[0];

        let media = "";
        if(fileAnuncio) {
            const reader = new FileReader();
            reader.onload = async (e) => {
                media = e.target.result;
                const anuncio = { id: Date.now(), tipo, texto, media, duracion };
                set(ref(db,"anuncios/" + anuncio.id), anuncio);
                alert("✅ Anuncio guardado");
            };
            reader.readAsDataURL(fileAnuncio);
        } else {
            const anuncio = { id: Date.now(), tipo, texto, media: "", duracion };
            set(ref(db,"anuncios/" + anuncio.id), anuncio);
            alert("✅ Anuncio guardado");
        }
    } else if(tipo === "cumple") {
        alert("✅ Cumpleañeros guardados");
    }
};

/* MENSAJE */
window.saveTicker = () => {
    const msg = document.getElementById("tickerInput").value;
    const duration = document.getElementById("tickerDuration").value;
    set(tickerRef, msg);
    set(ref(db, "ticker/duration"), parseInt(duration));
    alert("✅ Mensaje guardado");
};

onValue(tickerRef, (snap) => {
    document.getElementById("tickerInput").value = snap.val() || "";
});

/* CAMBIAR VISIBILIDAD */
window.toggleVisibility = (airline) => {
    const btn = document.getElementById("toggle" + (airline === "jetblue" ? "Jet" : "West"));
    const isVisible = btn.classList.contains("visible");
    
    btn.classList.toggle("visible");
    set(ref(db, "visibility/" + airline), !isVisible);
};

/* 🔵 JETBLUE */
window.savePositionJet = () => {
    const role = document.getElementById("posRoleJet").value.toLowerCase();
    const name = document.getElementById("posNameJet").value;
    if(!role) return;
    set(ref(db,"positions/"+role), name);
    document.getElementById("posRoleJet").value="";
    document.getElementById("posNameJet").value="";
};

/* 🟢 WESTJET */
window.savePositionWest = () => { 
    const role = document.getElementById("posRoleWest").value.toLowerCase()+"_west";
    const name = document.getElementById("posNameWest").value;
    if(!role) return;
    set(ref(db,"positions/"+role), name);
    document.getElementById("posRoleWest").value="";
    document.getElementById("posNameWest").value="";
};

/* MOSTRAR POSICIONES */
onValue(positionsRef, (snap) => {
    const data = snap.val() || {};

    document.getElementById("positionsJet").innerHTML="";
    document.getElementById("positionsWest").innerHTML="";

    Object.entries(data).forEach(([role,name]) => {
        const card=`
<div class="pos-item">
    <input value="${role}" onchange="updatePosition('${role}','role',this.value)">
    <input value="${name}" onchange="updatePosition('${role}','name',this.value)">
    <div class="pos-actions">
        <button onclick="deletePosition('${role}')">🗑</button>
    </div>
</div>`;

        if(role.includes("west")){
            document.getElementById("positionsWest").innerHTML += card;
        } else {
            document.getElementById("positionsJet").innerHTML += card;
        }
    });
});

window.deletePosition = (role) => {
    if(confirm("Eliminar esta posición?")){
        set(ref(db,"positions/"+role), null);
    }
};

window.updatePosition = (oldRole, field, value) => {
    const currentRef = ref(db, "positions/" + oldRole);

    if(field === "name"){
        set(currentRef, value);
    }

    if(field === "role"){
        const newRole = value.toLowerCase().trim();
        if(!newRole) return;

        onValue(currentRef, (snap) => {
            const currentName = snap.val();
            set(currentRef, null);
            set(ref(db,"positions/"+newRole), currentName);
        }, {onlyOnce:true});
    }
};

window.saveJetblueTitle = () => {
    const value = document.getElementById("jetblueTitle").value;
    set(ref(db,"titles/jetblue"), value);
};

window.saveWestjetTitle = () => {
    const value = document.getElementById("westjetTitle").value;
    set(ref(db,"titles/westjet"), value);
};

/* VUELOS */
let history=[], redoStack=[], currentData={};

function saveState(d){
    history.push(JSON.stringify(d));
    if(history.length>50)history.shift();
    redoStack=[];
}

function getArray(d){ return Object.values(d||{}); }

function toObj(arr){
    let o={};
    arr.forEach((v,i)=>o["flight"+i]=v);
    return o;
}

onValue(flightsRef, snap => {
    const data=snap.val()||{};
    const panel=document.getElementById("panel");
    panel.innerHTML="";

    currentData=data;
    saveState(data);

    getArray(data).forEach((r,i) => {
        let div=document.createElement("div");
        div.className="card";

        div.innerHTML=`
<div class="search-box">
    <input placeholder="🔍 Buscar vuelo..." oninput="buscarVuelo(this, ${i})">
    <div id="results${i}" class="results"></div>
</div>

<input value="${r.vuelo}" onchange="updateField(${i},'vuelo',this.value)">
<input value="${r.destino}" onchange="updateField(${i},'destino',this.value)">
<select onchange="updateField(${i},'gate',this.value)">
    <option value="">GATE</option>
    <option value="A2" ${r.gate==="A2"?"selected":""}>A2</option>
    <option value="A3" ${r.gate==="A3"?"selected":""}>A3</option>
    <option value="A4" ${r.gate==="A4"?"selected":""}>A4</option>
    <option value="A5" ${r.gate==="A5"?"selected":""}>A5</option>
    <option value="A6" ${r.gate==="A6"?"selected":""}>A6</option>
    <option value="A7" ${r.gate==="A7"?"selected":""}>A7</option>
    <option value="A8" ${r.gate==="A8"?"selected":""}>A8</option>
    <option value="A9" ${r.gate==="A9"?"selected":""}>A9</option>
</select>

<input type="time" value="${r.llegada}" onchange="updateField(${i},'llegada',this.value)">
<input type="time" value="${r.salida}" onchange="updateField(${i},'salida',this.value)">

<label>Duración (seg):</label>
<input type="number" value="${r.duracion || 10}" min="1" max="60" onchange="updateField(${i},'duracion',this.value)">

<div class="btn-row">
    <button class="boarding" onclick="setStatus(${i},'BOARDING')">B</button>
    <button class="delayed" onclick="setStatus(${i},'DELAYED')">D</button>
    <button class="ontime" onclick="setStatus(${i},'ON-TIME')">ON</button>
</div>

<div class="btn-row">
    <button class="departed" onclick="setStatus(${i},'DEPARTED')">DEP</button>
    <button class="cancelled" onclick="setStatus(${i},'CANCELLED')">C</button>
    <button class="diverted" onclick="setStatus(${i},'DIVERTED')">DIV</button>
</div>

<button onclick="deleteFlight(${i})">🗑</button>
`;

        panel.appendChild(div);
    });
});

window.updateField = (i,f,v) => {
    saveState(currentData);
    let a = getArray(currentData);
    a[i][f] = v;
    set(flightsRef, toObj(a));
};

window.setStatus = (i,s) => {
    saveState(currentData);
    let a = getArray(currentData);
    if(!a[i]) return;
    a[i].estado = s;
    set(flightsRef, toObj(a));
    currentData = toObj(a);
};

window.addFlight = (i=null) => {
    saveState(currentData);
    let a = getArray(currentData);
    let n = {vuelo:"",destino:"",llegada:"10:00",salida:"10:30",gate:"",estado:"ON-TIME",duracion:10};
    i==null ? a.push(n) : a.splice(i+1,0,n);
    set(flightsRef, toObj(a));
};

window.deleteFlight = i => {
    saveState(currentData);
    let a = getArray(currentData);
    a.splice(i,1);
    set(flightsRef, toObj(a));
};

window.undo = () => {
    if(history.length < 2) return;
    redoStack.push(history.pop());
    set(flightsRef, JSON.parse(history[history.length-1]));
};

window.redo = () => {
    if(!redoStack.length) return;
    let n = JSON.parse(redoStack.pop());
    history.push(JSON.stringify(n));
    set(flightsRef, n);
};

window.changeDateFlights = () => {
    const dateStr = prompt("Ingresa la fecha (YYYY-MM-DD):");
    if(!dateStr) return;
    set(ref(db, "config/selectedDate"), dateStr);
    alert("📅 Fecha cambiada a: " + dateStr);
};

/* TEMA */
window.setTheme = (m) => {
    document.body.classList.remove("light","airport");
    if(m==="light")document.body.classList.add("light");
    if(m==="airport")document.body.classList.add("airport");
    localStorage.setItem("theme",m);
};

let saved=localStorage.getItem("theme");
if(saved) setTheme(saved);

window.buscarVuelo = async (input, index) => {
    const query = input.value.toLowerCase();
    const resultsDiv = document.getElementById("results"+index);

    if(!resultsDiv) return;

    if(query.length < 1){
        resultsDiv.innerHTML = "";
        return;
    }

    try{
        const res = await fetch("https://airportboard.onrender.com/flights");
        const { salidas, llegadas } = await res.json();

        const data = [...salidas, ...llegadas];

        const filtrados = data.filter(f =>
            (f.vuelo || "").toLowerCase().includes(query)
        );

        let html = "";

        filtrados.forEach((f, i) => {
            html += `
                <div onclick="seleccionarVuelo(${index}, ${i}, '${f.vuelo}', '${f.destino || f.origen}', '${f.llegada}', '${f.salida}')">
                    ${f.vuelo} - ${f.destino || f.origen} | ${f.llegada || ''}
                </div>
            `;
        });

        resultsDiv.innerHTML = html;

    }catch(e){
        console.error("ERROR BUSCANDO:", e);
    }
};

window.seleccionarVuelo = (index, i, vuelo, destino, llegada, salida) => {
    let arr = Object.values(currentData);
    if(!arr[index]) return;

    arr[index].vuelo = vuelo;
    arr[index].destino = destino;
    arr[index].llegada = llegada || "";
    arr[index].salida = salida || "";
    arr[index].manual = true;

    set(ref(db,"flights"), toObj(arr));
    document.getElementById("results"+index).innerHTML = "";
};

window.saveConfig = () => {
    const defaultDuration = parseInt(document.getElementById("defaultDuration").value) || 10;
    const autoChange = document.getElementById("autoChangeFlights").checked;
    
    set(configRef, {
        defaultDuration,
        autoChangeFlights: autoChange
    });
    
    alert("✅ Configuración guardada");
};

cargarCumpleañeros();

window.onload = () => {
    showTab("flightsTab");
};

</script>
