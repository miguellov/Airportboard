<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Control Vuelos PRO</title>

<style>
  .card-anuncio{
    background:#020617;
    border:1px solid #0ea5e9;
    border-radius:10px;
    padding:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
    max-width:600px;
    margin:auto;
}

.card-anuncio input,
.card-anuncio select{
    padding:10px;
    background:#020617;
    border:1px solid #334155;
    color:#7dd3fc;
    border-radius:6px;
}

.search-box{
    position: relative;
    z-index: 10;
}

.search-box input{
    width: 100%;
    padding: 8px;
    border-radius: 6px;
    border: none;
    background: #0f172a;
    color: white;
}

/* 🔥 DROPDOWN DE RESULTADOS */
.results{
    position: absolute;
    top: 100%;
    left: 0;
    width: 100%;
    background: #0f172a;
    border: 1px solid #1e293b;
    border-radius: 6px;
    z-index: 99999; /* 🔥 MUY IMPORTANTE */
    max-height: 150px;
    overflow-y: auto;
}

/* ITEMS */
.results div{
    padding: 8px;
    cursor: pointer;
    border-bottom: 1px solid #1e293b;
}

/* HOVER */
.results div:hover{
    background: #1e293b;

}
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --text:#e5e7eb;
    --input:#0f172a;
}

.light{
    --bg:#f8fafc;
    --card:#ffffff;
    --text:#0f172a;
    --input:#e2e8f0;
}

.airport{
    --bg:#000;
    --card:#0a0a0a;
    --text:#00ff9c;
    --input:#000;
    font-family:monospace;
}

body{
    margin:0;
    padding:10px;
    background:var(--bg);
    color:var(--text);
    font-family:Arial;
}

h2{ text-align:center; }

.top-buttons{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    justify-content:center;
}

button{
    padding:8px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#334155;
    color:white;
}

.add{ background:#3b82f6; }

#panel{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:10px;
}

.card{
    background:var(--card);
    padding:10px;
    border-radius:10px;
    display:flex;
    flex-direction:column;
    gap:5px;
}

input, select{
    background:var(--input);
    color:var(--text);
    border:none;
    padding:8px;
    border-radius:6px;
}

.btn-row{
    display:flex;
    gap:5px;
}

.btn-row button{ flex:1; }

.boarding{background:#2563eb;}
.delayed{background:#dc2626;}
.ontime{background:#16a34a;}
.departed{background:#f59e0b;}
.cancelled{background:#475569;}
.diverted{background:#7c3aed;}

/* TICKER */
.ticker-box{
    background:#000;
    padding:10px;
    border-radius:10px;
    margin-bottom:15px;
}

.ticker-box input{
    width:100%;
    margin-bottom:5px;
}

/* POSICIONES */
#positionsContainer{
    margin-top:10px;
}

#positionsList,
#positionsJet,
#positionsWest{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:10px;
}

.pos-item{
    background:#111;
    padding:10px;
    border-radius:8px;
    display:flex;
    flex-direction:column;
    gap:5px;
}

.pos-actions{
    display:flex;
    gap:5px;
}

.pos-actions button{
    flex:1;
}

</style>

</head>

<body>

<h2>✈️ Panel de Control</h2>

<!-- 🔥 TABS -->
<div style="display:flex; gap:10px; justify-content:center; margin-bottom:15px;">
    <button onclick="showTab('flightsTab')">🛫 Vuelos</button>
<button onclick="showTab('positionsTab')">👨‍✈️ Posiciones</button>
<button onclick="showTab('anunciosTab')">📢 Anuncios</button>
</div>

<!-- 🔹 POSICIONES TAB -->
<div id="positionsTab">

    <!-- MENSAJE -->
    <div class="ticker-box">
        <input id="tickerInput" placeholder="Escribe mensaje del aeropuerto...">
        <button onclick="saveTicker()">💾 Guardar Mensaje</button>
    </div>

    <!-- POSICIONES -->
    <div class="ticker-box">
        <h3 style="margin-top:0;">👨‍✈️ POSICIONES</h3>

       <!-- 🔵 JETBLUE -->
<h4 style="color:#3b82f6;">🔵 JETBLUE</h4>

<input id="jetblueTitle" placeholder="Ej: Asignaciones JetBlue B6 627">
<button onclick="saveJetblueTitle()">💾 Guardar Título</button>

<input id="posRoleJet" placeholder="Posición JetBlue">
<input id="posNameJet" placeholder="Nombre empleado">
<button onclick="savePositionJet()">➕ Agregar JetBlue</button>

<div id="positionsJet"></div>

<hr style="margin:15px 0; border:1px solid #333;">

<!-- 🟢 WESTJET -->
<h4 style="color:#22c55e;">🟢 WESTJET</h4>

<input id="westjetTitle" placeholder="Ej: Asignaciones WestJet WS2507">
<button onclick="saveWestjetTitle()">💾 Guardar Título</button>

<input id="posRoleWest" placeholder="Posición WestJet">
<input id="posNameWest" placeholder="Nombre empleado">
<button onclick="savePositionWest()">➕ Agregar WestJet</button>

<div id="positionsWest"></div>
    </div>

</div>
<!-- ========================= -->
<!-- 📢 TAB ANUNCIOS -->
<!-- ========================= -->
<div id="anunciosTab" style="display:none;">

    <h2>📢 Gestión de Anuncios</h2>

    <div class="card-anuncio">

        <label>Tipo</label>
        <select id="tipoAnuncio">
            <option value="mensaje">Mensaje</option>
            <option value="cumple">Cumpleaños</option>
            <option value="asignacion">Asignación</option>
        </select>

        <label>Texto</label>
        <input id="textoAnuncio" placeholder="Escribe aquí...">

        <label>Archivo</label>
        <input type="file" id="fileAnuncio">

        <label>Duración</label>
        <input type="number" id="duracionAnuncio" value="8">

        <button onclick="guardarAnuncio()">💾 Guardar</button>

    </div>

</div>


<!-- 🔹 VUELOS TAB -->
<div id="flightsTab" style="display:none;">

    <div class="top-buttons">
        <button class="add" onclick="addFlight()">➕ Agregar</button>
        <button onclick="undo()">⏪ Undo</button>
        <button onclick="redo()">⏩ Redo</button>
        <button onclick="setTheme('dark')">🌙</button>
        <button onclick="setTheme('light')">🌞</button>
        <button onclick="setTheme('airport')">✈️</button>
    </div>

    <br>

    <div id="panel"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "933c97406ad862095eade39aef8a1f5d",
  authDomain: "airport-board-ee661.firebaseapp.com",
  databaseURL: "https://airport-board-ee661-default-rtdb.firebaseio.com",
  projectId: "airport-board-ee661"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const flightsRef = ref(db,"flights");
const tickerRef = ref(db,"ticker/message");
const positionsRef = ref(db,"positions");

/* 🔥 TABS */
window.showTab = (tab)=>{
    document.getElementById("flightsTab").style.display = "none";
    document.getElementById("positionsTab").style.display = "none";
    document.getElementById(tab).style.display = "block";
};

window.guardarAnuncio = async ()=>{

    const tipo = document.getElementById("tipoAnuncio").value;
    const texto = document.getElementById("textoAnuncio").value;
    const duracion = document.getElementById("duracionAnuncio").value;
    const modo = document.getElementById("modoAnuncio").value;
    const file = document.getElementById("fileAnuncio").files[0];

    let media = "";

    if(file){
        media = URL.createObjectURL(file);
    }

    const anuncio = {
        tipo,
        texto,
        media,
        duracion: Number(duracion),
        modo
    };

    const id = Date.now();

    set(ref(db,"anuncios/"+id), anuncio);

    alert("✅ Anuncio guardado");
};

/* MENSAJE */
window.saveTicker = ()=>{
    set(tickerRef, document.getElementById("tickerInput").value);
};

onValue(tickerRef,(snap)=>{
    document.getElementById("tickerInput").value = snap.val() || "";
});

/* 🔵 JETBLUE */
window.savePositionJet = ()=>{
    const role = document.getElementById("posRoleJet").value.toLowerCase();
    const name = document.getElementById("posNameJet").value;
    if(!role) return;
    set(ref(db,"positions/"+role), name);
    posRoleJet.value="";
    posNameJet.value="";
};

window.previewAnuncio = ()=>{

    const texto = document.getElementById("textoAnuncio").value;
    const file = document.getElementById("fileAnuncio").files[0];

    const full = document.getElementById("anuncioFull");

    full.style.display = "flex";

    if(file){
        const url = URL.createObjectURL(file);

        if(file.type.includes("video")){
            full.innerHTML = `<video src="${url}" autoplay muted style="width:100%;height:100%">`;
        }else{
            full.innerHTML = `<img src="${url}" style="width:100%;height:100%">`;
        }
    }else{
        full.innerHTML = `<h1 style="color:white">${texto}</h1>`;
    }
};


/* 🟢 WESTJET */

window.savePositionWest = ()=>{ 
    const role = document.getElementById("posRoleWest").value.toLowerCase()+"_west";
    const name = document.getElementById("posNameWest").value;
    if(!role) return;
    set(ref(db,"positions/"+role), name);
    posRoleWest.value="";
    posNameWest.value="";
    const westjetTitleRef = ref(db,"titles/westjet");
    

window.saveWestjetTitle = ()=>{
    const value = document.getElementById("westjetTitle").value;
    set(westjetTitleRef, value);
};
};

/* MOSTRAR POSICIONES */
onValue(positionsRef,(snap)=>{
    const data = snap.val() || {};

    positionsJet.innerHTML="";
    positionsWest.innerHTML="";

    Object.entries(data).forEach(([role,name])=>{

        const card=`
<div class="pos-item">
    <input value="${role}" 
        onchange="updatePosition('${role}','role',this.value)">

    <input value="${name}" 
        onchange="updatePosition('${role}','name',this.value)">
    
    <div class="pos-actions">
        <button onclick="deletePosition('${role}')">🗑</button>
    </div>
</div>`;

        if(role.includes("west")){
            positionsWest.innerHTML += card;
        }else{
            positionsJet.innerHTML += card;
        }
    });
});

/* VUELOS (igual que antes) */
let history=[], redoStack=[], currentData={};

function saveState(d){
    history.push(JSON.stringify(d));
    if(history.length>50)history.shift();
    redoStack=[];
}

function getArray(d){ return Object.values(d||{}); }

function toObj(arr){
    let o={};
    arr.forEach((v,i)=>o["flight"+i]=v);
    return o;
}
// WESTJET
window.saveWestjetTitle = ()=>{
    const value = document.getElementById("westjetTitle").value;
    set(ref(db,"titles/westjet"), value);
};

// JETBLUE
window.saveJetblueTitle = ()=>{
    const value = document.getElementById("jetblueTitle").value;
    set(ref(db,"titles/jetblue"), value);
};

onValue(flightsRef,snap=>{
    const data=snap.val()||{};
    const panel=document.getElementById("panel");
    panel.innerHTML="";

    currentData=data;
    saveState(data);

    getArray(data).forEach((r,i)=>{
        let div=document.createElement("div");
        div.className="card";

        div.innerHTML=`
<div class="search-box">
    <input placeholder="🔍 Buscar vuelo..." oninput="buscarVuelo(this, ${i})">
    <div id="results${i}" class="results"></div>
</div>

<input value="${r.vuelo}" onchange="updateField(${i},'vuelo',this.value)">
<input value="${r.destino}" onchange="updateField(${i},'destino',this.value)">
<select onchange="updateField(${i},'gate',this.value)">
    <option value="">GATE</option>
    <option value="A2" ${r.gate==="A2"?"selected":""}>A2</option>
    <option value="A3" ${r.gate==="A3"?"selected":""}>A3</option>
    <option value="A4" ${r.gate==="A4"?"selected":""}>A4</option>
    <option value="A5" ${r.gate==="A5"?"selected":""}>A5</option>
    <option value="A6" ${r.gate==="A6"?"selected":""}>A6</option>
    <option value="A7" ${r.gate==="A7"?"selected":""}>A7</option>
    <option value="A8" ${r.gate==="A8"?"selected":""}>A8</option>
    <option value="A9" ${r.gate==="A9"?"selected":""}>A9</option>
</select>

<input type="time" value="${r.llegada}" onchange="updateField(${i},'llegada',this.value)">
<input type="time" value="${r.salida}" onchange="updateField(${i},'salida',this.value)">

<div class="btn-row">
    <button class="boarding" onclick="setStatus(${i},'BOARDING')">B</button>
    <button class="delayed" onclick="setStatus(${i},'DELAYED')">D</button>
    <button class="ontime" onclick="setStatus(${i},'ON-TIME')">ON</button>
</div>

<div class="btn-row">
    <button class="departed" onclick="setStatus(${i},'DEPARTED')">DEP</button>
    <button class="cancelled" onclick="setStatus(${i},'CANCELLED')">C</button>
    <button class="diverted" onclick="setStatus(${i},'DIVERTED')">DIV</button>
</div>

<button onclick="deleteFlight(${i})">🗑</button>
`;

        panel.appendChild(div);
    });
});

window.updateField=(i,f,v)=>{saveState(currentData);let a=getArray(currentData);a[i][f]=v;set(flightsRef,toObj(a));};
window.setStatus=(i,s)=>{
    window.setStatus = (i,s)=>{

    console.log("CLICK:", i, s);

    let a = getArray(currentData);

    if(!a[i]) return;

    a[i].estado = s;

    set(flightsRef, toObj(a));

    // 🔥 FORZAR REFRESCO LOCAL (CLAVE)
    currentData = toObj(a);
};

    console.log("CLICK:", i, s); // DEBUG

    let a = getArray(currentData);

    if(!a[i]) return;

    a[i].estado = s;

    set(flightsRef, toObj(a));
};
window.addFlight=(i=null)=>{saveState(currentData);let a=getArray(currentData);let n={vuelo:"",destino:"",llegada:"10:00",salida:"10:30",gate:"",estado:"ON-TIME"};i==null?a.push(n):a.splice(i+1,0,n);set(flightsRef,toObj(a));};
window.deleteFlight=i=>{saveState(currentData);let a=getArray(currentData);a.splice(i,1);set(flightsRef,toObj(a));};

window.undo=()=>{if(history.length<2)return;redoStack.push(history.pop());set(flightsRef,JSON.parse(history[history.length-1]));};
window.redo=()=>{if(!redoStack.length)return;let n=JSON.parse(redoStack.pop());history.push(JSON.stringify(n));set(flightsRef,n);};

/* TEMA */
window.setTheme=(m)=>{
    document.body.classList.remove("light","airport");
    if(m==="light")document.body.classList.add("light");
    if(m==="airport")document.body.classList.add("airport");
    localStorage.setItem("theme",m);
};

let saved=localStorage.getItem("theme");
if(saved) setTheme(saved);
window.deletePosition = (role)=>{
    if(confirm("Eliminar esta posición?")){
        set(ref(db,"positions/"+role), null);
    }
};
window.updatePosition = (oldRole, field, value) => {

    const currentRef = ref(db, "positions/" + oldRole);

    if(field === "name"){
        set(currentRef, value);
    }

    if(field === "role"){
        const newRole = value.toLowerCase().trim();
        if(!newRole) return;

        onValue(currentRef, (snap)=>{
            const currentName = snap.val();

            set(currentRef, null);
            set(ref(db,"positions/"+newRole), currentName);

        }, {onlyOnce:true});
    }
};
const westjetTitleRef = ref(db,"titles/westjet");

window.saveWestjetTitle = ()=>{
    const value = document.getElementById("westjetTitle").value;
    set(westjetTitleRef, value);
};


// 🔥 HACER FUNCIONES GLOBALES
window.buscarVuelo = buscarVuelo;
window.seleccionarVuelo = seleccionarVuelo;

window.vuelosTemp = [];

// 🔍 BUSCAR
async function buscarVuelo(input, index){

    const query = input.value.toLowerCase();
    const resultsDiv = document.getElementById("results"+index);

    if(!resultsDiv) return;

    if(query.length < 1){
        resultsDiv.innerHTML = "";
        return;
    }

    try{
        const res = await fetch("https://airportboard.onrender.com/flights");
        const { salidas, llegadas } = await res.json();

        const data = [...salidas, ...llegadas];

        const filtrados = data.filter(f =>
            (f.vuelo || "").toLowerCase().includes(query)
        );

        window.vuelosTemp = filtrados;

        let html = "";

        filtrados.forEach((f, i) => {
            html += `
                <div onclick="seleccionarVuelo(${index}, ${i})">
                    ${f.vuelo} - ${f.destino || f.origen}
                </div>
            `;
        });

        resultsDiv.innerHTML = html;

    }catch(e){
        console.error("ERROR BUSCANDO:", e);
    }
}

// 🎯 SELECCIONAR
function seleccionarVuelo(index, i){

    const vuelo = window.vuelosTemp[i];

    let arr = Object.values(currentData);
    if(!arr[index]) return;

    arr[index].vuelo = vuelo.vuelo;
    arr[index].destino = vuelo.destino || vuelo.origen || "N/A";

    // 🔥 NO SOBRESCRIBIR
    arr[index].manual = true;

    arr[index].salida = vuelo.salida 
        ? convertirHora(vuelo.salida) 
        : "";

    arr[index].llegada = vuelo.llegada 
        ? convertirHora(vuelo.llegada) 
        : "";

    arr[index].estado = vuelo.estado || "ON-TIME";

    set(ref(db,"flights"), toObj(arr));

    document.getElementById("results"+index).innerHTML = "";
}

async function autoCargarVuelos(){
    try{
        const res = await fetch("https://airportboard.onrender.com/flights");

        if(!res.ok){
            console.error("❌ Error HTTP:", res.status);
            return;
        }

        const json = await res.json();

        console.log("🔥 DATA API:", json);

        if(!json.salidas || !json.llegadas){
            console.error("❌ Formato incorrecto");
            return;
        }

        const data = [...json.salidas, ...json.llegadas];

        let arr = Object.values(currentData);

        data.slice(0, arr.length).forEach((vuelo, i) => {

            if(!arr[i] || arr[i].manual) return;

            arr[i].vuelo = vuelo.vuelo;
            arr[i].destino = vuelo.destino || vuelo.origen || "N/A";

            // 🔥 AQUÍ ESTÁ LA CLAVE
            arr[i].salida = vuelo.salida || "";
            arr[i].llegada = vuelo.llegada || "";

            arr[i].estado = vuelo.estado || "ON-TIME";
        });

        set(ref(db,"flights"), toObj(arr));

        console.log("✅ PANEL ACTUALIZADO");

    }catch(e){
        console.error("💥 ERROR:", e);
    }
}

// 🔁 AUTO REFRESH
setInterval(autoCargarVuelos, 20000);

// 🔥 FIX FORMATO ESPAÑOL
function convertirHora(hora12) {
    if(!hora12) return "";

    let limpia = hora12
        .replace("a. m.", "AM")
        .replace("p. m.", "PM");

    const date = new Date("1970-01-01 " + limpia);

    if(isNaN(date)) return "";

    return date.toTimeString().slice(0,5);
}
function showTab(tab){

    document.getElementById("flightsTab").style.display = "none";
    document.getElementById("positionsTab").style.display = "none";
    document.getElementById("anunciosTab").style.display = "none";

    document.getElementById(tab).style.display = "block";
}


</script>


<script>

window.onload = () => {
    showTab("flightsTab");
};

function showTab(tab){

    console.log("CLICK TAB:", tab);

    const flights = document.getElementById("flightsTab");
    const positions = document.getElementById("positionsTab");
    const anuncios = document.getElementById("anunciosTab");

    if(flights) flights.style.display = "none";
    if(positions) positions.style.display = "none";
    if(anuncios) anuncios.style.display = "none";

    const target = document.getElementById(tab);

    if(target){
        target.style.display = "block";
    }else{
        console.error("NO EXISTE:", tab);
    }
}


</script>
</body>
</html>
